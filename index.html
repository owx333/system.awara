<script>
window.__firebaseStatus = { stage: 'loading', error: null };

(function initFirebase() {
  try {
    if (typeof firebase === 'undefined') {
      throw new Error('Firebase SDK not loaded (script tags failed - possibly adblock or no network)');
    }
    window.__firebaseStatus.stage = 'sdk-loaded';
    
    const firebaseConfig = {
      apiKey: "AIzaSyCQ9wGA6mSUxk38unlhZirAjQ_gLylGz7I",
      authDomain: "awara-a8a89.firebaseapp.com",
      projectId: "awara-a8a89",
      storageBucket: "awara-a8a89.firebasestorage.app",
      messagingSenderId: "710757319807",
      appId: "1:710757319807:web:067c96d78351a76b06ab4a"
    };
    
    firebase.initializeApp(firebaseConfig);
    window.__firebaseStatus.stage = 'app-initialized';
    
    const fbDb = firebase.firestore();
    const fbAuth = firebase.auth();
    window.__firebaseStatus.stage = 'firestore-initialized';
    
    // ========== SHARED AUTH (Layer 2 Security) ==========
    // Auto-signin to a shared service account so Firestore rules can require auth
    // 14 staff不需要做任何事 — completely invisible. App login still uses Name+Password.
    // Without these credentials, attackers (even with API key) cannot access Firestore.
    const SHARED_AUTH = {
      email: 'awara-service@awara.local',
      password: 'AwaraSys_2026_Kx9pL3mR_Sec'  // ⚠ if you change this in Firebase Console, update here too!
    };
    
    async function ensureSharedAuth() {
      // Already signed in? skip
      if (fbAuth.currentUser) {
        console.log('🔐 Already signed in:', fbAuth.currentUser.email);
        return true;
      }
      try {
        await fbAuth.signInWithEmailAndPassword(SHARED_AUTH.email, SHARED_AUTH.password);
        console.log('🔐 Shared auth ready · Firestore unlocked');
        return true;
      } catch (e) {
        console.error('⚠ Shared auth FAILED — Firestore may be locked:', e.code, e.message);
        // Show user-friendly hint
        if (e.code === 'auth/user-not-found') {
          console.warn('💡 Setup needed: Create user "awara-service@awara.local" in Firebase Auth Console');
        } else if (e.code === 'auth/wrong-password') {
          console.warn('💡 Password mismatch — update Firebase Console OR update SHARED_AUTH.password in code');
        } else if (e.code === 'auth/operation-not-allowed') {
          console.warn('💡 Setup needed: Enable Email/Password sign-in method in Firebase Auth Console');
        }
        return false;
      }
    }
    
    // Keep session alive — if signed out somehow, re-sign-in
    fbAuth.onAuthStateChanged(user => {
      if (!user) {
        console.log('🔓 Auth state lost · re-signing in...');
        ensureSharedAuth();
      }
    });
    
    // ========== Cloud API ==========
    window.Cloud = {
      enabled: true,
      connected: false,
      collections: ['users', 'cases', 'activities', 'customer_notes', 'seen', 'koperasi', 'announcements', 'settings'],
      listeners: {},
      
      // Expose for bootstrap to call before Firestore reads
      ensureAuth: ensureSharedAuth,
      
      async setDoc(collectionName, docId, data) {
        try {
          const clean = JSON.parse(JSON.stringify(data));
          await fbDb.collection(collectionName).doc(String(docId)).set(clean);
          return true;
        } catch (e) {
          console.error("Cloud.setDoc error:", collectionName, docId, e);
          return false;
        }
      },
      async deleteDoc(collectionName, docId) {
        try {
          await fbDb.collection(collectionName).doc(String(docId)).delete();
          return true;
        } catch (e) {
          console.error("Cloud.deleteDoc error:", e);
          return false;
        }
      },
      async getAll(collectionName) {
        try {
          const snap = await fbDb.collection(collectionName).get();
          return snap.docs.map(d => d.data());
        } catch (e) {
          console.error("Cloud.getAll error:", collectionName, e);
          return [];
        }
      },
      async getDoc(collectionName, docId) {
        try {
          const snap = await fbDb.collection(collectionName).doc(String(docId)).get();
          return snap.exists ? snap.data() : null;
        } catch (e) {
          console.error("Cloud.getDoc error:", e);
          return null;
        }
      },
      async batchSet(collectionName, items, keyField = 'id') {
        try {
          const batch = fbDb.batch();
          items.forEach(item => {
            const cleanItem = JSON.parse(JSON.stringify(item));
            batch.set(fbDb.collection(collectionName).doc(String(cleanItem[keyField])), cleanItem);
          });
          await batch.commit();
          return true;
        } catch (e) {
          console.error("Cloud.batchSet error:", e);
          return false;
        }
      },
      subscribe(collectionName, callback) {
        if (this.listeners[collectionName]) this.listeners[collectionName]();
        this.listeners[collectionName] = fbDb.collection(collectionName).onSnapshot(
          snap => {
            const items = snap.docs.map(d => d.data());
            callback(items);
          },
          err => console.error("Subscribe error:", collectionName, err)
        );
      },
      unsubscribeAll() {
        Object.values(this.listeners).forEach(fn => fn && fn());
        this.listeners = {};
      }
    };
    
    window.Cloud.connected = true;
    window.__firebaseStatus.stage = 'ready';
    console.log("Firebase Connected ✅ Project: awara-a8a89");
    window.dispatchEvent(new Event('cloud-ready'));
    
  } catch (e) {
    window.__firebaseStatus.error = (e && (e.message || String(e))) || 'Unknown error';
    window.__firebaseStatus.stage = window.__firebaseStatus.stage + '-failed';
    console.error("❌ Firebase initialization failed:", e);
    console.error("Stage:", window.__firebaseStatus.stage);
    
    window.Cloud = {
      enabled: false,
      connected: false,
      error: window.__firebaseStatus.error,
      stage: window.__firebaseStatus.stage,
      setDoc: async () => false,
      deleteDoc: async () => false,
      getAll: async () => [],
      getDoc: async () => null,
      batchSet: async () => false,
      subscribe: () => {},
      unsubscribeAll: () => {},
      ensureAuth: async () => false   // offline mode - no auth possible
    };
    window.dispatchEvent(new Event('cloud-ready'));
  }
})();
</script>

function buildTierLabel(t, unit) {
  if (unit === 'payslip') return `≥ ${t.min} payslip`;
  if (unit === 'submit') return `≥ ${t.min} submit`;
  if (unit === 'kfi') return `RM ${t.min.toLocaleString('en-MY')} disburse`;
  return `${t.min}`;
}

function refreshSettings() {
  const s = DB.settings();
  if (!s || !s.commission) return;  // first run, use defaults
  
  // Sort tiers descending by min (first-match logic relies on this)
  const sortDesc = arr => arr.slice().sort((a,b) => b.min - a.min);
  
  if (s.commission.cs_payslip?.length) {
    CS_PAYSLIP_TIERS = sortDesc(s.commission.cs_payslip).map(t => ({ ...t, label: buildTierLabel(t, 'payslip') }));
  }
  if (s.commission.cs_submit?.length) {
    CS_SUBMIT_TIERS = sortDesc(s.commission.cs_submit).map(t => ({ ...t, label: buildTierLabel(t, 'submit') }));
  }
  if (s.commission.leader_kfi?.length) {
    LEADER_KFI_TIERS = sortDesc(s.commission.leader_kfi).map(t => ({ ...t, label: buildTierLabel(t, 'kfi') }));
  }
  if (s.commission.solo_kfi?.length) {
    SOLO_KFI_TIERS = sortDesc(s.commission.solo_kfi).map(t => ({ ...t, label: buildTierLabel(t, 'kfi') }));
  }
  if (s.commission.leader_submit?.length) {
    LEADER_SUBMIT_TIERS = sortDesc(s.commission.leader_submit).map(t => ({ ...t, label: buildTierLabel(t, 'submit') }));
  }
  if (s.commission.solo_submit?.length) {
    SOLO_SUBMIT_TIERS = sortDesc(s.commission.solo_submit).map(t => ({ ...t, label: buildTierLabel(t, 'submit') }));
  }
  if (Array.isArray(s.commission.bonus_packages)) {
    BONUS_PACKAGES = s.commission.bonus_packages.slice();
  }
  if (typeof s.commission.bonus_team === 'number') YTAA_KOMUJA_BONUS_TEAM = s.commission.bonus_team;
  if (typeof s.commission.bonus_solo === 'number') YTAA_KOMUJA_BONUS_SOLO = s.commission.bonus_solo;
  if (typeof s.commission.bonus_rate === 'number') BONUS_RATE_PCT = s.commission.bonus_rate;
  
  if (s.daily_targets) DAILY_TARGETS = { ...DAILY_TARGETS, ...s.daily_targets };
  if (s.performance) PERFORMANCE = JSON.parse(JSON.stringify(s.performance));
  if (s.pending_reasons?.length) PENDING_REASONS = s.pending_reasons.slice();
  if (s.reject_reasons?.length) REJECT_REASONS = s.reject_reasons.slice();
  if (s.loan_amounts?.length) LOAN_AMOUNTS = s.loan_amounts.slice();
  if (s.tenors?.length) TENORS = s.tenors.slice();
  if (s.branding) BRANDING = { ...BRANDING, ...s.branding };
  
  // Apply branding colors live
  if (s.branding?.primary_color) document.documentElement.style.setProperty('--primary', s.branding.primary_color);
  if (s.branding?.accent_color) document.documentElement.style.setProperty('--accent', s.branding.accent_color);
}

function calcBulanan(loanAmount, ratePct, tenorMonths) {
  if (!loanAmount || !ratePct || !tenorMonths) return 0;
  const years = tenorMonths / 12;
  const totalInterest = loanAmount * (ratePct/100) * years;
  return (loanAmount + totalInterest) / tenorMonths;
}

function calcGajiBersih(pendapatan, potongan) {
  const bersih = (pendapatan || 0) - (potongan || 0);
  const pct = pendapatan > 0 ? (bersih / pendapatan) * 100 : 0;
  return { bersih, pct };
}

        tenor = TENORS[Math.floor(Math.random() * TENORS.length)].m;
        bulanan = calcBulanan(amt, pkg.rate, tenor);
        caseType = ['normal','normal','normal','special','resubmit'][Math.floor(Math.random()*5)];
        dateContacted = new Date(year, month, Math.min(dayInMonth + 1, 28)).toISOString().slice(0,10);
        
        const effectiveStatus = isPending ? pendingFromStatus : status;
        
        if (['submitted','approved','disbursed','rejected'].includes(effectiveStatus) || ['submitted','approved','disbursed','rejected'].includes(status)) {
          // Cross-month: 20% chance the case was submitted last month
          const submitMonth = Math.random() > 0.8 ? -1 : 0;
          dateSubmitted = new Date(year, month + submitMonth, Math.min(dayInMonth + 2, 28)).toISOString().slice(0,10);
          ammPw = ammCreds[Math.floor(Math.random() * ammCreds.length)];
          hrmisPw = hrmisCreds[Math.floor(Math.random() * hrmisCreds.length)];
        }
        if (['approved','disbursed'].includes(status)) {
          dateApproved = new Date(year, month, Math.min(dayInMonth + 4, 28)).toISOString().slice(0,10);
          // Approved amount: 80% same as requested, 20% slightly different
          approvedAmt = Math.random() > 0.8 ? Math.floor(amt * (0.85 + Math.random() * 0.15)) : amt;
        }
        if (status === 'disbursed') {
          dateDisbursed = new Date(year, month, Math.min(dayInMonth + 6, 28)).toISOString().slice(0,10);
          disburseAmt = (approvedAmt || amt) * (pkg.payout / 100);
        }
        if (status === 'rejected') {
          dateRejected = new Date(year, month, Math.min(dayInMonth + 3, 28)).toISOString().slice(0,10);
          rejectionReason = ['Customer tak berminat', 'Koperasi reject', 'Income tak cukup', 'CCRIS issue', 'Duplicate'][Math.floor(Math.random()*5)];
        }
        if (isPending) {
          pendingReason = pendingReasonsList[Math.floor(Math.random() * pendingReasonsList.length)];
        }
      }
      
      cases.push({
        id: 'c' + id++,
        source_cs_id: d.cs,
        leader_id: d.leader,
        // Stage 1
        customer_name: customers[custIdx % customers.length],
        ic: '88' + String(Math.floor(Math.random() * 10000)).padStart(4,'0') + '08' + String(Math.floor(Math.random() * 10000)).padStart(4,'0'),
        phone: '01' + Math.floor(Math.random() * 10) + String(Math.floor(Math.random() * 10000000)).padStart(7,'0'),
        jumlah_pendapatan: pendapatan,
        jumlah_potongan: potongan,
        gaji_bersih: bersih,
        gaji_bersih_pct: pct,
        date_payslip: date.toISOString().slice(0,10),
        // stage 3
        package_id: pkg ? pkg.id : null,
        loan_amount: amt,
        tenor: tenor,
        bulanan: bulanan,
        case_type: caseType,
        approved_amount: approvedAmt,
        disburse_amount: disburseAmt,
        date_contacted: dateContacted,
        date_submitted: dateSubmitted,
        date_approved: dateApproved,
        date_disbursed: dateDisbursed,
        date_rejected: dateRejected,
        // Submit credentials
        amm_password: ammPw,
        hrmis_password: hrmisPw,
        // Status
        status,
        pending_reason: pendingReason,
        pending_from_status: pendingFromStatus,
        rejection_reason: rejectionReason,
        remarks: status !== 'new' ? [{ 
          date: dateContacted, 
          by: d.leader, 
          text: isPending ? 'Customer minta delay, sedang follow-up.' : 'Customer dihubungi, menunggu keputusan.' 
        }] : []
      });
      custIdx++;
    }
  });
  
  return cases;
}

// ==================== DATA LAYER (localStorage) ====================
const DB = {
  K: { 
    users: 'awara_users', cases: 'awara_cases', activities: 'awara_activities', 
    session: 'awara_session', customer_notes: 'awara_customer_notes',
    seen: 'awara_seen', koperasi: 'awara_koperasi', announcements: 'awara_announcements',
    settings: 'awara_settings', branches: 'awara_branches',
    notifications: 'awara_notifications', loginAttempts: 'awara_login_attempts'
  },
  
  get(key, def = []) {
    try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
  },
  set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); return true; } catch { return false; }
  },
  
  seed(force = false) {
    if (!force && this.get(this.K.users).length > 0) return;
    this.set(this.K.users, SEED_USERS);
    this.set(this.K.branches, SEED_BRANCHES);
    this.set(this.K.cases, generateSeedCases());

    this.set(this.K.customer_notes, {});
    this.set(this.K.seen, {});
    this.set(this.K.koperasi, DEFAULT_PACKAGES);
    this.set(this.K.announcements, []);
    this.set(this.K.settings, DEFAULT_SETTINGS);
  },
  
  // Users
  users() { return this.get(this.K.users); },
  user(id) { return this.users().find(u => u.id === id); },

  // Branches
  branches() { return this.get(this.K.branches, SEED_BRANCHES); },
  branch(id) { return this.branches().find(b => b.id === id); },
  saveBranches(list) { 
    this.set(this.K.branches, list);

      list.forEach(b => window.Cloud.setDoc('branches', b.id, b));
    }
  },
  updateUser(id, updates) {
    const users = this.users();
    const idx = users.findIndex(u => u.id === id);
    if (idx === -1) return null;
    users[idx] = { ...users[idx], ...updates };
    this.set(this.K.users, users);
    // Mirror to Firestore
    if (window.Cloud?.connected) window.Cloud.setDoc('users', id, users[idx]);
    return users[idx];
  },
  
  addUser(newUser) {
    // Centralized add-user: writes to localStorage + Firestore in one call
    const users = this.users();
    if (users.find(u => u.id === newUser.id)) return null;  // duplicate ID
    users.push(newUser);
    const ok = this.set(this.K.users, users);
    if (!ok) return null;
    // Mirror to Firestore
    if (window.Cloud?.connected) {
      window.Cloud.setDoc('users', newUser.id, newUser).catch(e => 
        console.error('Failed to sync new user to Firestore:', e)
      );
    }
    return newUser;
  },
  
  deleteUserById(id) {
    const users = this.users().filter(u => u.id !== id);
    this.set(this.K.users, users);
    if (window.Cloud?.connected) {
      window.Cloud.deleteDoc('users', id).catch(e =>

      );
    }
    return true;
  },
  
  // Cases
  cases() { return this.get(this.K.cases); },
  caseById(id) { return this.cases().find(c => c.id === id); },
  
  casesByIC(ic) {
    if (!ic) return [];
    const cleanIC = ic.replace(/[-\s]/g, '').toLowerCase();
    return this.cases().filter(c => 
      c.ic && c.ic.replace(/[-\s]/g, '').toLowerCase() === cleanIC
    );
  },
  
  // Add a case. If IC already exists, mark as duplicate + add remark to original.
  // Duplicates are tracked but don't count toward CS payslip tier.
  addCase(data) {
    const cases = this.cases();
    const user = Auth.current();
    
    // Check duplicate by IC
    const existing = data.ic ? this.casesByIC(data.ic) : [];
    const isDuplicate = existing.length > 0;
    const originalCase = isDuplicate ? existing[0] : null;
    
    const newCase = { 
      id: 'c' + Date.now(), 
      ...data,
      branch_id: data.branch_id || this.user(data.source_cs_id)?.branch_id || null,
      is_duplicate: isDuplicate,
      duplicate_of: isDuplicate ? originalCase.id : null,
      original_keyer: isDuplicate ? originalCase.source_cs_id : data.source_cs_id,
      audit_log: [{
        date: new Date().toISOString(),
        by: user?.id || 'system',
        action: isDuplicate ? 'created_duplicate' : 'created',
        changes: { status: { from: null, to: data.status || 'new' } }
      }]
    };
    cases.unshift(newCase);
    this.set(this.K.cases, cases);
    if (window.Cloud?.connected) window.Cloud.setDoc('cases', newCase.id, newCase);
    
    // If duplicate, add remark to ORIGINAL case for tracking
    if (isDuplicate && originalCase) {
      const today = new Date().toISOString().slice(0,10);
      const remarks = (originalCase.remarks || []).slice();
      const csName = this.user(data.source_cs_id)?.name || data.source_cs_id;
      remarks.push({
        date: today,
        by: user?.id || 'system',
        text: `Duplicate keyed by CS ${csName} (Case ${newCase.id})`
      });
      this.updateCase(originalCase.id, { remarks });
    }
    
    return newCase;
  },
  
  updateCase(id, updates) {
    const cases = this.cases();
    const idx = cases.findIndex(c => c.id === id);
    if (idx === -1) return null;
    const before = cases[idx];
    const user = Auth.current();
    
    const skipFields = ['audit_log', 'remarks'];
    const changes = {};
    Object.keys(updates).forEach(k => {
      if (skipFields.includes(k)) return;
      if (JSON.stringify(before[k]) !== JSON.stringify(updates[k])) {
        changes[k] = { from: before[k], to: updates[k] };
      }
    });
    
    if (Object.keys(changes).length > 0) {
      const audit = before.audit_log || [];
      audit.push({
        date: new Date().toISOString(),
        by: user?.id || 'system',
        action: 'updated',
        changes
      });
      updates.audit_log = audit;
    }
    
    cases[idx] = { ...before, ...updates };
    this.set(this.K.cases, cases);
    if (window.Cloud?.connected) window.Cloud.setDoc('cases', id, cases[idx]);
    
    // Notify CS and Leader if editor is admin/manager/hq and there are real changes
    const editorRole = user?.role;
    if (['admin', 'manager', 'hq'].includes(editorRole) && Object.keys(changes).length > 0) {
      const updatedCase = cases[idx];
      const changedFields = Object.keys(changes);
      const isStatusChange = changedFields.includes('status');
      const notifTitle = isStatusChange
        ? `Status dikemaskini: ${STATUS_LABELS[changes.status?.to] || changes.status?.to}`
        : `Maklumat pelanggan dikemaskini`;
      const notifBody = `${updatedCase.customer_name} · dikemaskini oleh ${user?.name || 'Admin'}${isStatusChange ? ` → ${STATUS_LABELS[changes.status?.to] || changes.status?.to}` : ` (${changedFields.filter(f => f !== 'status').slice(0,3).join(', ')})`}`;
      
      // Notify CS
      if (updatedCase.source_cs_id && updatedCase.source_cs_id !== user?.id) {
        this.addNotification(updatedCase.source_cs_id, { title: notifTitle, body: notifBody, caseId: id });
      }
      // Notify Leader
      if (updatedCase.leader_id && updatedCase.leader_id !== user?.id) {
        this.addNotification(updatedCase.leader_id, { title: notifTitle, body: notifBody, caseId: id });
      }
    }
    
    return cases[idx];
  },
  
  // Activities
  activities() { return this.get(this.K.activities); },
  todayActivity(csId) {
    const today = new Date().toISOString().slice(0,10);
    return this.activities().find(a => a.cs_id === csId && a.date === today) || 
           { cs_id: csId, date: today, calls: 0, whatsapp: 0, payslip: 0 };
  },
  updateActivity(csId, updates) {
    const today = new Date().toISOString().slice(0,10);
    const acts = this.activities();
    const idx = acts.findIndex(a => a.cs_id === csId && a.date === today);
    if (idx >= 0) {
      acts[idx] = { ...acts[idx], ...updates };
    } else {
      acts.push({ cs_id: csId, date: today, calls: 0, whatsapp: 0, payslip: 0, ...updates });
    }
    this.set(this.K.activities, acts);
    // Mirror to Firestore (composite key: cs_id_date)
    const actId = `${csId}_${today}`;
    const actDoc = acts.find(a => a.cs_id === csId && a.date === today);
    if (window.Cloud?.connected && actDoc) window.Cloud.setDoc('activities', actId, {...actDoc, id: actId});
  },
  
  // Customer notes
  customerNotes() { return this.get(this.K.customer_notes, {}); },
  customerNote(ic) {

    const key = ic.replace(/[-\s]/g, '').toLowerCase();

  },
  setCustomerNote(ic, note) {

    else delete notes[key];
    this.set(this.K.customer_notes, notes);
    if (window.Cloud?.connected) window.Cloud.setDoc('customer_notes', key, { ic: key, note });
  },
  
  // Seen tracking
  seen() { return this.get(this.K.seen, {}); },
  markSeen(userId, key) {

    if (!seen[userId]) seen[userId] = {};

    this.set(this.K.seen, seen);
  },
  lastSeen(userId, key) {
    return this.seen()[userId]?.[key] || 0;
  },
  
  // Koperasi packages (admin-managed CRUD)
  koperasi() { return this.get(this.K.koperasi, []); },
  koperasiById(id) { return this.koperasi().find(p => p.id === id); },
  addKoperasi(data) {
    const list = this.koperasi();
    let id = data.id || (data.name || '').toUpperCase().replace(/[^A-Z0-9]/g, '_');
    if (!id) return null;
    // Ensure unique id
    let suffix = 0;
    let finalId = id;
    while (list.some(p => p.id === finalId)) {
      suffix++;
      finalId = id + '_' + suffix;
    }
    const pkg = { ...data, id: finalId };
    pkg.isHighPayout = (pkg.payout || 0) >= 65;
    list.push(pkg);
    this.set(this.K.koperasi, list);
    if (window.Cloud?.connected) window.Cloud.setDoc('koperasi', finalId, pkg);
    refreshPackages();
    return pkg;
  },
  updateKoperasi(id, updates) {
    const list = this.koperasi();
    const idx = list.findIndex(p => p.id === id);
    if (idx === -1) return null;
    list[idx] = { ...list[idx], ...updates };
    list[idx].isHighPayout = (list[idx].payout || 0) >= 65;
    this.set(this.K.koperasi, list);
    if (window.Cloud?.connected) window.Cloud.setDoc('koperasi', id, list[idx]);
    refreshPackages();
    return list[idx];
  },
  deleteKoperasi(id) {
    const list = this.koperasi().filter(p => p.id !== id);
    this.set(this.K.koperasi, list);
    if (window.Cloud?.connected) window.Cloud.deleteDoc('koperasi', id);
    refreshPackages();
  },
  
  // Announcements
  announcements() {
    return this.get(this.K.announcements, [])
      .sort((a,b) => (b.created_at || b.date || '').localeCompare(a.created_at || a.date || ''));
  },
  addAnnouncement({ title, body, expires_at }) {

    list.unshift(ann);

    if (window.Cloud?.connected) window.Cloud.setDoc('announcements', ann.id, ann);

  },
  deleteAnnouncement(id) {
    const list = this.announcements().filter(a => a.id !== id);
    this.set(this.K.announcements, list);
    if (window.Cloud?.connected) window.Cloud.deleteDoc('announcements', id);
  },
  
  // Settings (single doc with all admin-configurable values)
  settings() { 
    const s = this.get(this.K.settings, null); 
    // Deep merge with defaults so missing keys fall back
    if (!s) return JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    return {
      ...DEFAULT_SETTINGS,
      ...s,
      commission: { ...DEFAULT_SETTINGS.commission, ...(s.commission || {}) },
      daily_targets: { ...DEFAULT_SETTINGS.daily_targets, ...(s.daily_targets || {}) },

    };
  },
  updateSettings(patch) {
    const current = this.settings();
    const merged = {
      ...current,
      ...patch,
      commission: { ...current.commission, ...(patch.commission || {}) },
      daily_targets: { ...current.daily_targets, ...(patch.daily_targets || {}) },
      performance: { ...current.performance, ...(patch.performance || {}) },
      branding: { ...current.branding, ...(patch.branding || {}) }
    };
    this.set(this.K.settings, merged);
    if (window.Cloud?.connected) window.Cloud.setDoc('settings', 'main', { id: 'main', ...merged });
    refreshSettings();
    return merged;
  },
  resetSettingsToDefault() {
    this.set(this.K.settings, DEFAULT_SETTINGS);

    refreshSettings();
  },
  
  // Session

  setSession(userId) { this.set(this.K.session, { userId, loginAt: Date.now() }); },
  clearSession() { localStorage.removeItem(this.K.session); },

  // ── Notifications ──
  notifications(userId) {
    const all = this.get(this.K.notifications, {});
    return (all[userId] || []).sort((a,b) => b.ts - a.ts);
  },
  addNotification(userId, notif) {
    const all = this.get(this.K.notifications, {});
    if (!all[userId]) all[userId] = [];
    all[userId].unshift({ id: 'n' + Date.now() + Math.random().toString(36).slice(2,6), ts: Date.now(), read: false, ...notif });
    // Keep last 50 per user
    all[userId] = all[userId].slice(0, 50);
    this.set(this.K.notifications, all);
    if (window.Cloud?.connected) window.Cloud.setDoc('notifications', userId, { userId, items: all[userId] });
  },
  markNotificationsRead(userId) {
    const all = this.get(this.K.notifications, {});
    if (all[userId]) all[userId] = all[userId].map(n => ({ ...n, read: true }));
    this.set(this.K.notifications, all);
    if (window.Cloud?.connected) window.Cloud.setDoc('notifications', userId, { userId, items: all[userId] || [] });
  },
  unreadCount(userId) {
    return this.notifications(userId).filter(n => !n.read).length;
  },

  // ── Login lockout ──
  loginAttempts(userId) { return this.get(this.K.loginAttempts, {})[userId] || { count: 0, lockedAt: null }; },
  recordLoginFail(userId) {
    const all = this.get(this.K.loginAttempts, {});
    const rec = all[userId] || { count: 0, lockedAt: null };
    rec.count += 1;
    if (rec.count >= 3) rec.lockedAt = Date.now();
    all[userId] = rec;
    this.set(this.K.loginAttempts, all);
    return rec;
  },
  resetLoginAttempts(userId) {
    const all = this.get(this.K.loginAttempts, {});
    delete all[userId];
    this.set(this.K.loginAttempts, all);
  },
  unlockUser(userId) {
    const all = this.get(this.K.loginAttempts, {});
    delete all[userId];
    this.set(this.K.loginAttempts, all);
    // Also update user's locked flag
    this.updateUser(userId, { locked: false });
  }
};

// ==================== AUTH ====================
const Auth = {
  login(nameId, password) {
    const user = DB.users().find(u => u.id === nameId.toLowerCase() || u.name.toLowerCase() === nameId.toLowerCase());
    if (!user) return { ok: false, error: 'Name ID tidak dijumpai' };
    
    // Check if account is inactive (deactivated by admin)
    if (user.inactive) {
      return { ok: false, error: 'Akaun ini telah dinyahaktifkan. Sila hubungi Manager atau Boss.' };
    }
    
    // Check if account is locked
    const attempts = DB.loginAttempts(user.id);
    if (attempts.lockedAt) {
      const manager = DB.users().find(u => ['admin', 'manager', 'hq'].includes(u.role) && u.branch_id === user.branch_id);
      return { ok: false, locked: true, error: `Akaun dikunci selepas 3 cubaan gagal. Sila hubungi ${manager ? manager.name : 'Manager'} untuk buka semula.` };
    }
    
    if (user.password !== password) {
      const rec = DB.recordLoginFail(user.id);
      const remaining = 3 - rec.count;
      if (rec.count >= 3) {
        const manager = DB.users().find(u => ['admin', 'manager', 'hq'].includes(u.role) && u.branch_id === user.branch_id);
        return { ok: false, locked: true, error: `Akaun dikunci selepas 3 cubaan gagal. Sila hubungi ${manager ? manager.name : 'Manager'} untuk buka semula.` };
      }
      return { ok: false, error: `Password salah · ${remaining} cubaan lagi sebelum akaun dikunci` };
    }
    
    // Success - reset attempts
    DB.resetLoginAttempts(user.id);
    DB.setSession(user.id);
    return { ok: true, user };
  },
  logout() { DB.clearSession(); },
  current() {
    const s = DB.session();
    return s ? DB.user(s.userId) : null;
  }
};

// ==================== BUSINESS LOGIC ====================
const Logic = {
  PIPELINE_STATUSES: ['new'],
  KPI_STATUSES: ['submitted', 'approved', 'disbursed'],
  
  isLeaderRole(user) {
    return user && (user.role === 'leader' || user.role === 'solo');
  },
  
  isSolo(user) {
    return user && user.role === 'solo';
  },
  
  currentMonthYM() {
    return new Date().toISOString().slice(0,7);
  },
  
  // All cases regardless of date - filtered by people
  allCases(opts = {}) {
    let cases = DB.cases();
    if (opts.csId) cases = cases.filter(c => c.source_cs_id === opts.csId);
    if (opts.leaderId) cases = cases.filter(c => c.leader_id === opts.leaderId);
    // Branch filter: if branchId specified, only show that branch's cases
    if (opts.branchId) cases = cases.filter(c => c.branch_id === opts.branchId);
    return cases;
  },
  
  // Cases with payslip in current month (when payslip was collected)
  monthlyPayslipCases(opts = {}) {
    const ym = this.currentMonthYM();
    return this.allCases(opts).filter(c => c.date_payslip && c.date_payslip.startsWith(ym));
  },
  
  // Cases submitted in current month (by date_submitted only - including those later rejected/disbursed)
  // This is the correct KPI logic: if it was submitted in May, it counts for May KPI regardless of later status
  monthlySubmitCases(opts = {}) {
    const ym = this.currentMonthYM();
    return this.allCases(opts).filter(c => 
      c.date_submitted && c.date_submitted.startsWith(ym)
    );
  },
  
  // Cases disbursed in current month (by date_disbursed) - KFI counts here
  monthlyDisburseCases(opts = {}) {
    const ym = this.currentMonthYM();
    return this.allCases(opts).filter(c => 
      c.date_disbursed && c.date_disbursed.startsWith(ym) && 
      c.status === 'disbursed'
    );
  },
  
  // Cases rejected in current month (by date_rejected)
  monthlyRejectCases(opts = {}) {
    const ym = this.currentMonthYM();
    return this.allCases(opts).filter(c => 
      c.date_rejected && c.date_rejected.startsWith(ym) && 
      c.status === 'rejected'
    );
  },
  
  // Pending cases (any time - they're paused)
  pendingCases(opts = {}) {
    return this.allCases(opts).filter(c => c.status === 'pending');
  },
  
  // Performance level for a user this month (low / normal / high / excellent)
  performanceLevel(userId, role) {
    const u = DB.user(userId);
    if (!u) return 'normal';
    const isLeader = u.role === 'leader' || u.role === 'solo';
    const isSolo = u.role === 'solo';
    
    if (isLeader) {
      const stats = this.leaderStats(userId);
      const threshold = isSolo ? PERFORMANCE.solo : PERFORMANCE.leader;
      const kfi = stats.kfiAmount;
      if (kfi >= threshold.excellent) return 'excellent';
      if (kfi >= threshold.high) return 'high';
      if (kfi < threshold.low) return 'low';
      return 'normal';
    } else {
      const stats = this.csStats(userId);
      const t = PERFORMANCE.cs;
      const ps = stats.total;
      if (ps >= t.excellent) return 'excellent';
      if (ps >= t.high) return 'high';
      if (ps < t.low) return 'low';
      return 'normal';
    }
  },
  
  // Get active announcements (not expired)
  activeAnnouncements() {
    const today = new Date().toISOString().slice(0,10);
    return DB.announcements().filter(a => !a.expires_at || a.expires_at >= today);
  },
  
  // CS stats - cross-month accurate, excludes duplicates from payslip count
  csStats(csId) {
    const payslipCases = this.monthlyPayslipCases({ csId });
    const submitCases = this.monthlySubmitCases({ csId });
    const disburseCases = this.monthlyDisburseCases({ csId });
    const rejectCases = this.monthlyRejectCases({ csId });
    
    // Duplicate payslips don't count toward tier
    const validPayslip = payslipCases.filter(c => !c.is_duplicate);
    const duplicates = payslipCases.filter(c => c.is_duplicate);
    
    const total = validPayslip.length;
    const totalDuplicates = duplicates.length;
    // KPI count = cases that were submitted AND still alive (NOT rejected) - item 4 requirement
    // Rejected this month doesn't count toward submit/KPI commission
    const submitted = submitCases.filter(c => !c.is_duplicate && c.status !== 'rejected').length;
    const submittedRaw = submitCases.filter(c => !c.is_duplicate).length;  // including rejected (for display only)
    const disbursed = disburseCases.filter(c => !c.is_duplicate).length;
    const rejected = rejectCases.filter(c => !c.is_duplicate).length;
    const newCount = validPayslip.filter(c => c.status === 'new').length;
    const inProgress = validPayslip.filter(c => ['contacted', 'proposed', 'submitted', 'approved'].includes(c.status)).length;
    // Pipeline = CS payslips yang Leader BELUM tekan "Contacted" lagi
    // Once leader presses contacted, case keluar dari pipeline
    // Tujuan: CS can see if leader is doing followup work or not
    const inPipeline = validPayslip.filter(c => c.status === 'new').length;
    const pending = this.pendingCases({ csId }).filter(c => !c.is_duplicate).length;
    const potential = validPayslip.filter(c => c.status === 'potential').length;
    const onHold = validPayslip.filter(c => c.status === 'on_hold').length;
    const disburseAmount = disburseCases.filter(c => !c.is_duplicate).reduce((s,c) => s + (c.disburse_amount || 0), 0);
    const lostAmount = rejectCases.filter(c => !c.is_duplicate).reduce((s,c) => s + (c.loan_amount || 0), 0);
    
    return { 
      total, totalDuplicates,
      submitted, inProgress, inPipeline, disbursed, rejected, newCount, pending, potential, onHold,
      disburseAmount, lostAmount, 
      cases: payslipCases,
      allCases: this.allCases({ csId })
    };
  },
  
  // Leader stats - cross-month accurate, excludes duplicates from payslip count
  leaderStats(leaderId) {
    const leader = DB.user(leaderId);
    const teamMembers = DB.users().filter(u => u.leader_id === leaderId);
    
    const payslipCases = this.monthlyPayslipCases({ leaderId });
    const submitCases = this.monthlySubmitCases({ leaderId });
    const disburseCases = this.monthlyDisburseCases({ leaderId });
    const rejectCases = this.monthlyRejectCases({ leaderId });
    
    const validPayslip = payslipCases.filter(c => !c.is_duplicate);
    const total = validPayslip.length;
    // KPI count excludes rejected cases this month (item 4)
    const submitted = submitCases.filter(c => !c.is_duplicate && c.status !== 'rejected').length;
    const submittedRaw = submitCases.filter(c => !c.is_duplicate).length;
    const disbursed = disburseCases.filter(c => !c.is_duplicate).length;
    const newCount = validPayslip.filter(c => c.status === 'new').length;
    // KFI is on the disbursing leader (not original CS), so include all disbursed by this leader
    const kfiAmount = disburseCases.reduce((s,c) => s + (c.disburse_amount || 0), 0);
    const loanSubmission = submitCases.filter(c => !c.is_duplicate).reduce((s,c) => s + (c.loan_amount || 0), 0);
    const rejected = rejectCases.filter(c => !c.is_duplicate).length;
    const lostAmount = rejectCases.filter(c => !c.is_duplicate).reduce((s,c) => s + (c.loan_amount || 0), 0);
    
    const bonusCases = disburseCases.filter(c => ['YTAA','KOMUJA'].includes(c.package_id));
    const bonusKfi = bonusCases.reduce((s,c) => s + (c.disburse_amount || 0), 0);
    
    return { 
      total, submitted, disbursed, rejected, newCount,
      kpi: submitted,
      kfiAmount, loanSubmission, lostAmount, bonusKfi,
      cases: payslipCases, teamMembers, leader,
      isSolo: leader.role === 'solo'
    };
  },
  
  // Company-wide stats
  companyStats(branchId = null) {
    const opts = branchId ? { branchId } : {};
    const payslipCases = this.monthlyPayslipCases(opts);
    const submitCases = this.monthlySubmitCases(opts);
    const disburseCases = this.monthlyDisburseCases(opts);
    const rejectCases = this.monthlyRejectCases(opts);
    
    const total = payslipCases.length;
    const submitted = submitCases.length;
    const disbursed = disburseCases.length;
    const rejected = rejectCases.length;
    const newCount = payslipCases.filter(c => c.status === 'new').length;
    const pending = this.pendingCases().length;
    const kfiAmount = disburseCases.reduce((s,c) => s + (c.disburse_amount || 0), 0);
    const loanSubmission = submitCases.reduce((s,c) => s + (c.loan_amount || 0), 0);
    const lostAmount = rejectCases.reduce((s,c) => s + (c.loan_amount || 0), 0);
    return { total, submitted, disbursed, rejected, newCount, pending, kfiAmount, loanSubmission, lostAmount };
  },
  
  // CS commission calculation (unchanged)
  csCommission(csId) {
    const stats = this.csStats(csId);
    let psRate = 0, psTier = null;
    for (const t of CS_PAYSLIP_TIERS) {
      if (stats.total >= t.min) { psRate = t.rate; psTier = t; break; }
    }
    const psCom = stats.total * psRate;
    
    let smRate = 0, smTier = null;
    for (const t of CS_SUBMIT_TIERS) {
      if (stats.submitted >= t.min) { smRate = t.rate; smTier = t; break; }
    }
    const smCom = stats.submitted * smRate;
    
    let psNext = null;
    if (!psTier) psNext = { rate: 1.00, min: 65, need: 65 - stats.total };
    else if (psTier.min < 100) {
      const upper = CS_PAYSLIP_TIERS.find(t => t.min > psTier.min);
      if (upper) psNext = { ...upper, need: upper.min - stats.total };
    }
    
    let smNext = null;
    if (stats.submitted < 7) smNext = { rate: 15, min: 7, need: 7 - stats.submitted };
    else if (stats.submitted < 40) {
      const upper = [15, 25, 40].find(m => m > stats.submitted);
      if (upper) {
        const upperTier = CS_SUBMIT_TIERS.find(t => t.min === upper);
        smNext = { ...upperTier, need: upper - stats.submitted };
      }
    }
    
    return { 
      psCom, smCom, total: psCom + smCom,
      psTier, psNext, psRate, smTier, smNext, smRate, stats 
    };
  },
  
  // Leader commission - based on DISBURSED amount in current month (cross-month correct)
  leaderCommission(leaderId) {
    const stats = this.leaderStats(leaderId);
    const tiers = stats.isSolo ? SOLO_KFI_TIERS : LEADER_KFI_TIERS;
    
    // KFI commission (% of disburse)
    let rate = 0, tier = null;
    for (const t of tiers) {
      if (stats.kfiAmount >= t.min) { rate = t.rate; tier = t; break; }
    }
    const kfiCom = stats.kfiAmount * (rate / 100);
    
    let nextTier = null;
    if (!tier) nextTier = { ...tiers[tiers.length - 1], need: tiers[tiers.length - 1].min - stats.kfiAmount };
    else {
      const upper = tiers.find(t => t.min > tier.min);
      if (upper) nextTier = { ...upper, need: upper.min - stats.kfiAmount };
    }
    
    // Submit lump-sum bonus (item 4) - SOLO ONLY (TL doesn't earn this)
    // Count cases submitted this month, excluding rejected (item 4: 当月reject的话就不算kpi)
    const submitCases = this.monthlySubmitCases({ leaderId });
    const validKpi = submitCases.filter(c => !c.is_duplicate && c.status !== 'rejected').length;
    let submitLump = 0, submitTier = null;
    const submitTiers = stats.isSolo ? SOLO_SUBMIT_TIERS : [];  // TL has no submit tiers
    if (stats.isSolo) {
      for (const t of submitTiers) {
        if (validKpi >= t.min) { submitLump = t.lump || 0; submitTier = t; break; }
      }
    }
    let nextSubmitTier = null;
    if (stats.isSolo && !submitTier && submitTiers.length) {
      nextSubmitTier = { ...submitTiers[submitTiers.length - 1], need: submitTiers[submitTiers.length - 1].min - validKpi };
    } else if (submitTier) {
      const upper = submitTiers.find(t => t.min > submitTier.min);
      if (upper) nextSubmitTier = { ...upper, need: upper.min - validKpi };
    }
    
    // Per-package bonus (item 9) - replaces fixed YTAA/KOMUJA
    // For each bonus_package, check disburse amount for that package this month
    let bonusCom = 0;
    const bonusBreakdown = [];
    const allDisburseCases = this.monthlyDisburseCases({ leaderId }).filter(c => !c.is_duplicate);
    
    if (BONUS_PACKAGES && BONUS_PACKAGES.length > 0) {
      for (const bp of BONUS_PACKAGES) {
        const pkgCases = allDisburseCases.filter(c => c.package_id === bp.package_id);
        const pkgAmount = pkgCases.reduce((s,c) => s + (c.disburse_amount || 0), 0);
        const threshold = stats.isSolo ? (bp.threshold_solo || 0) : (bp.threshold_team || 0);
        const rate = bp.rate_pct || 0;
        if (pkgAmount >= threshold && threshold > 0) {
          const earned = pkgAmount * (rate / 100);
          bonusCom += earned;
          bonusBreakdown.push({
            package_id: bp.package_id,
            amount: pkgAmount,
            threshold,
            rate,
            earned
          });
        } else if (pkgAmount > 0) {
          // Track packages with disburse but didn't hit threshold (for showing "almost there")
          bonusBreakdown.push({
            package_id: bp.package_id,
            amount: pkgAmount,
            threshold,
            rate,
            earned: 0,
            shortfall: threshold - pkgAmount
          });
        }
      }
    } else {
      // Fallback: legacy YTAA + KOMUJA fixed bonus (if no bonus_packages configured)
      const bonusThreshold = stats.isSolo ? YTAA_KOMUJA_BONUS_SOLO : YTAA_KOMUJA_BONUS_TEAM;
      bonusCom = stats.bonusKfi >= bonusThreshold ? stats.bonusKfi * (BONUS_RATE_PCT / 100) : 0;
    }
    
    return {
      kfiCom, bonusCom, submitLump,
      total: kfiCom + bonusCom + submitLump,
      rate, tier, nextTier, tiers,
      submitTier, nextSubmitTier, submitTiers, validKpi,
      bonusBreakdown,
      bonusKfi: stats.bonusKfi,
      bonusThreshold: stats.isSolo ? YTAA_KOMUJA_BONUS_SOLO : YTAA_KOMUJA_BONUS_TEAM,
      bonusEarned: bonusCom > 0,
      stats
    };
  },
  
  csRanking(branchId = null) {
    // Only include staff who DO CS work (CS + Solo who also key payslips)
    // Excludes: Boss (admin), Manager, Kerani (admin role), Team Leaders
    let users = DB.users().filter(u => u.role === 'cs' || u.role === 'solo');
    if (branchId) users = users.filter(u => u.branch_id === branchId);
    return users.map(u => {
      const s = this.csStats(u.id);
      return { user: u, ...s };
    }).sort((a, b) => b.total - a.total);
  },
  
  teamRanking(branchId = null) {
    let leaders = DB.users().filter(u => u.role === 'leader' || u.role === 'solo');
    if (branchId) leaders = leaders.filter(u => u.branch_id === branchId);
    return leaders.map(l => {
      const s = this.leaderStats(l.id);
      return { user: l, ...s };
    }).sort((a, b) => b.kfiAmount - a.kfiAmount);
  },
  
  awards(branchId = null) {
    const csRank = this.csRanking(branchId);
    const leaderRank = this.teamRanking(branchId);
    return {
      topPayslip: csRank[0] || null,
      topKpi: leaderRank.slice().sort((a,b) => b.kpi - a.kpi)[0],
      topKfi: leaderRank[0]
    };
  },
  
  // ============ NEW v5 HELPERS ============
  
  // Stale cases: cases stuck in same status > N days (for Leader nudges)
  staleCases(leaderId, daysThreshold = 3) {
    const now = Date.now();
    const cutoff = daysThreshold * 24 * 60 * 60 * 1000;
    const cases = this.allCases({ leaderId });
    return cases.filter(c => {
      if (['disbursed', 'rejected'].includes(c.status)) return false;
      // Find when status was last set
      const audit = c.audit_log || [];
      const lastStatusChange = audit.slice().reverse().find(a => a.changes && a.changes.status);
      const referenceDate = lastStatusChange 
        ? new Date(lastStatusChange.date).getTime() 
        : new Date(c.date_payslip).getTime();
      return (now - referenceDate) > cutoff;
    }).map(c => {
      const audit = c.audit_log || [];
      const lastStatusChange = audit.slice().reverse().find(a => a.changes && a.changes.status);
      const referenceDate = lastStatusChange 
        ? new Date(lastStatusChange.date) 
        : new Date(c.date_payslip);
      const daysStale = Math.floor((now - referenceDate.getTime()) / (24 * 60 * 60 * 1000));
      return { ...c, daysStale };
    }).sort((a, b) => b.daysStale - a.daysStale);
  },
  
  // Get cases by specific year-month (for historical view)
  casesByYM(ym, opts = {}) {
    let cases = DB.cases();
    if (opts.csId) cases = cases.filter(c => c.source_cs_id === opts.csId);
    if (opts.leaderId) cases = cases.filter(c => c.leader_id === opts.leaderId);
    if (opts.branchId) cases = cases.filter(c => c.branch_id === opts.branchId);
    return cases.filter(c => c.date_payslip && c.date_payslip.startsWith(ym));
  },
  
  // CS stats for any month
  csStatsForMonth(csId, ym) {
    const all = DB.cases().filter(c => c.source_cs_id === csId);
    const payslipCases = all.filter(c => c.date_payslip && c.date_payslip.startsWith(ym));
    const submitCases = all.filter(c => c.date_submitted && c.date_submitted.startsWith(ym) && this.KPI_STATUSES.includes(c.status));
    const disburseCases = all.filter(c => c.date_disbursed && c.date_disbursed.startsWith(ym) && c.status === 'disbursed');
    const rejectCases = all.filter(c => c.date_rejected && c.date_rejected.startsWith(ym) && c.status === 'rejected');
    return {
      total: payslipCases.length,
      submitted: submitCases.length,
      disbursed: disburseCases.length,
      rejected: rejectCases.length,
      disburseAmount: disburseCases.reduce((s,c) => s + (c.disburse_amount || 0), 0),
      lostAmount: rejectCases.reduce((s,c) => s + (c.loan_amount || 0), 0),
      cases: payslipCases
    };
  },
  
  // Leader stats for any month
  leaderStatsForMonth(leaderId, ym) {
    const all = DB.cases().filter(c => c.leader_id === leaderId);
    const payslipCases = all.filter(c => c.date_payslip && c.date_payslip.startsWith(ym));
    const submitCases = all.filter(c => c.date_submitted && c.date_submitted.startsWith(ym) && this.KPI_STATUSES.includes(c.status));
    const disburseCases = all.filter(c => c.date_disbursed && c.date_disbursed.startsWith(ym) && c.status === 'disbursed');
    const rejectCases = all.filter(c => c.date_rejected && c.date_rejected.startsWith(ym) && c.status === 'rejected');
    const bonusCases = disburseCases.filter(c => ['YTAA','KOMUJA'].includes(c.package_id));
    return {
      total: payslipCases.length,
      submitted: submitCases.length,
      kpi: submitCases.length,
      disbursed: disburseCases.length,
      rejected: rejectCases.length,
      kfiAmount: disburseCases.reduce((s,c) => s + (c.disburse_amount || 0), 0),
      loanSubmission: submitCases.reduce((s,c) => s + (c.loan_amount || 0), 0),
      lostAmount: rejectCases.reduce((s,c) => s + (c.loan_amount || 0), 0),
      bonusKfi: bonusCases.reduce((s,c) => s + (c.disburse_amount || 0), 0)
    };
  },
  
  // Available months in DB for history selector
  availableMonths() {
    const set = new Set();
    DB.cases().forEach(c => {
      if (c.date_payslip) set.add(c.date_payslip.slice(0,7));
    });
    // Always include current month and last 3 months
    const now = new Date();
    for (let i = 0; i < 4; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      set.add(d.toISOString().slice(0,7));
    }
    return Array.from(set).sort().reverse();
  },
  
  // Weekly Report - for current week or given week start
  weeklyReport(weekStart, branchFilter = null) {
    if (!weekStart) {
      const now = new Date();
      const day = now.getDay();
      const diff = day === 0 ? -6 : 1 - day;  // Monday as week start
      now.setDate(now.getDate() + diff);
      weekStart = now;
    }
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);
    const startStr = weekStart.toISOString().slice(0,10);
    const endStr = weekEnd.toISOString().slice(0,10);
    
    let leaders = DB.users().filter(u => u.role === 'leader' || u.role === 'solo');
    if (branchFilter) leaders = leaders.filter(u => u.branch_id === branchFilter);
    const inRange = (date) => date && date >= startStr && date <= endStr;
    
    const teamData = leaders.map(l => {
      const teamUsers = [l, ...DB.users().filter(u => u.leader_id === l.id)];
      
      // Aggregate weekly stats per team
      const allCases = DB.cases().filter(c => c.leader_id === l.id);
      const payslipsThisWeek = allCases.filter(c => inRange(c.date_payslip));
      const submitsThisWeek = allCases.filter(c => inRange(c.date_submitted));
      const disbursesThisWeek = allCases.filter(c => inRange(c.date_disbursed) && c.status === 'disbursed');
      const rejectsThisWeek = allCases.filter(c => inRange(c.date_rejected));
      
      // Calling - aggregate daily activities for team members this week
      let totalCalls = 0, totalWA = 0;
      teamUsers.forEach(u => {
        DB.activities().forEach(a => {
          if (a.cs_id === u.id && inRange(a.date)) {
            totalCalls += a.calls || 0;
            totalWA += a.whatsapp || 0;
          }
        });
      });
      
      // Potential - submitted/approved (not yet disbursed) RM
      const potentialCases = allCases.filter(c => ['submitted', 'approved'].includes(c.status));
      const potentialAmt = potentialCases.reduce((s,c) => s + (c.loan_amount || 0), 0);
      
      return {
        leader: l,
        teamUsers,
        kfi: disbursesThisWeek.reduce((s,c) => s + (c.disburse_amount || 0), 0),
        kfiCount: disbursesThisWeek.length,
        calling: totalCalls,
        whatsapp: totalWA,
        payslip: payslipsThisWeek.length,
        closing: disbursesThisWeek.length,
        submitting: submitsThisWeek.length,
        potential: potentialAmt,
        potentialCount: potentialCases.length,
        rejected: rejectsThisWeek.length
      };
    }).sort((a, b) => b.kfi - a.kfi);
    
    return { weekStart: startStr, weekEnd: endStr, teamData };
  },
  
  // Notification counts (computed live, no persistent state)
  notificationCount(user) {
    let count = 0;
    if (Permissions.isAdminLevel(user)) {
      // Admin/Manager: count of new payslip in last 24h, pending cases needing review
      const recentCutoff = Date.now() - 24 * 60 * 60 * 1000;
      let allCases = DB.cases();
      if (!Permissions.canViewAllBranches(user)) {
        allCases = allCases.filter(c => !c.branch_id || c.branch_id === user.branch_id);
      }
      const newCases = allCases.filter(c => 
        c.status === 'new' && new Date(c.date_payslip).getTime() > recentCutoff
      ).length;
      count = newCases;
    } else if (this.isLeaderRole(user)) {
      // Leader: count of "new" payslips for them + stale cases
      const newCount = this.allCases({ leaderId: user.id }).filter(c => c.status === 'new').length;
      const staleCount = this.staleCases(user.id, 3).length;
      count = newCount + staleCount;
    } else if (user.role === 'cs') {
      // CS: count of disbursed cases this month not yet "seen"
      const cases = this.allCases({ csId: user.id });
      const lastSeen = DB.lastSeen(user.id, 'disbursed');
      const recentDisbursed = cases.filter(c => 
        c.status === 'disbursed' && c.date_disbursed && 
        new Date(c.date_disbursed).getTime() > lastSeen
      ).length;
      count = recentDisbursed;
    }
    return count;
  }
};

// ==================== UI HELPERS ====================
function fmt(n) { 
  if (n === null || n === undefined) return '0';
  return Number(n).toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtK(n) {
  if (!n || n === 0) return '0';
  if (n >= 1000) return (n / 1000).toFixed(2).replace(/\.0$/, '') + 'k';
  return String(n);
}
function fmtRM(n) { return 'RM ' + fmt(n); }
function initials(name) { 
  return name.substring(0, 2).toUpperCase(); 
}
function pkgName(id) {
  const p = LOAN_PACKAGES.find(p => p.id === id);
  return p ? p.name : id;
}
function teamName(leaderId) {
  const l = DB.user(leaderId);
  return l ? l.name : '—';
}
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
function showModal(html) {
  const m = document.getElementById('modal');
  m.innerHTML = `<div class="modal-sheet"><div class="modal-handle"></div>${html}</div>`;
  m.classList.add('show');
  m.onclick = (e) => { if (e.target === m) hideModal(); };
}
function hideModal() {
  document.getElementById('modal').classList.remove('show');
}

// Status flow helper
function nextStatuses(current) {
  return STATUS_FLOW[current] || [];
}

// ==================== APP RENDER ROUTER ====================
const App = {
  state: { currentScreen: 'login', tabState: {}, filterState: {} },
  
  render() {
    const user = Auth.current();
    const app = document.getElementById('app');
    document.body.classList.add('app-ready');  // signals first render done
    
    if (!user) {
      this.state.currentScreen = 'login';
      document.body.classList.add('login-mode');
      app.innerHTML = this.renderLogin();
      app.querySelector('#screen-login').classList.add('active');
      this.bindLogin();
      this.renderPersonaBar();
      return;
    }
    
    // Logged in
    document.body.classList.remove('login-mode');
    this.renderPersonaBar();
    const screen = this.state.currentScreen === 'login' ? this.defaultScreen(user) : this.state.currentScreen;
    
    let content = '';
    switch (screen) {
      case 'cs-dashboard': content = this.renderCSDashboard(user); break;
      case 'cs-cases': content = this.renderCSCases(user); break;
      case 'cs-report': content = this.renderCSReport(user); break;
      case 'daily-report': content = this.renderDailyReport(user); break;
      case 'leader-dashboard': content = this.renderLeaderDashboard(user); break;
      case 'leader-report': content = this.renderLeaderReport(user); break;
      case 'admin-dashboard': 
        // Kerani can't access admin dashboard - redirect to customers
        if (user.role === 'kerani') { this.state.currentScreen = 'admin-customers'; return this.render(); }
        content = this.renderAdminDashboard(user); break;
      case 'admin-rankings': 
        if (user.role === 'kerani') { this.state.currentScreen = 'admin-customers'; return this.render(); }
        content = this.renderAdminRankings(user); break;
      case 'admin-staff': 
        if (user.role === 'kerani') { this.state.currentScreen = 'admin-customers'; return this.render(); }
        content = this.renderAdminStaff(user); break;
      case 'admin-customers': content = this.renderAdminCustomers(user); break;
      case 'admin-weekly': 
        if (user.role === 'kerani') { this.state.currentScreen = 'admin-customers'; return this.render(); }
        content = this.renderAdminWeekly(user); break;
      case 'admin-koperasi': 
        if (user.role === 'kerani') { this.state.currentScreen = 'admin-customers'; return this.render(); }
        content = this.renderAdminKoperasi(user); break;
      case 'admin-announcements': 
        if (user.role === 'kerani') { this.state.currentScreen = 'admin-customers'; return this.render(); }
        content = this.renderAdminAnnouncements(user); break;
      case 'admin-export': 
        content = this.renderAdminExport(user); break;
      case 'admin-settings': 
        if (!Permissions.canEditSettings(user)) { content = this.renderAdminDashboard(user); break; }
        content = this.renderAdminSettings(user); break;
      case 'add-case': content = this.renderAddCase(user); break;
      default: content = this.renderCSDashboard(user);
    }
    
    app.innerHTML = content + this.renderBottomNav(user, screen) + this.renderFab(screen);
    this.bindCommonEvents();
    if (screen === 'add-case') this.bindAddCase(user);
    if (screen.startsWith('cs-') || screen.startsWith('leader-')) this.bindTargets(user);
  },
  
  defaultScreen(user) {
    if (user.role === 'kerani') return 'admin-customers';   // Admin (kerani) only sees customers
    if (Permissions.isAdminLevel(user)) return 'admin-dashboard';
    if (Logic.isLeaderRole(user)) return 'leader-dashboard';
    return 'cs-dashboard';
  },
  
  goto(screen) {
    this.state.currentScreen = screen;
    this.render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  },
  
  renderPersonaBar() {
    const bar = document.getElementById('persona-bar');
    const isDev = location.search.includes('dev=1');
    if (!isDev) {
      // Production mode: hide persona switcher entirely
      bar.style.display = 'none';
      bar.innerHTML = '';
      return;
    }
    bar.style.display = '';
    const cur = Auth.current();
    const showcase = ['anis', 'faizah', 'atirah', 'wilson'];
    bar.innerHTML = '<span class="lbl">DEV · Switch as</span>' + 
      showcase.map(id => {
        const u = DB.user(id);
        if (!u) return '';
        const active = cur && cur.id === id ? 'active' : '';
        return `<button class="${active}" onclick="App.demoSwitch('${id}')">${u.name} · ${u.role}</button>`;
      }).join('') + 
      `<button onclick="App.resetDemo()" style="background: rgba(245, 197, 24, 0.2); color: var(--accent-light);">↻ Reset</button>` +
      (cur ? `<button onclick="App.logout()">Logout</button>` : '');
  },
  
  resetDemo() {
    if (!confirm('Reset all data? (Cases, activities, sessions akan reset balik)')) return;
    localStorage.clear();
    DB.seed(true);
    DB.setSession('wilson');
    this.state.currentScreen = 'login';
    this.render();
    toast('✓ Demo data reset');
  },
  
  demoSwitch(userId) {
    DB.setSession(userId);
    this.state.currentScreen = 'login';  // Will be redirected to default
    this.render();
  },
  
  logout() {
    Auth.logout();
    this.state.currentScreen = 'login';
    this.render();
  },

    const isDev = location.search.includes('dev=1');
    return `

            <label>Password</label>

  },
  
  bindLogin() {
    document.getElementById('login-name')?.focus();
  },
  
  doLogin() {
    const name = document.getElementById('login-name').value.trim();
    const pass = document.getElementById('login-pass').value;
    const err = document.getElementById('login-error');
    const result = Auth.login(name, pass);
    if (!result.ok) {
      err.textContent = result.error;
      err.classList.add('show');
      if (result.locked) {
        err.style.background = '#FEE2E2';
        err.style.color = '#991B1B';
        err.style.padding = '10px 14px';
        err.style.borderRadius = '10px';
        err.style.fontWeight = '700';
      }
      return;
    }
    err.classList.remove('show');
    this.state.currentScreen = this.defaultScreen(result.user);
    this.render();

  targetItem(field, current, target) {
    const pct = Math.min(100, (current / target) * 100);
    const done = current >= target;
    return `
      <div class="target-item">
        <div class="target-progress" onclick="App.editTarget('${field}')">${current}<span class="of">/</span><span class="total">${target}</span></div>

        <div class="target-bar"><div class="target-bar-fill ${done ? 'done' : ''}" style="width: ${pct}%;"></div></div>
      </div>
    `;
  },
  
  editTarget(field) {
    const user = Auth.current();
    if (Permissions.isAdminLevel(user)) return;
    const current = DB.todayActivity(user.id)[field];
    const label = field === 'whatsapp' ? 'WhatsApp messages' : field === 'calls' ? 'Phone calls' : 'Payslip collected';
    showModal(`
      <div class="modal-title">Update ${label}</div>
      <div class="modal-sub">Today: ${new Date().toLocaleDateString('en-MY')}</div>
      <div class="form-group">
        <label>Current Count</label>
        <input type="number" id="target-input" value="${current}" min="0">
      </div>
      <div class="target-quick-btns">
        <button class="target-quick-btn" onclick="App.bumpTarget('${field}', 1)">+1</button>
        <button class="target-quick-btn" onclick="App.bumpTarget('${field}', 5)">+5</button>
        <button class="target-quick-btn" onclick="App.bumpTarget('${field}', 10)">+10</button>
        <button class="target-quick-btn" onclick="App.bumpTarget('${field}', 50)">+50</button>
      </div>
      <button class="submit-btn" onclick="App.saveTarget('${field}')">Save</button>
      <button class="btn-secondary" onclick="hideModal()">Cancel</button>
    `);
  },
  
  bumpTarget(field, by) {
    const input = document.getElementById('target-input');
    input.value = (parseInt(input.value) || 0) + by;
  },
  
  saveTarget(field) {
    const val = parseInt(document.getElementById('target-input').value) || 0;
    const user = Auth.current();
    DB.updateActivity(user.id, { [field]: val });
    hideModal();
    toast(`${field} updated!`);
    this.render();
  },

  },
  
  // ============ CASE CARD ============
  caseCard(c) {
    const pkg = c.package_id ? LOAN_PACKAGES.find(p => p.id === c.package_id) : null;
    const dateStr = new Date(c.date_payslip).toLocaleDateString('en-MY', { day: 'numeric', month: 'short' });
    const closed = c.status === 'disbursed';
    const rejected = c.status === 'rejected';
    const isNew = c.status === 'new';
    
    let metaBadge = '';
    if (closed) metaBadge = `<span class="badge com">Disbursed · Commission</span>`;
    else if (rejected) metaBadge = `<span class="badge no-com">No commission</span>`;
    else if (c.status === 'contacted') metaBadge = `<span class="badge">Customer contacted</span>`;
    else if (c.status === 'proposed') metaBadge = `<span class="badge">Package proposed</span>`;
    else if (c.status === 'submitted') metaBadge = `<span class="badge">Pending approval</span>`;
    else if (c.status === 'approved') metaBadge = `<span class="badge">Awaiting disburse</span>`;
    else if (isNew) metaBadge = `<span class="badge" style="background: var(--accent); color: var(--primary-dark); font-weight: 800;">Awaiting Leader</span>`;
    
    const caseTypeBadge = c.case_type === 'special' ? `<span class="badge" style="background: rgba(245, 197, 24, 0.2); color: var(--accent-deep);">Special</span>` :
                          c.case_type === 'resubmit' ? `<span class="badge" style="background: var(--info-bg); color: var(--info);">Resubmit</span>` : '';
    
    // Subtitle: for new cases show salary info; for processed cases show package
    let subtitle = '';
    if (isNew || !pkg) {
      subtitle = `Pendapatan ${fmtRM(c.jumlah_pendapatan)} · Bersih ${fmtRM(c.gaji_bersih)} (${c.gaji_bersih_pct.toFixed(0)}%)`;
    } else {
      subtitle = `${pkg.name} · ${fmtRM(c.loan_amount)} · ${c.tenor}m`;
    }
    
    return `
      <div class="case-card ${closed ? 'closed' : ''} ${rejected ? 'rejected' : ''}" onclick="App.viewCase('${c.id}')">
        <div class="case-card-top">
          <div>
            <div class="case-customer">${c.customer_name}</div>
            <div class="case-package">${subtitle}</div>
          </div>
          <span class="case-status ${c.status}">${STATUS_LABELS[c.status]}</span>
        </div>
        <div class="case-meta">
          <span>${dateStr}</span>
          ${caseTypeBadge}
          ${metaBadge}
        </div>
      </div>
    `;
  },
  
  emptyState(text) {
    return `<div class="empty-state"><div class="icon">📋</div><div class="text">${text}</div></div>`;
  },
  
  // ============ CS CASES LIST ============
  renderCSCases(user) {
    const filterStatus = this.state.filterState.csCases || 'all';
    const filterTime = this.state.filterState.csCasesTime || 'month';
    const isLeader = Logic.isLeaderRole(user);
    const searchText = (this.state.searchTextCS || '').toLowerCase();
    const dateFrom = this.state.dateFromCS || '';
    const dateTo = this.state.dateToCS || '';
    
    // Get base cases (mine or team)
    let cases;
if (isLeader && (this.state.tabState.cases || 'mine') === 'team') {
  // Use ALL cases from team, not just monthly
  cases = DB.cases().filter(c => c.leader_id === user.id);
} else if (isLeader) {
  cases = DB.cases().filter(c => c.source_cs_id === user.id);
} else {
      cases = DB.cases().filter(c => c.source_cs_id === user.id);
    }
    
    // Date range filter (overrides time chip if either set)
    if (dateFrom && dateTo) {
      cases = cases.filter(c => c.date_payslip >= dateFrom && c.date_payslip <= dateTo);
    } else if (dateFrom) {
      cases = cases.filter(c => c.date_payslip >= dateFrom);
    } else if (dateTo) {
      cases = cases.filter(c => c.date_payslip <= dateTo);
    } else {
      // Time chip filter
      if (filterTime === 'month') {
        const ym = new Date().toISOString().slice(0,7);
        cases = cases.filter(c => c.date_payslip && c.date_payslip.startsWith(ym));
      } else if (filterTime === '3months') {
        const cutoff = new Date();
        cutoff.setMonth(cutoff.getMonth() - 3);
        cases = cases.filter(c => c.date_payslip && new Date(c.date_payslip) >= cutoff);
      }
      // 'all' = no time filter
    }
    
    // Status filter
    if (filterStatus !== 'all') cases = cases.filter(c => c.status === filterStatus);
    
    // Search
    if (searchText) {
      cases = cases.filter(c => 
        c.customer_name.toLowerCase().includes(searchText) ||
        (c.ic || '').toLowerCase().includes(searchText) ||
        (c.phone || '').toLowerCase().includes(searchText)
      );
    }
    
    cases = cases.sort((a,b) => b.date_payslip.localeCompare(a.date_payslip));
    
    const tabs = isLeader ? `
      <div class="tabs">
        <button class="tab ${(this.state.tabState.cases || 'mine') === 'mine' ? 'active' : ''}" onclick="App.setTab('cases','mine')">My Cases</button>
        <button class="tab ${this.state.tabState.cases === 'team' ? 'active' : ''}" onclick="App.setTab('cases','team')">Team Cases</button>
      </div>
    ` : '';
    
    return this.topBar(user, 'Cases') + tabs + `
      <div class="search-bar">
        <input class="search-input" type="text" placeholder="Search Name, IC, or Phone..." 
               value="${this.state.searchTextCS || ''}" 
               oninput="App.setSearchCS(this.value)">
      </div>
      
      <!-- Date Range Filter -->
      <div style="padding: 0 20px 12px; display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-end;">
        <div style="flex: 1; min-width: 130px;">
          <label style="display: block; font-size: 10px; color: var(--ink-3); font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">Date From</label>
          <input type="date" value="${dateFrom}" oninput="App.setDateFilterCS('from', this.value)" style="width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border-2); font-family: inherit; font-size: 12px;">
        </div>
        <div style="flex: 1; min-width: 130px;">
          <label style="display: block; font-size: 10px; color: var(--ink-3); font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">Date To</label>

  // Boss-only: delete a case permanently from local + Firestore
  deleteCase(caseId) {
    const c = DB.caseById(caseId);
    if (!c) return;
    const user = Auth.current();
    if (!Permissions.canDelete(user)) { toast('No permission to delete'); return; }
    
    const confirmText = `DELETE customer "${c.customer_name}" permanently?\n\nThis cannot be undone.`;
    if (!confirm(confirmText)) return;
    
    // Remove from cases array
    const cases = DB.cases().filter(x => x.id !== caseId);
    DB.set(DB.K.cases, cases);
    
    // Delete from Firestore
    if (window.Cloud?.connected) {
      window.Cloud.deleteDoc('cases', caseId).then(ok => {
        console.log(ok ? '✓ Case deleted from Firestore' : '✗ Failed to delete from Firestore');
      });
    }
    
    hideModal();
    toast('Customer deleted ' + (window.Cloud?.connected ? '· synced ☁' : '· local only'));
    this.render();
  },

  recalcBulanan(forceAuto) {
    const pkgId = document.getElementById('pc-pkg')?.value;
    const amt = parseFloat(document.getElementById('pc-amt')?.value) || 0;
    const tenor = parseInt(document.getElementById('pc-tenor')?.value) || 0;
    const pkg = LOAN_PACKAGES.find(p => p.id === pkgId);
    const bulananInput = document.getElementById('pc-bulanan-input');
    if (!bulananInput) return;
    
    // Only auto-fill if user clicked the link OR field is empty
    if (forceAuto || !bulananInput.value || parseFloat(bulananInput.value) === 0) {
      if (pkg && amt > 0 && tenor > 0) {
        const auto = calcBulanan(amt, pkg.rate, tenor);
        bulananInput.value = Math.round(auto * 100) / 100;
      }
    }
  },
  
  saveProcessCase(caseId) {
    const pkgId = document.getElementById('pc-pkg').value;
    if (!pkgId) { toast('Pilih pakej dulu'); return; }
    const amt = parseFloat(document.getElementById('pc-amt').value) || 0;
    const tenor = parseInt(document.getElementById('pc-tenor').value) || 0;
    const bulananInput = document.getElementById('pc-bulanan-input');
    let bulanan = parseFloat(bulananInput.value) || 0;
    const type = document.querySelector('#pc-type .case-type-pill.active')?.dataset.val || 'normal';
    
    if (amt <= 0) { toast('Loan amount kena > 0'); return; }
    if (tenor <= 0) { toast('Tenor kena > 0'); return; }
    
    // Auto-fill bulanan if blank
    const pkg = LOAN_PACKAGES.find(p => p.id === pkgId);
    if (bulanan === 0 && pkg) {
      bulanan = calcBulanan(amt, pkg.rate, tenor);
    }
    
    const c = DB.caseById(caseId);
    const updates = {
      package_id: pkgId,
      loan_amount: amt,
      tenor: tenor,
      bulanan: bulanan,
      case_type: type
    };
    
    const today = new Date().toISOString().slice(0,10);
    if (c.status === 'new' || c.status === 'contacted') {
      updates.status = 'proposed';
      updates.date_proposed = today;
      if (!c.date_contacted) updates.date_contacted = today;
    }
    
    DB.updateCase(caseId, updates);
    toast('Package proposed · stage 3 saved');
    hideModal();
    this.render();
  },
  
  updateCaseStatus(caseId, newStatus) {
    const c = DB.caseById(caseId);
    if (!c) return;
    
    // Open status-specific form based on target status
    if (newStatus === 'proposed') {
      // PROPOSED requires filling in loan package (stage 3 form)
      // If already has package, just update status; otherwise open form
      if (c.package_id) {
        const today = new Date().toISOString().slice(0,10);
        DB.updateCase(caseId, { status: 'proposed', date_proposed: c.date_proposed || today });
        hideModal();
        toast('Status: Proposed');
        this.render();
      } else {
        return this.openProcessCase(caseId);
      }
      return;
    }
    if (newStatus === 'submitted') return this.openSubmitForm(caseId);
    if (newStatus === 'approved') return this.openApproveForm(caseId);
    if (newStatus === 'disbursed') return this.openDisburseForm(caseId);
    if (newStatus === 'pending') return this.openPendingForm(caseId);
    if (newStatus === 'potential') return this.openPotentialForm(caseId);
    if (newStatus === 'on_hold') return this.openOnHoldForm(caseId);
    if (newStatus === 'rejected') return this.openRejectForm(caseId);
    
    // Simple transitions (new → contacted, etc.)
    const today = new Date().toISOString().slice(0,10);
    const updates = { status: newStatus };
    if (newStatus === 'contacted' && !c.date_contacted) updates.date_contacted = today;
    if (newStatus === 'new') {
      // Re-open from rejected
      updates.date_rejected = null;
      updates.rejection_reason = null;
    }
    DB.updateCase(caseId, updates);
    hideModal();
    toast('Status: ' + STATUS_LABELS[newStatus]);
    this.render();
  },

  // ============ CS MONTHLY REPORT ============
  renderCSReport(user) {
    const selectedYM = this.state.selectedMonth || new Date().toISOString().slice(0,7);
    const isCurrentMonth = selectedYM === new Date().toISOString().slice(0,7);
    const stats = isCurrentMonth ? Logic.csStats(user.id) : Logic.csStatsForMonth(user.id, selectedYM);
    const com = isCurrentMonth ? Logic.csCommission(user.id) : null;
    const months = Logic.availableMonths();
    
    // Add inProgress / newCount for non-current months
    if (!isCurrentMonth) {
      stats.inProgress = stats.cases.filter(c => ['contacted', 'proposed'].includes(c.status)).length;
      stats.newCount = stats.cases.filter(c => c.status === 'new').length;
    }
    
    // Funnel data
    const funnelData = [
      { label: 'Payslip Collected', count: stats.total, color: 'var(--primary)' },
      { label: 'Contacted/Proposed', count: stats.inProgress || 0, color: '#A86F1A' },
      { label: 'Submitted', count: stats.submitted, color: 'var(--info)' },
      { label: 'Disbursed', count: stats.disbursed, color: 'var(--success)' }
    ];
    const maxCount = Math.max(...funnelData.map(f => f.count), 1);
    
    return this.topBar(user, 'Monthly Report') + `
      <div class="filter-bar">
        ${months.slice(0, 6).map(ym => {
          const d = new Date(ym + '-01');
          const label = d.toLocaleDateString('en-MY', { month: 'short', year: '2-digit' });
          return `<div class="filter-chip ${selectedYM === ym ? 'active' : ''}" onclick="App.setMonth('${ym}')">${label}${ym === new Date().toISOString().slice(0,7) ? ' (Now)' : ''}</div>`;

      <div class="info-banner">

            const pct = (f.count / maxCount) * 100;
            const convRate = i > 0 && funnelData[0].count > 0 ? Math.round((f.count / funnelData[0].count) * 100) : 100;
            return `

  exportCSV() {
    const user = Auth.current();
    let cases = DB.cases();
    // Branch filter
    if (!Permissions.canViewAllBranches(user)) {
      cases = cases.filter(c => c.branch_id === user.branch_id || (!c.branch_id && user.branch_id === DB.branches().find(b => b.id !== 'hq')?.id));
    }
    const rows = [['Date Payslip', 'Branch', 'CS', 'Team Leader', 'Customer', 'IC', 'Phone', 'Pendapatan', 'Potongan', 'Gaji Bersih', 'Peratus', 'Package', 'Loan Amount', 'Tenor', 'Bulanan', 'Case Type', 'Status', 'Disburse Amount', 'Rejection Reason']];
    cases.forEach(c => {
      const cs = DB.user(c.source_cs_id);
      const leader = DB.user(c.leader_id);
      const branch = DB.branch(c.branch_id);
      rows.push([
        c.date_payslip, branch?.name || '', cs?.name || c.source_cs_id, leader?.name || c.leader_id,
        c.customer_name, c.ic, c.phone || '',
        c.jumlah_pendapatan, c.jumlah_potongan, c.gaji_bersih, c.gaji_bersih_pct?.toFixed(2) + '%',
        pkgName(c.package_id) || '', c.loan_amount || '', c.tenor || '', c.bulanan?.toFixed(2) || '',
        c.case_type || '', STATUS_LABELS[c.status] || c.status,
        c.disburse_amount?.toFixed(2) || '', c.rejection_reason || ''
      ]);
    });
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `awara_cases_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('CSV downloaded');
  },
  
  // ============ ADMIN RANKINGS ============
  renderAdminRankings(user) {
    // Permission check: only Boss + Manager can see rankings
    if (!Permissions.canSeeRanking(user)) {
      return this.topBar(user, 'Access Denied') + `
        <div style="padding: 60px 40px; text-align: center;">
          <div style="font-size: 48px; margin-bottom: 16px;">🔒</div>
          <div style="font-weight: 800; font-size: 18px; color: var(--ink); margin-bottom: 8px;">Tidak Ada Akses</div>
          <div style="font-size: 13px; color: var(--ink-3); max-width: 320px; margin: 0 auto;">
            Hanya Boss dan Manager boleh melihat Rankings.
          </div>
        </div>
      `;
    }
    
    const tab = this.state.tabState.adminRank || 'cs';
    const branches = DB.branches().filter(b => b.id !== 'hq');
    
    // Branch filter: HQ/Boss can pick any branch, others locked to own branch
    const canPickBranch = Permissions.canViewAllBranches(user) || user.role === 'admin';
    const selectedBranch = canPickBranch 
      ? (this.state.rankingBranch || 'all') 
      : user.branch_id;

    // Filter users by branch
    const filterByBranch = (users) => {
      if (selectedBranch === 'all') return users;
      return users.filter(u => u.branch_id === selectedBranch);
    };
    
    // ====== Build enriched ranking data with all 5 metrics ======
    // CS Ranking: Payslip / KPI / KFI / Com / Special Com
    const csUsers = filterByBranch(DB.users().filter(u => u.role === 'cs' || u.role === 'solo'));
    const csRows = csUsers.map(u => {
      const stats = Logic.csStats(u.id);
      const csCom = Logic.csCommission(u.id);  // CS commission (payslip + submit)
      const leaderCom = u.role === 'solo' ? Logic.leaderCommission(u.id) : null;
      const specialCom = leaderCom ? leaderCom.bonusCom : 0;
      const totalCom = csCom.total + (leaderCom ? leaderCom.total : 0);
      const branchName = DB.branch(u.branch_id)?.name || '';
      return {
        user: u, branchName,
        payslip: stats.total,
        kpi: stats.submitted,
        kfi: stats.disburseAmount,
        com: totalCom,
        specialCom: specialCom
      };
    }).sort((a, b) => b.payslip - a.payslip);
    
    // Team Ranking: Team's Payslip / KPI / KFI / Com / Special Com
    const teamLeaders = filterByBranch(DB.users().filter(u => u.role === 'leader' || u.role === 'solo'));
    const teamRows = teamLeaders.map(l => {
      const stats = Logic.leaderStats(l.id);
      const leaderCom = Logic.leaderCommission(l.id);
      const branchName = DB.branch(l.branch_id)?.name || '';
      return {
        user: l, branchName,
        payslip: stats.total,
        kpi: stats.kpi,
        kfi: stats.kfiAmount,
        com: leaderCom.total,
        specialCom: leaderCom.bonusCom
      };
    }).sort((a, b) => b.kfi - a.kfi);
    
    const formatRow = (r, i, idPrefix) => `
      <div class="ranking-card ${i === 0 ? 'gold' : ''}" onclick="App.viewStaffCustomers('${r.user.id}')" style="cursor: pointer; padding: 14px 16px;" title="Click to see customers">

          <div class="rank-name">${idPrefix}${r.user.name}${r.user.role === 'solo' ? ' <span class="solo-badge">Solo</span>' : ''}${selectedBranch === 'all' && r.branchName ? ` <span style="font-size:10px; font-weight:600; color:var(--ink-3); background:var(--cream-2); padding:2px 6px; border-radius:6px;">${r.branchName}</span>` : ''}</div>
