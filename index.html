      });
      
      // Sort by total payslip desc
      targets.sort((a, b) => (staffActivity[b.id]?.payslip || 0) - (staffActivity[a.id]?.payslip || 0));
      targets.forEach(u => {
        const s = staffActivity[u.id];
        const branch = DB.branch(u.branch_id);
        const activeD = s.activeDays || 1;
        sumRows.push([
          u.name, ROLE_LABELS[u.role] || u.role, branch?.name || '',
          s.calls, s.whatsapp, s.payslip, s.activeDays,
          (s.calls / activeD).toFixed(1), (s.whatsapp / activeD).toFixed(1), (s.payslip / activeD).toFixed(2)
        ]);
      });
      
      // Sheet 2: Daily breakdown (pivot: staff × day)
      const dailyRows = [];
      dailyRows.push(['DAILY CALLS PER STAFF']);
      dailyRows.push(['Name', ...days.map(d => d.slice(5))]);  // MM-DD
      targets.forEach(u => {
        const s = staffActivity[u.id];
        dailyRows.push([u.name, ...days.map(d => s.byDay[d]?.calls || 0)]);
      });
      dailyRows.push([]);
      dailyRows.push(['DAILY WHATSAPP PER STAFF']);
      dailyRows.push(['Name', ...days.map(d => d.slice(5))]);
      targets.forEach(u => {
        const s = staffActivity[u.id];
        dailyRows.push([u.name, ...days.map(d => s.byDay[d]?.whatsapp || 0)]);
      });
      dailyRows.push([]);
      dailyRows.push(['DAILY PAYSLIP PER STAFF']);
      dailyRows.push(['Name', ...days.map(d => d.slice(5))]);
      targets.forEach(u => {
        const s = staffActivity[u.id];
        dailyRows.push([u.name, ...days.map(d => s.byDay[d]?.payslip || 0)]);
      });
      
      if ((this.state.exportFormat || 'xlsx') === 'xlsx') {
        downloadAsExcel(filename.replace('.csv', '.xlsx'), [
          { name: 'Summary', rows: sumRows },
          { name: 'Daily Breakdown', rows: dailyRows }
        ]);
        toast(`Report downloaded: ${filename.replace('.csv', '.xlsx')}`);
        return;
      } else {
        rows = [...sumRows, [], [], ...dailyRows];
      }
    }
    
    if (rows.length <= 4) { toast('No data for this filter'); return; }
    
    // Output as Excel (default) or CSV based on user preference
    const format = this.state.exportFormat || 'xlsx';
    if (format === 'xlsx') {
      // For Excel, use multi-sheet if data has natural sections, otherwise single sheet
      const xlsxFilename = filename.replace('.csv', '.xlsx');
      
      // Detect multi-section reports by looking for "═══" header markers
      const sections = [];
      let currentSection = { name: 'Sheet1', rows: [] };
      
      rows.forEach(row => {
        const firstCell = String(row[0] || '');
        // Section header: starts with ═══
        if (firstCell.startsWith('═══')) {
          if (currentSection.rows.length > 0) {
            sections.push(currentSection);
          }
          const name = firstCell.replace(/═/g, '').trim().split('(')[0].trim();
          currentSection = { name: name.substring(0, 31) || 'Detail', rows: [row] };
        } else {
          currentSection.rows.push(row);
        }
      });
      if (currentSection.rows.length > 0) sections.push(currentSection);
      
      // If only one section, just dump everything into one sheet
      if (sections.length <= 1) {
        downloadAsExcel(xlsxFilename, [{ name: 'Report', rows: rows }]);
      } else {
        // Multi-section: first is overview/summary, rest are detail
        downloadAsExcel(xlsxFilename, sections);
      }
      toast(`Report downloaded: ${xlsxFilename}`);
      return;
    }
    
    // CSV fallback
    
    const csv = rows.map(r => r.map(v => `"${String(v == null ? '' : v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    toast(`Report downloaded: ${filename}`);
  },

  // ============ Tier Editor (for commission tiers) ============
  renderTierEditor(key, tiers, minLabel, rateLabel, rateField, rateStep) {
    return `
      <div id="tier-${key}">
        ${tiers.map((t, i) => `
          <div class="form-row" style="align-items: end; gap: 8px; margin-bottom: 6px;">
            <div class="form-group" style="margin: 0;">
              <label>${minLabel}</label>
              <input type="number" value="${t.min}" step="${key.includes('kfi') ? 1000 : 1}" min="0" oninput="App.updateTier('${key}', ${i}, 'min', parseFloat(this.value)||0)">
            </div>
            <div class="form-group" style="margin: 0;">
              <label>${rateLabel}</label>
              <input type="number" value="${t[rateField]}" step="${rateStep}" min="0" oninput="App.updateTier('${key}', ${i}, '${rateField}', parseFloat(this.value)||0)">
            </div>
            <button onclick="App.removeTier('${key}', ${i})" style="background: var(--cream); color: var(--danger); border: 1px solid rgba(184, 66, 58, 0.3); padding: 12px 14px; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 11px; cursor: pointer; height: 46px;">Remove</button>
          </div>
        `).join('')}
        <button onclick="App.addTier('${key}', '${rateField}')" style="background: var(--cream); color: var(--primary); border: 1px dashed var(--primary); padding: 10px; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; width: 100%; margin-top: 4px;">+ Add Tier</button>
      </div>
    `;
  },
  
  updateTier(key, idx, field, value) {
    this.state.settingsDirty = true;
    const d = this.state.settingsDraft;
    if (!d.commission[key]) d.commission[key] = [];
    if (!d.commission[key][idx]) return;
    d.commission[key][idx][field] = value;
  },
  addTier(key, rateField) {
    const d = this.state.settingsDraft;
    this.state.settingsDirty = true;
    if (!d.commission[key]) d.commission[key] = [];
    d.commission[key].push({ min: 0, [rateField]: 0 });
    this.render();
  },
  removeTier(key, idx) {
    const d = this.state.settingsDraft;
    this.state.settingsDirty = true;
    if (!d.commission[key]) return;
    d.commission[key].splice(idx, 1);
    this.render();
  },

  // ============ Settings Draft Helpers ============
  updateSettingsDraft(path, value) {
    this.state.settingsDirty = true;
    const d = this.state.settingsDraft;
    const parts = path.split('.');
    let obj = d;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!obj[parts[i]]) obj[parts[i]] = {};
      obj = obj[parts[i]];
    }
    obj[parts[parts.length - 1]] = value;
    // Update dirty indicator in save bar without re-rendering whole page
    const bar = document.getElementById('settings-save-bar');
    if (bar) {
      const status = bar.querySelector('div > div:nth-child(2)');
      if (status) {
        status.innerHTML = '⚠ You have unsaved changes';
      }
    }
  },
  
  saveSettings() {
    if (!Permissions.canEditSettings(Auth.current())) { toast('Hanya Boss boleh save settings'); return; }
    try {
      const draft = this.state.settingsDraft;
      // Validate: tier mins must be > 0
      const allTiers = [
        ...draft.commission.cs_payslip, 
        ...draft.commission.cs_submit,
        ...draft.commission.leader_kfi,
        ...draft.commission.solo_kfi
      ];
      const invalid = allTiers.find(t => isNaN(t.min) || t.min < 0 || isNaN(t.rate) || t.rate < 0);
      if (invalid) { toast('Invalid tier value · check all numbers'); return; }
      
      // Clean empty list items
      ['pending_reasons', 'reject_reasons'].forEach(k => {
        draft[k] = (draft[k] || []).filter(x => x && x.trim());
      });
      draft.loan_amounts = (draft.loan_amounts || []).filter(x => x > 0).sort((a,b) => a - b);
      draft.tenors = (draft.tenors || []).filter(t => t.m > 0 && t.l).sort((a,b) => a.m - b.m);
      
      DB.updateSettings(draft);
      this.state.settingsDraft = null;
      this.state.settingsDirty = false;
      toast('✓ Settings saved · synced to ' + (window.Cloud?.connected ? 'cloud ☁ · all staff get update' : 'local only'));
      this.render();
    } catch (e) {
      console.error('saveSettings:', e);
      toast('Error: ' + (e.message || 'Unknown'));
    }
  },
  
  discardSettings() {
    if (!confirm('Discard all unsaved changes?')) return;
    this.state.settingsDraft = null;
    this.state.settingsDirty = false;
    // Revert color preview
    refreshSettings();
    this.render();
  },

  async bulkDelete() {
    const selected = this.state.bulkSelected || [];
    if (!Permissions.canDelete(Auth.current())) { toast('No permission'); return; }
    
    const confirmText = `🚨 DELETE ${selected.length} customers PERMANENTLY?\n\nThis cannot be undone.\nNotification akan dihantar kepada Manager/HQ.\n\nType "DELETE" to confirm:`;
    const ans = prompt(confirmText);
    if (ans !== 'DELETE') { toast('Cancelled — confirmation tidak match'); return; }
    
    let success = 0, fail = 0;
    const user = Auth.current();
    
    for (const id of selected) {
      try {
        const c = DB.caseById(id);
        if (!c) { fail++; continue; }
        
        // Capture before delete
        const sourceCs = DB.user(c.source_cs_id);
        const leader = DB.user(c.leader_id);
        const notifData = {
          type: 'customer_deleted',
          severity: 'high',
          icon: '🗑️',
          title: 'Customer Deleted (Bulk)',
          message: `${user.name} bulk-deleted "${c.customer_name}"`,
          actor_id: user.id,
          actor_name: user.name,
          actor_role: user.role,
          case_id: id,
          customer_name: c.customer_name,
          customer_ic: c.ic || '',
          customer_phone: c.phone || '',
          case_status: c.status || '',
          source_cs_name: sourceCs?.name || '',
          leader_name: leader?.name || '',
          branch_id: c.branch_id || '',
          deleted_at: Date.now(),
          bulk_delete: true
        };
        
        // Delete the case
        const cases = DB.cases().filter(x => x.id !== id);
        DB.set(DB.K.cases, cases);
        if (window.Cloud?.connected) {
          window.Cloud.deleteDoc('cases', id).catch(console.error);
        }
        
        // Fire notification to relevant people (parallel, fire-and-forget but logged)
        const recipientIds = Logic.getNotifyRecipientsForCase(user.id, c);
        Promise.all(recipientIds.map(uid => DB.addNotification(uid, notifData)))
          .catch(err => Logger.error('Bulk delete notify failed:', err));
        
        success++;
      } catch (e) { 
        console.error('Bulk delete error:', e);
        fail++; 
      }
    }
    
    hideModal();

  downloadBackup() {
    try {
      const backup = {
        version: '1.0',
        exported_at: new Date().toISOString(),
        exported_by: Auth.current()?.name || 'unknown',
        data: {
          users: DB.users(),
          cases: DB.cases(),

          settings: DB.settings(),
          notifications: DB.get(DB.K.notifications, {})
        }
      };
      
      const json = JSON.stringify(backup, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      const today = new Date().toISOString().slice(0, 10);
      const filename = `AWARA_backup_${today}.json`;
      
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      
      const sizeKB = (json.length / 1024).toFixed(1);
      toast(`✓ Backup downloaded · ${filename} · ${sizeKB} KB`);
      console.log(`📦 Backup created: ${filename}, ${sizeKB} KB, includes ${backup.data.users.length} users, ${backup.data.cases.length} cases`);

    if (!user || ['admin', 'hq', 'kerani'].includes(user.role)) return '';
    const noFab = ['add-case', 'login'];

    return `<button class="fab" onclick="App.goto('add-case')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>`;
  },
  
  bindCommonEvents() {
    // Auto-logout after 30 min idle (security)
    this.setupIdleTimeout();
  },
  
  // ============ SESSION IDLE TIMEOUT (30 min) ============
  // Auto-logout if user inactive for 30 mins. Re-set on any mouse/keyboard/touch.
  // Stored in App.state to be reset on every render() also.
  setupIdleTimeout() {
    if (this._idleSetup) return;  // only setup once
    this._idleSetup = true;
    const IDLE_LIMIT_MS = 30 * 60 * 1000;  // 30 minutes
    
    const resetIdleTimer = () => {
      if (this._idleTimer) clearTimeout(this._idleTimer);
      const user = Auth.current();
      if (!user) return;  // not logged in, nothing to do
      this._idleTimer = setTimeout(() => {
        const stillLoggedIn = Auth.current();
        if (!stillLoggedIn) return;
        // Show warning
        toast('⏰ Session expired (30 min idle) · Logging out...');
        setTimeout(() => {
          Auth.logout();
          this.state.currentScreen = 'login';
          this.state.notifFilter = null;
          this.render();
        }, 1500);
      }, IDLE_LIMIT_MS);
    };
    
    // Reset on any user activity
    ['mousedown', 'keydown', 'touchstart', 'scroll'].forEach(evt => {
      document.addEventListener(evt, resetIdleTimer, { passive: true });
    });
    resetIdleTimer();  // start the timer
  }
};

// ==================== INIT ====================
const SCHEMA_VERSION = '10.0';

async function bootstrap() {
  // Schema migration — use DB.remove to also clear in-memory cache
  const ver = localStorage.getItem('awara_schema_version');
  if (ver !== SCHEMA_VERSION) {
    DB.remove(DB.K.users);
    DB.remove(DB.K.cases);
    DB.remove(DB.K.activities);
    DB.remove(DB.K.session);
    DB.remove(DB.K.customer_notes);
    DB.remove(DB.K.seen);
    DB.remove(DB.K.koperasi);
    DB.remove(DB.K.announcements);
    DB.remove(DB.K.settings);
    localStorage.setItem('awara_schema_version', SCHEMA_VERSION);
  }
  
  // Try to load from Firestore first (if Cloud connected)
  if (window.Cloud?.connected) {
    try {
      // ⚠ Sign in to shared service account FIRST so Firestore rules let us read
      if (window.Cloud.ensureAuth) {
        const authed = await window.Cloud.ensureAuth();
        if (!authed) {
          console.warn('⚠ Shared auth not ready · Firestore reads may fail · falling back to local cache');
          toastIfReady('⚠ Cloud auth failed · using local cache only');
        }
      }
      
      const cloudUsers = await window.Cloud.getAll('users');
      
      if (cloudUsers.length > 0) {
        // Firestore has data → use it
        console.log("Loading from Firestore...", cloudUsers.length, "users");
        DB.set(DB.K.users, cloudUsers);
        
        const [cloudCases, cloudActs, cloudNotes, cloudKoperasi, cloudAnns, cloudSettings, cloudBranches, cloudNotifs] = await Promise.all([
          window.Cloud.getAll('cases'),
          window.Cloud.getAll('activities'),
          window.Cloud.getAll('customer_notes'),
          window.Cloud.getAll('koperasi'),
          window.Cloud.getAll('announcements'),
          window.Cloud.getDoc('settings', 'main'),
          window.Cloud.getAll('branches'),
          window.Cloud.getAll('notifications')
        ]);
        
        DB.set(DB.K.cases, cloudCases);
        DB.set(DB.K.activities, cloudActs);
        
        const notesObj = {};
        cloudNotes.forEach(n => { if (n.ic) notesObj[n.ic] = n.note; });
        DB.set(DB.K.customer_notes, notesObj);
        
        DB.set(DB.K.koperasi, cloudKoperasi.length > 0 ? cloudKoperasi : DEFAULT_PACKAGES);
        DB.set(DB.K.announcements, cloudAnns);
        
        // Notifications: each doc has shape { userId, items: [...] } - flatten into { userId: items }
        const notifMap = {};
        (cloudNotifs || []).forEach(doc => {
          if (doc.userId && Array.isArray(doc.items)) {
            notifMap[doc.userId] = doc.items;
          }
        });
        DB.set(DB.K.notifications, notifMap);
        
        // Settings: use cloud or default
        if (cloudSettings) {
          DB.set(DB.K.settings, cloudSettings);
        } else {
          DB.set(DB.K.settings, DEFAULT_SETTINGS);
          // Upload default settings to cloud
          window.Cloud.setDoc('settings', 'main', { id: 'main', ...DEFAULT_SETTINGS });
        }
        
        // If cloud koperasi was empty, upload defaults
        if (cloudKoperasi.length === 0) {
          DEFAULT_PACKAGES.forEach(p => window.Cloud.setDoc('koperasi', p.id, p));
        }

        // Branches
        if (cloudBranches.length > 0) {
          DB.set(DB.K.branches, cloudBranches);
        } else {
          // Upload seed branches to cloud
          SEED_BRANCHES.forEach(b => window.Cloud.setDoc('branches', b.id, b));
        }
        
        // Silent sync - no toast (cloud is just a background detail to users)
        console.log("✓ Synced from cloud · " + cloudCases.length + " cases · " + cloudUsers.length + " users");
      } else {
        // Empty Firestore → seed locally + upload
        console.log("Firestore empty. Seeding...");
        DB.seed();
        await syncAllToCloud();
        console.log("✓ Initial data uploaded to cloud");
      }
      
      // Subscribe to real-time updates - all subscribers now trigger UI refresh
      // Debounced render: batches rapid simultaneous cloud updates into one render
      let _renderTimer = null;
      function debouncedRender() {
        clearTimeout(_renderTimer);
        _renderTimer = setTimeout(() => {
          if (App.state.currentScreen !== 'login') App.render();
        }, 300);
      }
      window.Cloud.subscribe('cases', items => {
        DB.set(DB.K.cases, items);
        debouncedRender();
      });
      window.Cloud.subscribe('users', items => {
        DB.set(DB.K.users, items);
        debouncedRender();
      });
      window.Cloud.subscribe('activities', items => {
        DB.set(DB.K.activities, items);
        debouncedRender();
      });
      window.Cloud.subscribe('customer_notes', items => {
        const obj = {};
        items.forEach(n => { if (n.ic) obj[n.ic] = n.note; });
        DB.set(DB.K.customer_notes, obj);
      });
      window.Cloud.subscribe('koperasi', items => {
        DB.set(DB.K.koperasi, items);
        refreshPackages();
        debouncedRender();
      });
      window.Cloud.subscribe('announcements', items => {
        DB.set(DB.K.announcements, items);
        debouncedRender();
      });
      window.Cloud.subscribe('branches', items => {
        if (items && items.length > 0) {
          DB.set(DB.K.branches, items);
          debouncedRender();
        }
      });
      // Subscribe to notifications for current user
      window.Cloud.subscribe('notifications', items => {
        const user = Auth.current();
        if (!user) return;
        const myNotif = items.find(n => n.userId === user.id);
        if (myNotif) {
          const all = DB.get(DB.K.notifications, {});
          const prevItems = all[user.id] || [];
          const prevUnreadIds = new Set(prevItems.filter(n => !n.read).map(n => n.id));
          const newItems = myNotif.items || [];
          
          // Detect newly arrived notifications (not in previous unread set)
          const arrivedNotifs = newItems.filter(n => !n.read && !prevUnreadIds.has(n.id));
          
          all[user.id] = newItems;
          DB.set(DB.K.notifications, all);
          
          // Play sound for highest-severity arrival (if any)
          if (arrivedNotifs.length > 0 && typeof App !== 'undefined' && App.playNotifSound) {
            const severities = ['high', 'medium', 'low'];
            const topSeverity = severities.find(s => arrivedNotifs.some(n => n.severity === s)) || 'medium';
            try { App.playNotifSound(topSeverity); } catch {}
          }
          
          debouncedRender();
        }
      });
      // Settings is a single doc 'main' - listen to update all clients
      window.Cloud.subscribe('settings', items => {
        const main = items.find(s => s.id === 'main');
        if (main) {
          // Don't overwrite local draft if user is editing
          if (!App.state.settingsDirty) {
            DB.set(DB.K.settings, main);
            refreshSettings();
            debouncedRender();
          } else {
            console.log('Settings cloud update received but user has unsaved local draft - ignored');
          }
        }
      });
      
    } catch (e) {
      console.error("Cloud sync failed, falling back to local:", e);
      DB.seed();
      toastIfReady("⚠ Cloud sync error · using local data");
    }
  } else {
    // No cloud - just seed local
    DB.seed();
  }
  
  // ── Migration: patch existing users missing branch_id, add HQ user if missing ──
  (() => {
    let users = DB.users();
    let changed = false;

    // Add HQ user if not exists
    if (!users.find(u => u.id === 'hq')) {
      users.push({ id: 'hq', name: 'HQ', role: 'hq', branch_id: 'hq', leader_id: null, password: 'Awara@HQ2026' });
      changed = true;
    }

    // Ensure branches exist in storage
    const storedBranches = DB.get(DB.K.branches);
    if (!storedBranches || storedBranches.length === 0) {
      DB.saveBranches(SEED_BRANCHES);
    } else {
      // Patch any missing branches from SEED_BRANCHES
      let branches = DB.branches();
      let branchChanged = false;
      SEED_BRANCHES.forEach(sb => {
        if (!branches.find(b => b.id === sb.id)) {
          branches.push(sb);
          branchChanged = true;
        }
      });
      if (branchChanged) DB.saveBranches(branches);
    }

    // Patch users missing branch_id (existing users before branch feature)
    const defaultBranch = DB.branches().find(b => b.id !== 'hq')?.id || 'branch_a';
    users = users.map(u => {
      if (!u.branch_id) { changed = true; return { ...u, branch_id: u.role === 'hq' ? 'hq' : defaultBranch }; }
      return u;
    });

    if (changed) {
      DB.set(DB.K.users, users);
      // Sync new/patched users back to cloud
      if (window.Cloud?.connected) {
        users.filter(u => u.id === 'hq' || !u.branch_id).forEach(u => 
          window.Cloud.setDoc('users', u.id, u).catch(() => {})
        );
      }
    }
  })();
  
  // Refresh dynamic LOAN_PACKAGES from DB.koperasi() + Settings from DB.settings()
  refreshPackages();
  refreshSettings();
  
  // No auto-login - show login screen first (PRODUCTION MODE)
  // (For dev/demo, append ?dev=1 to URL to use persona switcher)
  const isDev = location.search.includes('dev=1');
  if (isDev && !Auth.current()) {
    DB.setSession('wilson');  // dev mode: auto-login as admin
  }
  App.render();
}

// Upload all local data to Firestore (used for first-time seed)
async function syncAllToCloud() {
  if (!window.Cloud?.connected) return false;
  try {
    const users = DB.users();
    const cases = DB.cases();
    const acts = DB.activities();
    const notes = DB.customerNotes();
    const koperasi = DB.koperasi();
    const announcements = DB.announcements();
    
    await window.Cloud.batchSet('users', users, 'id');
    await window.Cloud.batchSet('cases', cases, 'id');
    
    const actsWithId = acts.map(a => ({...a, id: `${a.cs_id}_${a.date}`}));
    await window.Cloud.batchSet('activities', actsWithId, 'id');
    
    const noteArr = Object.entries(notes).map(([ic, note]) => ({ id: ic, ic, note }));
    if (noteArr.length > 0) await window.Cloud.batchSet('customer_notes', noteArr, 'id');
    
    if (koperasi.length > 0) await window.Cloud.batchSet('koperasi', koperasi, 'id');
    if (announcements.length > 0) await window.Cloud.batchSet('announcements', announcements, 'id');
    
    // Branches
    const branches = DB.branches();
    if (branches.length > 0) await window.Cloud.batchSet('branches', branches, 'id');
    
    // Settings is a single doc with id='main'
    const settings = DB.settings();
    await window.Cloud.setDoc('settings', 'main', { id: 'main', ...settings });
    
    console.log("✓ Synced all to cloud");
    return true;
  } catch (e) {
    console.error("syncAllToCloud error:", e);
    return false;
  }
}

function toastIfReady(msg) {
  if (typeof toast === 'function' && document.getElementById('toast-container')) {
    toast(msg);
  } else {
    console.log("[toast]", msg);
  }
}

// Wait for both DOM and Cloud to be ready before booting
let domReady = false;
let cloudReady = false;
let booted = false;

function tryBoot() {
  if (booted) return;
  // Cloud is "ready" if window.Cloud object exists (either connected or in error state)
  // OR if 8s timeout has passed
  const cloudObjectExists = typeof window.Cloud !== 'undefined';
  if (domReady && (cloudReady || cloudObjectExists)) {
    booted = true;
    bootstrap();
  }
}

window.addEventListener('DOMContentLoaded', () => { 
  domReady = true; 
  // Cloud script ran in <head> BEFORE this event, so window.Cloud should already exist
  // (Polling fallback below catches edge cases)
  tryBoot(); 
});

// Also poll for window.Cloud (head script may have completed before DOMContentLoaded listener registered)
let pollCount = 0;
const cloudPoll = setInterval(() => {
  pollCount++;
  if (typeof window.Cloud !== 'undefined' || pollCount > 80) {  // poll for 8s max
    cloudReady = true;
    clearInterval(cloudPoll);
    if (domReady) tryBoot();
  }
}, 100);

// Hard fallback: 10s
setTimeout(() => {
  if (!booted) {
    console.warn("Force-booting after 10s timeout");
    cloudReady = true;
    domReady = true;
    tryBoot();
  }
}, 10000);

// Show "Loading..." while waiting
setTimeout(() => {
  if (!domReady || !cloudReady) {
    const el = document.getElementById('app');
    if (el && !el.innerHTML.trim()) {
      const status = window.__firebaseStatus || { stage: 'unknown' };
      el.innerHTML = `
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 40px; text-align: center;">
          <div style="font-family: 'Archivo Black', sans-serif; color: var(--primary); font-size: 32px; margin-bottom: 8px;">AWARA</div>
          <div style="font-size: 12px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 30px;">Connecting to cloud...</div>
          <div style="width: 40px; height: 40px; border: 3px solid var(--cream-3); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
          <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
          <div style="font-size: 11px; color: var(--ink-3); margin-top: 24px; max-width: 280px; line-height: 1.6;">
            Stage: ${status.stage}<br>
            Loading Firebase SDK... If this stays >10s, network may be slow or Firebase domain blocked.
          </div>
        </div>
      `;
    }
  }
}, 2500);

// After boot, check cloud status + show diagnostic banner if failed
function showCloudDiagnostic() {
  if (window.Cloud?.connected) return;
  
  const fbStatus = window.__firebaseStatus || { stage: 'never-loaded', error: 'Module script never executed (likely blocked or file:// origin)' };
  const isFileProto = location.protocol === 'file:';
  
  // Show only once
  if (document.getElementById('cloud-diag-banner')) return;
  
  const banner = document.createElement('div');
  banner.id = 'cloud-diag-banner';
  banner.style.cssText = 'position: fixed; bottom: 20px; right: 20px; left: 20px; max-width: 480px; margin: 0 auto; background: #FCE8E6; border: 2px solid var(--danger); border-radius: 14px; padding: 14px 16px; z-index: 9999; font-family: "Plus Jakarta Sans", sans-serif; box-shadow: 0 8px 24px rgba(0,0,0,0.15);';
  
  let hint = '';
  if (isFileProto) {
    hint = 'You opened the file directly (<code>file://</code>). Firebase needs a hosted URL. Upload to wilsonooi.com OR use a local server (python -m http.server 8000).';
  } else if (fbStatus.stage === 'never-loaded' || fbStatus.stage === 'loading') {
    hint = 'Module script never executed. Likely: <strong>adblock/privacy extension blocking gstatic.com</strong>, OR slow network. Try: disable adblockers, try different browser.';
  } else if (fbStatus.stage.includes('failed')) {
    hint = `Failed at stage: <strong>${fbStatus.stage}</strong>. Error: <code>${fbStatus.error}</code>. Check Firestore Security Rules + Authorized Domains in Firebase Console.`;
  } else {
    hint = `Stuck at stage: <strong>${fbStatus.stage}</strong>. Check browser console (F12) for errors.`;
  }
  
  banner.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;">
      <strong style="color: var(--danger); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800;">⚠ Cloud Offline · Local Mode Active</strong>
      <button onclick="document.getElementById('cloud-diag-banner').remove()" style="background: transparent; border: none; color: var(--ink-3); font-size: 16px; cursor: pointer; padding: 0 4px;">×</button>
    </div>
    <div style="font-size: 12px; color: var(--ink-2); line-height: 1.5; margin-bottom: 8px;">${hint}</div>
    <div style="display: flex; gap: 6px;">
      <button onclick="location.reload()" style="flex: 1; background: var(--primary); color: var(--accent); border: none; padding: 8px; border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer;">↻ Reload</button>
      <button onclick="document.getElementById('cloud-diag-banner').remove()" style="flex: 1; background: var(--cream); color: var(--ink-2); border: 1px solid var(--border); padding: 8px; border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer;">Dismiss · Use Local</button>
    </div>
  `;
  document.body.appendChild(banner);
}

// Check after boot completes - only show diagnostic if truly disconnected
setTimeout(() => {
  if (window.Cloud && window.Cloud.connected) return;  // all good
  if (window.Cloud && window.Cloud.error) showCloudDiagnostic();  // error captured
  else if (typeof window.Cloud === 'undefined') showCloudDiagnostic();  // SDK didn't load at all
}, 500);

// Cloud status indicator polling (10s interval - saves mobile battery)
setInterval(() => {
  const statusEl = document.getElementById('cloud-status');
  if (!statusEl) return;
  const ok = window.Cloud?.connected;
  statusEl.textContent = ok ? '☁ ✓' : '☁ offline';
  statusEl.style.background = ok ? 'rgba(46, 125, 50, 0.2)' : 'rgba(184, 66, 58, 0.2)';
  statusEl.style.color = ok ? '#A5D6A7' : '#FFB4A8';
}, 10000);
</script>
