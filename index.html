  renderTrendChart() {
    // Last 30 days payslip count
    const days = [];
    const today = new Date();
    for (let i = 29; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const dStr = d.toISOString().slice(0,10);
      const count = DB.cases().filter(c => c.date_payslip === dStr).length;
      const disbursed = DB.cases().filter(c => c.date_disbursed === dStr && c.status === 'disbursed').length;
      days.push({ date: dStr, count, disbursed, label: d.getDate(), isFirstOfWeek: d.getDay() === 1 });
    }
    
    const maxCount = Math.max(...days.map(d => d.count), 1);
    const width = 400;
    const height = 100;
    const barWidth = width / days.length;
    
    return `
      <div class="section-header"><div class="section-title">30-Day Trend · Payslip Collection</div></div>
      <div style="padding: 0 20px;">
        <div style="background: var(--cream-2); border-radius: 14px; padding: 16px; border: 1px solid var(--border-2);">
          <svg viewBox="0 0 ${width} ${height + 30}" style="width: 100%; height: auto; display: block;">
            ${days.map((d, i) => {
              const h = (d.count / maxCount) * height;
              const x = i * barWidth + 2;
              const y = height - h;
              const w = barWidth - 4;
              const isToday = i === days.length - 1;
              return `
                <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="2" fill="${isToday ? 'var(--accent)' : 'var(--primary)'}" opacity="${isToday ? 1 : 0.8}"/>
                ${d.count > 0 ? `<text x="${x + w/2}" y="${y - 2}" text-anchor="middle" fill="var(--ink-2)" font-size="7" font-weight="700">${d.count}</text>` : ''}
                ${d.isFirstOfWeek || isToday ? `<text x="${x + w/2}" y="${height + 14}" text-anchor="middle" fill="var(--ink-3)" font-size="8" font-weight="600">${d.label}</text>` : ''}
              `;
            }).join('')}
            <text x="2" y="${height + 24}" fill="var(--ink-3)" font-size="8" font-weight="700">30 days ago</text>
            <text x="${width - 2}" y="${height + 24}" text-anchor="end" fill="var(--accent-deep)" font-size="8" font-weight="700">Today</text>
          </svg>
          <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--ink-3);">
            <span>Total 30 days: <strong style="color: var(--primary);">${days.reduce((s,d) => s + d.count, 0)} payslips</strong></span>
            <span>Avg/day: <strong style="color: var(--primary);">${(days.reduce((s,d) => s + d.count, 0) / 30).toFixed(1)}</strong></span>
          </div>
        </div>
      </div>
    `;
  },
  
  renderPackageDistribution() {
    const ym = new Date().toISOString().slice(0,7);
    const cases = DB.cases().filter(c => 
      c.date_payslip && c.date_payslip.startsWith(ym) && c.package_id
    );
    
    if (cases.length === 0) return '';
    
    const pkgCounts = {};
    cases.forEach(c => {
      pkgCounts[c.package_id] = (pkgCounts[c.package_id] || 0) + 1;
    });
    
    const sorted = Object.entries(pkgCounts)
      .map(([id, count]) => {
        const pkg = LOAN_PACKAGES.find(p => p.id === id);
        return { id, name: pkg?.name || id, count, payout: pkg?.payout };
      })
      .sort((a, b) => b.count - a.count)
      .slice(0, 8);
    
    const total = sorted.reduce((s, p) => s + p.count, 0);
    const colors = ['var(--primary)', 'var(--accent-deep)', 'var(--info)', 'var(--success)', '#A86F1A', '#6B3FB8', 'var(--danger)', 'var(--ink-2)'];
    
    return `
      <div class="section-header"><div class="section-title">Package Mix · This Month</div></div>
      <div style="padding: 0 20px;">
        <div style="background: var(--cream-2); border-radius: 14px; padding: 16px; border: 1px solid var(--border-2);">
          ${sorted.map((p, i) => {
            const pct = (p.count / total) * 100;
            return `
              <div style="margin-bottom: ${i === sorted.length - 1 ? 0 : 8}px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px;">
                  <span style="font-size: 12px; color: var(--ink); font-weight: 600;">${p.name} <span style="color: var(--ink-3); font-size: 10px; font-weight: 600;">(${p.payout}%)</span></span>
                  <span style="font-size: 11px; color: var(--primary); font-weight: 700;">${p.count} (${pct.toFixed(0)}%)</span>
                </div>
                <div style="background: var(--cream); border-radius: 4px; overflow: hidden; height: 12px;">
                  <div style="background: ${colors[i % colors.length]}; width: ${pct}%; height: 100%; border-radius: 4px;"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  },
  
  // ============ BOTTOM NAV ============
  renderBottomNav(user, currentScreen) {
    let items = [];
    if (user.role === 'cs') {
      items = [
        { icon: 'home', label: 'Home', screen: 'cs-dashboard' },
        { icon: 'list', label: 'Cases', screen: 'cs-cases' },
        { icon: 'target', label: 'Daily', screen: 'daily-report' },
        { icon: 'chart', label: 'Report', screen: 'cs-report' },
      ];
    } else if (Logic.isLeaderRole(user)) {
      items = [
        { icon: 'home', label: 'Home', screen: 'leader-dashboard' },
        { icon: 'list', label: 'Cases', screen: 'cs-cases' },
        { icon: 'target', label: 'Daily', screen: 'daily-report' },
        { icon: 'chart', label: 'Komisen', screen: 'leader-report' },
      ];
    } else {
      items = [
        { icon: 'home', label: 'Home', screen: 'admin-dashboard' },
        { icon: 'list', label: 'Customers', screen: 'admin-customers' },
        { icon: 'trophy', label: 'Rankings', screen: 'admin-rankings' },
        { icon: 'users', label: 'Staff', screen: 'admin-staff' },
      ];
    }
    items.push({ icon: 'logout', label: 'Logout', action: 'logout' });
    
    const icons = {
      home: '<path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3v-7h6v7h3a1 1 0 001-1V10"/>',
      list: '<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
      chart: '<path d="M3 3v18h18M7 16l4-8 4 6 5-10"/>',
      target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
      trophy: '<path d="M7 4h10v3a5 5 0 01-10 0V4zM5 4H3v2a3 3 0 003 3M19 4h2v2a3 3 0 01-3 3M12 14v4M8 21h8"/>',
      users: '<circle cx="9" cy="8" r="3"/><path d="M3 21a6 6 0 0112 0M16 11a3 3 0 100-6M21 21a6 6 0 00-6-6"/>',
      logout: '<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>'
    };
    
    return `
      <nav class="bottom-nav">
        ${items.map(it => {
          // Compute notification badge for specific tabs
          let badge = 0;
          if (it.screen === 'leader-dashboard' || it.screen === 'admin-dashboard' || it.screen === 'cs-dashboard') {
            badge = Logic.notificationCount(user);
          }
          return `
          <button class="nav-item ${it.screen === currentScreen ? 'active' : ''} ${it.action === 'logout' ? 'logout' : ''}" 
                  onclick="${it.action === 'logout' ? 'App.logout()' : `App.goto('${it.screen}')`}" 
                  style="position: relative;">
            <span class="icon" style="position: relative;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[it.icon]}</svg>
              ${badge > 0 ? `<span style="position: absolute; top: -4px; right: -4px; background: var(--danger); color: white; border-radius: 10px; min-width: 16px; height: 16px; font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; padding: 0 3px;">${badge > 9 ? '9+' : badge}</span>` : ''}
            </span>
            ${it.label}
          </button>
        `}).join('')}
      </nav>
    `;
  },
  
  renderFab(currentScreen) {
    const user = Auth.current();
    if (!user || user.role === 'admin') return '';  // Admin doesn't add cases via FAB
    const noFab = ['add-case', 'login'];
    if (noFab.includes(currentScreen)) return '';
    return `<button class="fab" onclick="App.goto('add-case')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>`;
  },
  
  bindCommonEvents() {
    // already bound via onclick
  }
};

// ==================== INIT ====================
const SCHEMA_VERSION = '5.0';

window.addEventListener('DOMContentLoaded', () => {
  // Auto-migrate: if old schema detected, reset
  const ver = localStorage.getItem('awara_schema_version');
  if (ver !== SCHEMA_VERSION) {
    localStorage.removeItem(DB.K.users);
    localStorage.removeItem(DB.K.cases);
    localStorage.removeItem(DB.K.activities);
    localStorage.removeItem(DB.K.session);
    localStorage.setItem('awara_schema_version', SCHEMA_VERSION);
  }
  
  DB.seed();
  // Auto-login as Anis for demo if no session
  if (!Auth.current()) {
    DB.setSession('anis');
  }
  App.render();
});
</script>
