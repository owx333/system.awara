<script>
window.__firebaseStatus = { stage: 'loading', error: null };

(function initFirebase() {
  try {
    if (typeof firebase === 'undefined') {
      throw new Error('Firebase SDK not loaded (script tags failed - possibly adblock or no network)');
    }
    window.__firebaseStatus.stage = 'sdk-loaded';
    
    const firebaseConfig = {
      apiKey: "AIzaSyCQ9wGA6mSUxk38unlhZirAjQ_gLylGz7I",
      authDomain: "awara-a8a89.firebaseapp.com",
      projectId: "awara-a8a89",
      storageBucket: "awara-a8a89.firebasestorage.app",
      messagingSenderId: "710757319807",
      appId: "1:710757319807:web:067c96d78351a76b06ab4a"
    };
    
    firebase.initializeApp(firebaseConfig);
    window.__firebaseStatus.stage = 'app-initialized';
    
    const fbDb = firebase.firestore();
    const fbAuth = firebase.auth();
    window.__firebaseStatus.stage = 'firestore-initialized';
    
    // ========== LOGGER (Cleanup console noise) ==========
    // By default, noisy debug logs are HIDDEN. Errors/warnings/important info always shown.
    // To enable verbose debug: open Console and run:
    //   localStorage.setItem('awara_debug', '1'); location.reload();
    // To disable: localStorage.removeItem('awara_debug'); location.reload();
    const DEBUG_MODE = localStorage.getItem('awara_debug') === '1';
    const Logger = {
      debug: DEBUG_MODE ? console.log.bind(console, '[DEBUG]') : () => {},
      info:  console.log.bind(console),    // Important startup/success - always show
      warn:  console.warn.bind(console),   // Always show warnings
      error: console.error.bind(console)   // Always show errors
    };
    window.Logger = Logger;
    if (DEBUG_MODE) console.log('🔧 DEBUG mode active · verbose logs enabled');
    
    // ========== SHARED AUTH (Layer 2 Security) ==========
    // Auto-signin to a shared service account so Firestore rules can require auth
    // 14 staff不需要做任何事 — completely invisible. App login still uses Name+Password.
    // Without these passwords, attackers (even with API key) cannot access Firestore.
    const SHARED_AUTH = {
      email: 'awara-service@awara.local',
      password: 'AwaraSys_2026_Kx9pL3mR_Sec'  // ⚠ if you change this in Firebase Console, update here too!
    };
    
    async function ensureSharedAuth() {
      // Already signed in? skip
      if (fbAuth.currentUser) {
        Logger.debug('🔐 Already signed in:', fbAuth.currentUser.email);
        return true;
      }
      try {
        await fbAuth.signInWithEmailAndPassword(SHARED_AUTH.email, SHARED_AUTH.password);
        console.log('🔐 Shared auth ready · Firestore unlocked');
        return true;
      } catch (e) {
        console.error('⚠ Shared auth FAILED — Firestore may be locked:', e.code, e.message);
        // Show user-friendly hint
        if (e.code === 'auth/user-not-found') {
          console.warn('💡 Setup needed: Create user "awara-service@awara.local" in Firebase Auth Console');
        } else if (e.code === 'auth/wrong-password') {
          console.warn('💡 Password mismatch — update Firebase Console OR update SHARED_AUTH.password in code');
        } else if (e.code === 'auth/operation-not-allowed') {
          console.warn('💡 Setup needed: Enable Email/Password sign-in method in Firebase Auth Console');
        }
        return false;
      }
    }
    
    // Keep session alive — if signed out somehow, re-sign-in
    fbAuth.onAuthStateChanged(user => {
      if (!user) {
        console.log('🔓 Auth state lost · re-signing in...');
        ensureSharedAuth();
      }
    });
    
    // ========== OUTBOX QUEUE (resilient writes) ==========
    // If Firestore write fails (quota exceeded, network down, etc),
    // queue the operation in localStorage and auto-retry every 60 seconds
    // and when network reconnects. Ensures NO data loss.
    
    const OUTBOX_KEY = 'awara_outbox_queue';
    const MAX_OUTBOX_SIZE = 1000;     // safety cap
    const MAX_RETRIES = 200;          // 200 retries × 60s = ~3 hours
    
    // Errors that ARE retriable (queue + retry later)
    const RETRIABLE_ERROR_CODES = [
      'resource-exhausted',     // quota exceeded
      'unavailable',            // server unreachable
      'deadline-exceeded',      // timeout
      'internal',               // server error
      'aborted',                // transaction conflict
      'cancelled',              // RPC cancelled
      'unknown'                 // unknown error
    ];
    
    function isRetriableError(error) {
      if (!error) return false;
      const code = error.code || '';
      // Check Firebase error code
      if (RETRIABLE_ERROR_CODES.some(c => code.includes(c))) return true;
      // Check error message for quota keywords
      const msg = (error.message || '').toLowerCase();
      if (msg.includes('quota') || msg.includes('limit') || 
          msg.includes('network') || msg.includes('offline')) return true;
      return false;
    }
    
    const outbox = {
      get() {
        try {
          return JSON.parse(localStorage.getItem(OUTBOX_KEY) || '[]');
        } catch { return []; }
      },
      save(queue) {
        try {
          localStorage.setItem(OUTBOX_KEY, JSON.stringify(queue));
        } catch (e) {
          console.error('Outbox save failed (localStorage full?):', e);
        }
      },
      add(op) {
        const queue = this.get();
        // Dedupe: if same collection+docId already queued, replace with latest
        const existingIdx = queue.findIndex(x => 
          x.collection === op.collection && x.docId === op.docId
        );
        const item = {
          id: Date.now() + '_' + Math.random().toString(36).slice(2,8),
          ...op,
          queued_at: Date.now(),
          retries: 0
        };
        if (existingIdx !== -1) {
          // Same doc - replace (latest write wins)
          queue[existingIdx] = item;
        } else {
          queue.push(item);
        }
        // Cap size
        if (queue.length > MAX_OUTBOX_SIZE) queue.shift();
        this.save(queue);
        console.warn(`📥 Outbox queued: ${op.op} ${op.collection}/${op.docId} (total: ${queue.length})`);
        // Update UI badge
        if (typeof App !== 'undefined' && App.render) {
          try { App.render(); } catch {}
        }
      },
      count() { return this.get().length; },
      async flush() {
        const queue = this.get();
        if (queue.length === 0) return { synced: 0, failed: 0 };
        
        Logger.debug(`📤 Outbox: attempting to flush ${queue.length} pending operations...`);
        const remaining = [];
        let synced = 0;
        
        for (const item of queue) {
          try {
            if (item.op === 'set') {
              await fbDb.collection(item.collection).doc(String(item.docId)).set(item.data);
            } else if (item.op === 'delete') {
              await fbDb.collection(item.collection).doc(String(item.docId)).delete();
            }
            synced++;
            Logger.debug(`  ✓ Synced ${item.op}: ${item.collection}/${item.docId}`);
          } catch (e) {
            item.retries = (item.retries || 0) + 1;
            item.last_error = e.code || e.message;
            item.last_attempt = Date.now();
            if (item.retries < MAX_RETRIES && isRetriableError(e)) {
              remaining.push(item);
            } else {
              console.error(`✗ Giving up: ${item.collection}/${item.docId} after ${item.retries} retries · ${item.last_error}`);
            }
          }
        }
        
        this.save(remaining);
        
        if (synced > 0) {
          Logger.debug(`✅ Outbox: ${synced} synced, ${remaining.length} still pending`);
          if (typeof toast === 'function') toast(`☁ ${synced} pending operations synced`);
          if (typeof App !== 'undefined' && App.render) {
            try { App.render(); } catch {}
          }
        }
        
        return { synced, failed: remaining.length };
      },
      clear() {
        localStorage.removeItem(OUTBOX_KEY);
      }
    };
    
    // Expose for UI badge + debugging
    window.__outbox = outbox;
    
    // Auto-flush every 60 seconds
    setInterval(() => outbox.flush().catch(console.error), 60000);
    
    // Flush immediately when network comes back
    window.addEventListener('online', () => {
      Logger.debug('🌐 Network restored, flushing outbox...');
      outbox.flush().catch(console.error);
    });
    
    // Flush 5 seconds after page load (in case quota reset overnight)
    setTimeout(() => outbox.flush().catch(console.error), 5000);
    
    // ========== Cloud API ==========
    window.Cloud = {
      enabled: true,
      connected: false,
      collections: ['users', 'cases', 'activities', 'customer_notes', 'seen', 'koperasi', 'announcements', 'settings', 'notifications', 'branches', 'login_attempts'],
      listeners: {},
      
      // Expose for bootstrap to call before Firestore reads
      ensureAuth: ensureSharedAuth,
      
      // Outbox API for UI components
      outboxCount: () => outbox.count(),
      outboxFlush: () => outbox.flush(),
      outboxClear: () => outbox.clear(),
      
      async setDoc(collectionName, docId, data) {
        try {
          const clean = JSON.parse(JSON.stringify(data));
          await fbDb.collection(collectionName).doc(String(docId)).set(clean);
          return true;
        } catch (e) {
          console.error("Cloud.setDoc error:", collectionName, docId, e.code || e.message);
          // Queue for retry if error is retriable (quota/network/temporary)
          if (isRetriableError(e)) {
            outbox.add({ op: 'set', collection: collectionName, docId, data });
          }
          return false;
        }
      },
      async deleteDoc(collectionName, docId) {
        try {
          await fbDb.collection(collectionName).doc(String(docId)).delete();
          return true;
        } catch (e) {
          console.error("Cloud.deleteDoc error:", e.code || e.message);
          if (isRetriableError(e)) {
            outbox.add({ op: 'delete', collection: collectionName, docId });
          }
          return false;
        }
      },
      async getAll(collectionName) {
        try {
          const snap = await fbDb.collection(collectionName).get();
          return snap.docs.map(d => d.data());
        } catch (e) {
          console.error("Cloud.getAll error:", collectionName, e);
          return [];
        }
      },
      async getDoc(collectionName, docId) {
        try {
          const snap = await fbDb.collection(collectionName).doc(String(docId)).get();
          return snap.exists ? snap.data() : null;
        } catch (e) {
          console.error("Cloud.getDoc error:", e);
          return null;
        }
      },
async batchSet(collectionName, items, keyField = 'id') {
  try {
    const CHUNK = 500;
    for (let i = 0; i < items.length; i += CHUNK) {
      const batch = fbDb.batch();
      items.slice(i, i + CHUNK).forEach(item => {
        const cleanItem = JSON.parse(JSON.stringify(item));
        batch.set(fbDb.collection(collectionName).doc(String(cleanItem[keyField])), cleanItem);
      });
      await batch.commit();
    }
    return true;
  } catch (e) {
    console.error("Cloud.batchSet error:", e);
    return false;
  }
},
      subscribe(collectionName, callback) {
        if (this.listeners[collectionName]) this.listeners[collectionName]();
        this.listeners[collectionName] = fbDb.collection(collectionName).onSnapshot(
          snap => {
            const items = snap.docs.map(d => d.data());
            callback(items);
          },
          err => console.error("Subscribe error:", collectionName, err)
        );
      },
      unsubscribeAll() {
        Object.values(this.listeners).forEach(fn => fn && fn());
        this.listeners = {};
      }
    };
    
    window.Cloud.connected = true;
    window.__firebaseStatus.stage = 'ready';
    console.log("Firebase Connected ✅ Project: awara-a8a89");
    window.dispatchEvent(new Event('cloud-ready'));
    
  } catch (e) {
    window.__firebaseStatus.error = (e && (e.message || String(e))) || 'Unknown error';
    window.__firebaseStatus.stage = window.__firebaseStatus.stage + '-failed';
    console.error("❌ Firebase initialization failed:", e);
    console.error("Stage:", window.__firebaseStatus.stage);
    
    window.Cloud = {
      enabled: false,
      connected: false,
      error: window.__firebaseStatus.error,
      stage: window.__firebaseStatus.stage,
      setDoc: async () => false,
      deleteDoc: async () => false,
      getAll: async () => [],
      getDoc: async () => null,
      batchSet: async () => false,
      subscribe: () => {},
      unsubscribeAll: () => {},
      ensureAuth: async () => false,  // offline mode - no auth possible
      outboxCount: () => 0,
      outboxFlush: async () => ({ synced: 0, failed: 0 }),
      outboxClear: () => {}
    };
    window.dispatchEvent(new Event('cloud-ready'));
  }
})();
</script>

.kpi-card.featured .sub { color: var(--accent-light); }
.kpi-card .currency { font-family: 'Plus Jakarta Sans'; font-size: 13px; font-weight: 800; color: var(--accent-dark); margin-right: 3px; vertical-align: 6px; }
.kpi-card.featured .currency { color: var(--accent-light); }
.kpi-card.lost { background: linear-gradient(160deg, var(--danger-bg) 0%, #F5D2CF 100%); border-color: rgba(184, 66, 58, 0.2); }
.kpi-card.lost .value { color: var(--danger); }
.kpi-card.lost .sub { color: var(--danger); opacity: 0.8; }
.kpi-card.lost .currency { color: var(--danger); }
.kpi-card.success { background: linear-gradient(160deg, var(--success-bg) 0%, #C8E5D2 100%); border-color: rgba(45, 122, 80, 0.2); }
.kpi-card.success .value { color: var(--success); }

/* Daily Targets */
.targets-card { margin: 18px 20px 0; background: var(--primary); border-radius: 18px; padding: 16px 18px; color: var(--cream); position: relative; overflow: hidden; }
.targets-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 140px; height: 140px; background: radial-gradient(circle, var(--accent) 0%, transparent 65%); opacity: 0.15; }
.targets-title { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; margin-bottom: 12px; position: relative; }
.targets-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; position: relative; }
.target-progress { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--accent); line-height: 1; cursor: pointer; }
.target-progress .of { font-size: 12px; color: rgba(245, 197, 24, 0.5); font-family: 'Plus Jakarta Sans'; font-weight: 600; margin: 0 2px; }
.target-progress .total { font-size: 13px; color: rgba(250, 247, 240, 0.6); font-family: 'Plus Jakarta Sans'; font-weight: 600; }
.target-label { font-size: 9.5px; color: rgba(250, 247, 240, 0.6); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; font-weight: 600; }
.target-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.target-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.target-bar-fill.done { background: #4ADE80; }
.target-input-modal { display: none; }
.target-quick-btns { display: flex; gap: 6px; margin-top: 10px; }
.target-quick-btn { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: var(--accent); padding: 8px 4px; border-radius: 8px; font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer; }
.target-quick-btn:active { background: var(--accent); color: var(--primary-dark); }

/* Section headers */
.section-header { display: flex; align-items: baseline; justify-content: space-between; padding: 24px 20px 10px; }
.section-title { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 500; color: var(--primary); letter-spacing: -0.01em; }
.section-action { font-size: 11px; color: var(--accent-deep); font-weight: 700; text-decoration: none; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; }

/* Case cards */
.case-list { padding: 0 20px; }
.case-card { background: var(--cream-2); border-radius: 14px; padding: 14px; margin-bottom: 8px; border: 1px solid var(--border-2); cursor: pointer; transition: transform 0.15s; }
.case-card:active { transform: scale(0.99); }
.case-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
.case-customer { font-weight: 700; font-size: 13px; color: var(--ink); line-height: 1.3; flex: 1; }
.case-package { font-size: 11px; color: var(--ink-2); margin-top: 2px; font-weight: 500; }
.case-status { padding: 3px 9px; border-radius: 10px; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; white-space: nowrap; }
.case-status.new { background: var(--cream-3); color: var(--ink-2); }
.case-status.contacted { background: #FEF0CC; color: #A86F1A; }
.case-status.proposed { background: var(--info-bg); color: var(--info); }
.case-status.submitted { background: var(--info-bg); color: var(--info); }
.case-status.approved { background: var(--success-bg); color: var(--success); }
.case-status.disbursed { background: var(--primary); color: var(--accent); }
.case-status.pending { background: #F0E4FF; color: #6B3FB8; }
.case-status.potential { background: #FFE9D6; color: #C2620C; }
.case-status.on_hold { background: #E8E8E8; color: #4A4A4A; }
.case-status.rejected { background: var(--danger-bg); color: var(--danger); }

/* Contact buttons */
.contact-row { display: flex; gap: 8px; margin-top: 8px; }
.contact-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 13px; transition: opacity 0.2s; }
.contact-btn:active { opacity: 0.85; }
.contact-btn.call { background: var(--primary); color: var(--accent); }
.contact-btn.wa { background: #25D366; color: white; }
.contact-btn.sms { background: var(--info); color: white; }
.contact-btn svg { width: 16px; height: 16px; }

/* Search bar */
.search-bar { padding: 12px 20px; }
.search-input { width: 100%; background: var(--cream-2); border: 1px solid var(--border-2); border-radius: 12px; padding: 12px 16px 12px 40px; font-family: inherit; font-size: 14px; outline: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238A8A8A' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='M21 21l-4.35-4.35'/></svg>"); background-repeat: no-repeat; background-position: 14px center; background-size: 16px; }
.search-input:focus { border-color: var(--primary); background-color: var(--cream); }

/* Stats badge for stage indicator */
.stage-pill { display: inline-block; padding: 3px 8px; border-radius: 8px; font-size: 9px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; margin-left: 4px; }
.stage-pill.s1 { background: var(--cream-3); color: var(--ink-2); }
.stage-pill.s2 { background: var(--primary-glow); color: var(--primary); }
.case-meta { display: flex; gap: 10px; font-size: 10px; color: var(--ink-3); margin-top: 6px; flex-wrap: wrap; }
.case-meta .badge { background: var(--cream-3); padding: 2px 7px; border-radius: 6px; font-weight: 600; }
.case-meta .badge.com { background: var(--success); color: white; }
.case-meta .badge.no-com { background: var(--danger-bg); color: var(--danger); }

.case-card.closed { border: 2px solid var(--success); background: linear-gradient(160deg, var(--success-bg) 0%, var(--cream-2) 80%); }
.case-card.rejected { opacity: 0.65; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--ink-3); }
.empty-state .icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
.empty-state .text { font-size: 14px; }

/* Stats list */
.stats-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
.stat-row { background: var(--cream-2); border-radius: 12px; padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border-2); }
.stat-row .stat-label { font-size: 13px; color: var(--ink-2); font-weight: 600; }
.stat-row .stat-value { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; color: var(--primary); line-height: 1; }
.stat-row .stat-value .unit { font-family: 'Plus Jakarta Sans'; font-size: 11px; color: var(--ink-3); margin-left: 4px; font-weight: 700; }
.stat-row.highlight { background: var(--primary); color: var(--cream); border: none; }
.stat-row.highlight .stat-label { color: var(--accent-light); }
.stat-row.highlight .stat-value { color: var(--accent); }
.stat-row.highlight .stat-value .unit { color: var(--accent-light); }
.stat-row.danger { background: var(--danger-bg); }
.stat-row.danger .stat-value { color: var(--danger); }
.stat-row.success { background: var(--success-bg); }
.stat-row.success .stat-value { color: var(--success); }

/* Commission */
.commission-card { margin: 0 20px 10px; background: var(--cream-2); border-radius: 14px; padding: 14px 16px; border: 1px solid var(--border-2); }
.commission-card.earned { background: linear-gradient(160deg, #E3F0E8 0%, var(--cream-2) 80%); border-color: var(--success); }
.commission-card .com-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.commission-card .com-title { font-weight: 700; font-size: 13px; color: var(--ink); }
.commission-card .com-amount { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--primary); line-height: 1; }
.commission-card.earned .com-amount { color: var(--success); }
.commission-card .com-amount .unit { font-family: 'Plus Jakarta Sans'; font-size: 12px; margin-right: 2px; color: var(--ink-3); font-weight: 700; }
.commission-card .com-sub { font-size: 11px; color: var(--ink-2); line-height: 1.5; }
.commission-card .com-progress { margin-top: 10px; background: rgba(15, 81, 50, 0.06); border-radius: 8px; padding: 8px 10px; font-size: 11px; color: var(--ink-2); }
.commission-card .com-progress strong { color: var(--primary); }
.tier-table { margin-top: 8px; font-size: 10.5px; border-radius: 8px; overflow: hidden; }
.tier-row { display: flex; justify-content: space-between; padding: 6px 10px; background: var(--cream); color: var(--ink-3); border-bottom: 1px solid var(--border-2); }
.tier-row:last-child { border-bottom: none; }
.tier-row.active { background: var(--accent); color: var(--primary-dark); font-weight: 700; }
.tier-row .rate { font-weight: 700; color: var(--primary); }
.tier-row.active .rate { color: var(--primary-dark); }

/* Team cards */
.team-card { background: var(--cream-2); border-radius: 16px; padding: 16px; margin: 0 20px 10px; border: 1px solid var(--border-2); }
.team-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-2); }
.team-avatar { width: 40px; height: 40px; border-radius: 11px; background: var(--primary); color: var(--accent); display: grid; place-items: center; font-weight: 800; font-size: 13px; font-family: 'Archivo Black', sans-serif; }
.team-avatar.cs { background: var(--accent-dark); color: var(--cream); }
.team-name { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; color: var(--primary); }
.team-role { font-size: 9px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-top: 2px; }
.team-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.team-stat .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-3); font-weight: 700; margin-bottom: 2px; }
.team-stat .val { font-family: 'Fraunces', serif; font-weight: 600; color: var(--primary); font-size: 18px; line-height: 1; }
.team-stat .val .unit { font-size: 10px; color: var(--ink-3); font-family: 'Plus Jakarta Sans'; font-weight: 700; margin-left: 2px; }

/* Rankings */
.ranking-card { background: var(--cream-2); border-radius: 13px; padding: 12px 16px; margin: 0 20px 8px; border: 1px solid var(--border-2); display: flex; align-items: center; gap: 14px; }
/* .ranking-card.gold { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: var(--cream); border: none; } */
.rank-num { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 400; color: var(--accent-deep); line-height: 1; width: 32px; flex-shrink: 0; font-style: italic; }
/* .ranking-card.gold .rank-num { color: var(--accent); } */
.rank-info { flex: 1; }
.rank-name { font-weight: 700; font-size: 14px; color: var(--ink); }
/* .ranking-card.gold .rank-name { color: var(--cream); } */
.rank-sub { font-size: 10px; color: var(--ink-3); margin-top: 2px; }
/* .ranking-card.gold .rank-sub { color: var(--accent-light); } */
.rank-stats { text-align: right; flex-shrink: 0; }
.rank-stats .pri { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; color: var(--primary); line-height: 1; letter-spacing: -0.02em; }
/* .ranking-card.gold .rank-stats .pri { color: var(--accent); } */
.rank-stats .pri-label { font-size: 8.5px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--ink-3); font-weight: 700; margin-top: 1px; }
.rank-stats .sec { font-size: 10px; color: var(--ink-2); margin-top: 4px; font-weight: 600; }
.rank-stats .sec .dim { color: var(--ink-3); font-weight: 500; }
/* .ranking-card.gold .rank-stats .sec { color: var(--accent-light); } */
/* .ranking-card.gold .rank-stats .sec .dim { color: rgba(224, 189, 137, 0.7); } */
.rank-stats .big { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 500; color: var(--primary); line-height: 1; }
/* .ranking-card.gold .rank-stats .big { color: var(--accent); } */
.rank-stats .small { font-size: 10px; color: var(--ink-3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
/* .ranking-card.gold .rank-stats .small { color: var(--accent-light); } */
.solo-badge { display: inline-block; font-size: 9px; padding: 2px 6px; background: var(--accent); color: var(--primary-dark); border-radius: 4px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; margin-left: 6px; vertical-align: middle; }

/* Awards */
.awards-grid { padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.award-card { background: linear-gradient(160deg, #FFF8E8 0%, #F4E7C3 100%); border-radius: 13px; padding: 14px 6px 12px; text-align: center; border: 1px solid var(--accent-light); position: relative; overflow: hidden; }
.award-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 80px; height: 80px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); opacity: 0.2; }
.award-card .trophy { font-size: 22px; margin-bottom: 4px; line-height: 1; position: relative; }
.award-card .category { font-size: 8.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent-deep); margin-bottom: 8px; line-height: 1.2; position: relative; }
.award-card .winner { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; color: var(--primary); line-height: 1.1; position: relative; }
.award-card .winner-role { font-size: 9px; color: var(--ink-3); margin-top: 1px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; position: relative; }
.award-card .stat { margin-top: 8px; font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--accent-deep); line-height: 1; position: relative; }
.award-card .stat .unit { font-family: 'Plus Jakarta Sans'; font-size: 9px; color: var(--ink-3); margin-left: 1px; font-weight: 600; }

/* Form */
.form-page { padding: 0 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-3); font-weight: 800; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--cream-2); border: 1px solid var(--border-2); border-radius: 11px; padding: 13px 14px; color: var(--ink); font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s, background 0.2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); background: var(--cream); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.case-type-pills { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.case-type-pill { background: var(--cream-2); border: 1px solid var(--border-2); padding: 11px; border-radius: 11px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.2s; user-select: none; }
.case-type-pill.active { background: var(--primary); color: var(--accent); border-color: var(--primary); }
.submit-btn { width: 100%; background: var(--primary); color: var(--accent); border: none; padding: 16px; border-radius: 12px; font-family: inherit; font-weight: 800; font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; margin-top: 12px; box-shadow: var(--shadow-md); transition: transform 0.15s; }
.submit-btn:active { transform: scale(0.98); }
.btn-secondary { width: 100%; background: var(--cream-2); color: var(--ink-2); border: 1px solid var(--border); padding: 13px; border-radius: 11px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; margin-top: 8px; }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(250, 247, 240, 0.96); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 8px 12px 24px; display: flex; justify-content: space-around; z-index: 90; }
.nav-item { flex: 1; background: none; border: none; color: var(--ink-3); padding: 5px 4px; cursor: pointer; font-family: inherit; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.2s; }
.nav-item.active { color: var(--primary); }
.nav-item.active .icon { background: var(--primary); color: var(--accent); }
.nav-item .icon { width: 26px; height: 26px; border-radius: 8px; background: transparent; display: grid; place-items: center; transition: all 0.2s; }
.nav-item svg { width: 16px; height: 16px; }
.nav-item.logout { color: var(--danger); }
.nav-item.logout .icon svg { stroke: var(--danger); }

/* FAB */
.fab { position: fixed; bottom: 88px; left: 50%; transform: translateX(0); margin-left: 80px; width: 54px; height: 54px; border-radius: 50%; background: var(--accent); color: var(--primary-dark); border: none; cursor: pointer; display: grid; place-items: center; box-shadow: 0 8px 24px rgba(245, 197, 24, 0.5); z-index: 95; transition: transform 0.15s; }
.fab:active { transform: scale(0.92); }
.fab svg { width: 24px; height: 24px; }

/* Tabs */
.tabs { display: flex; gap: 0; padding: 0 20px; margin: 16px 0 4px; border-bottom: 1px solid var(--border-2); }
.tab { flex: 1; background: none; border: none; padding: 10px 0 12px; font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink-3); cursor: pointer; position: relative; text-align: center; }
.tab.active { color: var(--primary); }
.tab.active::after { content: ''; position: absolute; bottom: -1px; left: 25%; right: 25%; height: 2px; background: var(--accent); border-radius: 2px; }

/* Banners */
.info-banner { margin: 14px 20px 0; padding: 11px 14px; background: var(--warning-bg); border-radius: 11px; font-size: 12px; color: var(--ink-2); border-left: 3px solid var(--warning); line-height: 1.5; }
.info-banner strong { color: var(--ink); }
.info-banner.info { background: var(--info-bg); border-left-color: var(--info); }
.info-banner.success { background: var(--success-bg); border-left-color: var(--success); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(15, 25, 19, 0.6); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-sheet { background: var(--cream); width: 100%; max-width: 480px; border-radius: 24px 24px 0 0; padding: 24px 20px 28px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--ink-3); opacity: 0.3; border-radius: 2px; margin: -8px auto 16px; }
.modal-title { font-family: 'Fraunces', serif; font-size: 20px; color: var(--primary); margin-bottom: 4px; font-weight: 500; }
.modal-sub { font-size: 12px; color: var(--ink-3); margin-bottom: 20px; }

/* Toast */
.toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: var(--primary); color: var(--accent); padding: 12px 20px; border-radius: 24px; font-size: 13px; font-weight: 700; z-index: 300; box-shadow: 0 8px 30px rgba(0,0,0,0.3); animation: toastIn 0.3s ease; }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* Status chip */
.status-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.status-chip { padding: 6px 12px; border-radius: 14px; font-size: 11px; font-weight: 700; cursor: pointer; background: var(--cream-2); color: var(--ink-2); border: 1px solid var(--border-2); }
.status-chip.active.new { background: var(--cream-3); color: var(--ink); }
.status-chip.active.contacted { background: #FEF0CC; color: #A86F1A; border-color: #A86F1A; }
.status-chip.active.proposed { background: var(--info-bg); color: var(--info); border-color: var(--info); }
.status-chip.active.submitted { background: var(--info-bg); color: var(--info); border-color: var(--info); }
.status-chip.active.approved { background: var(--success-bg); color: var(--success); border-color: var(--success); }
.status-chip.active.disbursed { background: var(--primary); color: var(--accent); border-color: var(--primary); }
.status-chip.active.rejected { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

/* Quick action card */
.qa-card { background: var(--cream-2); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid var(--border-2); cursor: pointer; }
.qa-title { font-weight: 700; font-size: 13px; color: var(--ink); }
.qa-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; }

.divider-text { padding: 10px 20px; font-size: 9px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700; text-align: center; }

  if (unit === 'payslip') return `≥ ${t.min} payslip`;

  if (unit === 'kfi') return `RM ${t.min.toLocaleString('en-MY')} disburse`;

}

  if (!s || !s.commission) return;  // first run, use defaults

    CS_PAYSLIP_TIERS = sortDesc(s.commission.cs_payslip).map(t => ({ ...t, label: buildTierLabel(t, 'payslip') }));

  if (typeof s.commission.bonus_solo === 'number') YTAA_KOMUJA_BONUS_SOLO = s.commission.bonus_solo;

function calcBulanan(loanAmount, ratePct, tenorMonths) {
  if (!loanAmount || !ratePct || !tenorMonths) return 0;
  const years = tenorMonths / 12;
  const totalInterest = loanAmount * (ratePct/100) * years;
  return (loanAmount + totalInterest) / tenorMonths;
}

function calcGajiBersih(pendapatan, potongan) {
  const bersih = (pendapatan || 0) - (potongan || 0);

// ==================== DATA LAYER (localStorage) ====================
const DB = {
  K: { 
    users: 'awara_users', cases: 'awara_cases', activities: 'awara_activities', 
    session: 'awara_session', customer_notes: 'awara_customer_notes',
    seen: 'awara_seen', koperasi: 'awara_koperasi', announcements: 'awara_announcements',
    settings: 'awara_settings', branches: 'awara_branches',
    notifications: 'awara_notifications', loginAttempts: 'awara_login_attempts'
  },
  
  // ============ IN-MEMORY CACHE (Performance) ============
  // Avoids repeated JSON.parse on every DB.users()/cases() call.
  // Invalidated automatically when DB.set() is called for the same key.
  _cache: {},
  
  // Lookup index for O(1) by-id access (rebuilt on first call, invalidated on set)
  _lookupCache: {},
  
  get(key, def = []) {
    if (this._cache.hasOwnProperty(key)) return this._cache[key];
    try { 
      const val = JSON.parse(localStorage.getItem(key)) ?? def;
      this._cache[key] = val;
      return val;
    } catch { return def; }
  },
  set(key, val) {
    try { 
      localStorage.setItem(key, JSON.stringify(val));
      this._cache[key] = val;            // Update cache
      delete this._lookupCache[key];     // Invalidate id-lookup for this key
      return true; 
    } catch (e) {
      // QuotaExceededError or SecurityError. Even in failure, update in-memory cache
      // so the UI reflects the user's intent until they refresh.
      this._cache[key] = val;
      delete this._lookupCache[key];
      if (e.name === 'QuotaExceededError' || (e.message || '').toLowerCase().includes('quota')) {
        Logger.error('localStorage QUOTA EXCEEDED for key:', key, '· data lives only in memory now');
        if (typeof toast === 'function') {
          toast('⚠ Storage penuh · data tidak save permanently. Sila download backup & contact admin.');
        }
      } else {
        Logger.error('localStorage.set failed:', e);
      }
      return false; 
    }
  },
  
  // O(1) lookup by id - builds Map index on first call, cached until set() invalidates
  _getById(key, id) {
    if (!this._lookupCache[key]) {
      const arr = this.get(key, []);
      this._lookupCache[key] = new Map(arr.map(item => [item.id, item]));
    }
    return this._lookupCache[key].get(id) || null;
  },
  
  seed(force = false) {
    if (!force && this.get(this.K.users).length > 0) return;
    this.set(this.K.users, SEED_USERS);
    this.set(this.K.branches, SEED_BRANCHES);
    this.set(this.K.cases, generateSeedCases());
    this.set(this.K.activities, generateSeedActivities());
    this.set(this.K.customer_notes, {});
    this.set(this.K.seen, {});
    this.set(this.K.koperasi, DEFAULT_PACKAGES);
    this.set(this.K.announcements, []);
    this.set(this.K.settings, DEFAULT_SETTINGS);
  },
  
  // Users
  users() { return this.get(this.K.users); },
  user(id) { return this._getById(this.K.users, id); },

  // Branches
  branches() { return this.get(this.K.branches, SEED_BRANCHES); },
  branch(id) { return this._getById(this.K.branches, id); },
  saveBranches(list) { 
    // Capture old list BEFORE updating localStorage (to detect deletions)
    const oldList = this.branches();
    this.set(this.K.branches, list);
    if (window.Cloud?.connected) {
      // Sync all current branches (add + update)
      list.forEach(b => window.Cloud.setDoc('branches', b.id, b));
      // Delete from Firestore: branches that were in oldList but NOT in new list
      const newIds = new Set(list.map(b => b.id));
      oldList.forEach(o => {
        if (!newIds.has(o.id)) {
          window.Cloud.deleteDoc('branches', o.id);
          console.log(`🗑️ Branch "${o.id}" deleted from Firestore`);
        }
      });
    }
  },
  updateUser(id, updates) {
    const users = this.users();
    const idx = users.findIndex(u => u.id === id);
    if (idx === -1) return null;
    users[idx] = { ...users[idx], ...updates };
    this.set(this.K.users, users);
    // Mirror to Firestore
    if (window.Cloud?.connected) window.Cloud.setDoc('users', id, users[idx]);
    return users[idx];
  },
  
  addUser(newUser) {
    // Centralized add-user: writes to localStorage + Firestore in one call
    const users = this.users();
    if (users.find(u => u.id === newUser.id)) return null;  // duplicate ID
    users.push(newUser);
    const ok = this.set(this.K.users, users);
    if (!ok) return null;
    // Mirror to Firestore
    if (window.Cloud?.connected) {
      window.Cloud.setDoc('users', newUser.id, newUser).catch(e => 
        console.error('Failed to sync new user to Firestore:', e)
      );
    }
    return newUser;
  },
  
  deleteUserById(id) {
    const users = this.users().filter(u => u.id !== id);
    this.set(this.K.users, users);
    if (window.Cloud?.connected) {
      window.Cloud.deleteDoc('users', id).catch(e => 
        console.error('Failed to delete user from Firestore:', e)
      );
    }
    return true;
  },
  
  // Cases
  cases() { return this.get(this.K.cases); },
  caseById(id) { return this._getById(this.K.cases, id); },
  
  casesByIC(ic) {
    if (!ic) return [];
    const cleanIC = ic.replace(/[-\s]/g, '').toLowerCase();
    return this.cases().filter(c => 
      c.ic && c.ic.replace(/[-\s]/g, '').toLowerCase() === cleanIC
    );
  },
  
  // Add a case. If IC already exists, mark as duplicate + add remark to original.
  // Duplicates are tracked but don't count toward CS payslip tier.
  addCase(data) {
    const cases = this.cases();
    const user = Auth.current();
    
    // Check duplicate by IC
const existing = cases.filter(c => c.ic === ic);
const currentYM = data.date_payslip?.slice(0, 7) || new Date().toISOString().slice(0, 7);
const sameMonthCase = existing.find(c => c.date_payslip?.slice(0, 7) === currentYM);
const isDuplicate = !!sameMonthCase;
    const originalCase = isDuplicate ? existing[0] : null;
    
    const newCase = { 
      id: 'c' + Date.now(), 
      ...data,
      branch_id: data.branch_id || this.user(data.source_cs_id)?.branch_id || null,
      is_duplicate: isDuplicate,
original_keyer: isDuplicate ? (sameMonthCase?.source_cs_id || null) : null,
duplicate_of:   isDuplicate ? (sameMonthCase?.id || null) : null,
      audit_log: [{
        date: new Date().toISOString(),
        by: user?.id || 'system',
        action: isDuplicate ? 'created_duplicate' : 'created',
        changes: { status: { from: null, to: data.status || 'new' } }
      }]
    };
    cases.unshift(newCase);
    this.set(this.K.cases, cases);
    if (window.Cloud?.connected) window.Cloud.setDoc('cases', newCase.id, newCase);
    
    // ============ NOTIFY TL/SOLO WHEN CS SUBMITS NEW PAYSLIP ============
    // Only fires for CS (not when manager/admin creates a case directly)
    // Notifies just the case leader to avoid notification overload
    if (user && user.role === 'cs' && newCase.leader_id && newCase.leader_id !== user.id) {
      const sourceCs = this.user(newCase.source_cs_id);
      const leader = this.user(newCase.leader_id);
      const branch = this.branch(newCase.branch_id);
      
      const notifData = {
        type: 'customer_new',
        severity: 'medium',
        icon: '📥',
        title: 'New Payslip from CS',
        message: `${user.name} submitted payslip for "${newCase.customer_name}"${isDuplicate ? ' (DUPLICATE)' : ''}`,
        actor_id: user.id,
        actor_name: user.name,
        actor_role: 'cs',
        case_id: newCase.id,
        customer_name: newCase.customer_name,
        customer_ic: newCase.ic || '',
        customer_phone: newCase.phone || '',
        case_status: newCase.status || 'new',
        source_cs_id: newCase.source_cs_id,
        source_cs_name: sourceCs?.name || '',
        leader_id: newCase.leader_id,
        leader_name: leader?.name || '',
        branch_id: newCase.branch_id || '',
        branch_name: branch?.name || '',
        is_duplicate: isDuplicate,
        created_at: Date.now()
      };
      
      // Just notify the leader (don't overwhelm with manager/kerani for every payslip)
      this.addNotification(newCase.leader_id, notifData);
    }
    
    // If duplicate, add remark to ORIGINAL case for tracking
    if (isDuplicate && originalCase) {
      const today = new Date().toISOString().slice(0,10);
      const remarks = (originalCase.remarks || []).slice();
      const csName = this.user(data.source_cs_id)?.name || data.source_cs_id;
      remarks.push({
        date: today,
        by: user?.id || 'system',
        text: `Duplicate keyed by CS ${csName} (Case ${newCase.id})`
      });
      this.updateCase(originalCase.id, { remarks });
    }
    
    return newCase;
  },
  
  updateCase(id, updates) {
    const cases = this.cases();
    const idx = cases.findIndex(c => c.id === id);
    if (idx === -1) return null;
    const before = cases[idx];
    const user = Auth.current();
    
    const skipFields = ['audit_log', 'remarks'];
    const changes = {};
    Object.keys(updates).forEach(k => {
      if (skipFields.includes(k)) return;
      if (JSON.stringify(before[k]) !== JSON.stringify(updates[k])) {
        changes[k] = { from: before[k], to: updates[k] };
      }
    });
    
    if (Object.keys(changes).length > 0) {
      const audit = before.audit_log || [];
      audit.push({
        date: new Date().toISOString(),
        by: user?.id || 'system',
        action: 'updated',
        changes
      });
      updates.audit_log = audit;
    }
    
    cases[idx] = { ...before, ...updates };
    this.set(this.K.cases, cases);
    if (window.Cloud?.connected) window.Cloud.setDoc('cases', id, cases[idx]);
    
    // ============ NOTIFICATION ON UPDATE ============
    // Uses unified Logic.getNotifyRecipientsForCase + rich notification data
    if (user && Object.keys(changes).length > 0) {
      const updatedCase = cases[idx];
      const changedFields = Object.keys(changes);
      const isStatusChange = changedFields.includes('status');
      const newStatus = changes.status?.to;
      const oldStatus = changes.status?.from;
      
      const sourceCs = this.user(updatedCase.source_cs_id);
      const leader = this.user(updatedCase.leader_id);
      const branch = this.branch(updatedCase.branch_id);
      
      // Build display of what changed (max 3 fields for brevity)
      const fieldLabels = {
        status: 'Status',
        customer_name: 'Name',
        ic: 'IC',
        phone: 'Phone',
        pendapatan: 'Pendapatan',
        potongan: 'Potongan',
        package_id: 'Package',
        loan_amount: 'Loan Amount',
        tenor: 'Tenor',
        case_type: 'Case Type',
        date_submitted: 'Date Submitted',
        date_approved: 'Date Approved',
        date_disbursed: 'Date Disbursed',
        approved_amount: 'Approved Amount',
        disbursed_amount: 'Disbursed Amount',
        anm_password: 'ANM Password',
        hrmis_password: 'HRMIS Password',
        majikan: 'Majikan',
        remark_admin: 'Admin Remark'
      };
      const displayFields = changedFields
        .filter(f => f !== 'audit_log' && f !== 'remarks')
        .slice(0, 3)
        .map(f => fieldLabels[f] || f);
      const moreFields = changedFields.length - displayFields.length;

let allUsers = this.users();
if (window.Cloud?.connected) {

const recipients = allUsers.filter(u =>

  // Remove a key — properly invalidates in-memory cache (use this instead of localStorage.removeItem)
  // BUG FIX: previously clearSession used localStorage.removeItem directly, but the in-memory _cache
  // still held the session data, so Auth.current() returned the old user → logout didn't redirect to login.
  remove(key) {
    localStorage.removeItem(key);
    delete this._cache[key];
    delete this._lookupCache[key];
  },

  // ── Notifications ──
  notifications(userId) {
    const all = this.get(this.K.notifications, {});
    return (all[userId] || []).sort((a,b) => b.ts - a.ts);
  },
  
  // Add a notification to a user's inbox
  // - If userId === current user: writes locally, syncs to Firestore
  // - If userId !== current user (cross-user broadcast): fetches target's existing 
  //   Firestore doc FIRST to avoid overwriting their other notifications
  async addNotification(userId, notif) {
    const newItem = { 
      id: 'n' + Date.now() + Math.random().toString(36).slice(2,6), 
      ts: Date.now(), 
      read: false, 
      ...notif 
    };
    
    const currentUser = Auth.current();
    const isSelf = currentUser?.id === userId;
    
    // Always update local storage if it's for current user
    if (isSelf) {
      const all = this.get(this.K.notifications, {});
      if (!all[userId]) all[userId] = [];
      all[userId].unshift(newItem);
      all[userId] = all[userId].slice(0, 50);
      this.set(this.K.notifications, all);
    }
    
    // Sync to Firestore
    if (window.Cloud?.connected) {
      try {
        if (isSelf) {
          // Self: write current localStorage (already up-to-date)
          const all = this.get(this.K.notifications, {});
          await window.Cloud.setDoc('notifications', userId, { 
            userId, 
            items: all[userId] || [] 
          });
          Logger.debug(`🔔 Self-notif written for ${userId}`);
        } else {
          // Cross-user: MUST fetch existing first to avoid overwriting their data!
          const existingDoc = await window.Cloud.getDoc('notifications', userId);
          const existingItems = (existingDoc?.items) || [];
          const updatedItems = [newItem, ...existingItems].slice(0, 50);
          await window.Cloud.setDoc('notifications', userId, { 
            userId, 
            items: updatedItems 
          });
          console.log(`🔔 Cross-user notif sent to ${userId} (had ${existingItems.length} previous, now ${updatedItems.length})`);
        }
        return true;
      } catch (e) {
        console.error('addNotification Firestore error for', userId, e);
        return false;
      }
    }
    return true;
  },
  
  markNotificationsRead(userId) {
    const all = this.get(this.K.notifications, {});
    if (all[userId]) all[userId] = all[userId].map(n => ({ ...n, read: true }));
    this.set(this.K.notifications, all);
    if (window.Cloud?.connected) window.Cloud.setDoc('notifications', userId, { userId, items: all[userId] || [] });
  },
  unreadCount(userId) {
    return this.notifications(userId).filter(n => !n.read).length;
  },

  // ── Login lockout ──
  loginAttempts(userId) { return this.get(this.K.loginAttempts, {})[userId] || { count: 0, lockedAt: null }; },
  recordLoginFail(userId) {
    const all = this.get(this.K.loginAttempts, {});
    const rec = all[userId] || { count: 0, lockedAt: null };
    rec.count += 1;
    if (rec.count >= 3) rec.lockedAt = Date.now();
    all[userId] = rec;
    this.set(this.K.loginAttempts, all);
    return rec;
  },
  resetLoginAttempts(userId) {
    const all = this.get(this.K.loginAttempts, {});
    delete all[userId];
    this.set(this.K.loginAttempts, all);
  },
  unlockUser(userId) {
    const all = this.get(this.K.loginAttempts, {});
    delete all[userId];
    this.set(this.K.loginAttempts, all);
    // Also update user's locked flag
    this.updateUser(userId, { locked: false });
  }
};

// ==================== AUTH ====================
// ==================== PASSWORD HASHING ====================
// Uses Web Crypto API SHA-256 (built-in browser, no library needed)
// Backward compatible: existing plaintext passwords auto-migrate on next login
const Hash = {
  async sha256(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  },
  
  // Returns true if the value looks like a SHA-256 hash (64 hex chars)
  isHashed(value) {
    return typeof value === 'string' && /^[a-f0-9]{64}$/.test(value);
  }
};

const Auth = {
  async login(nameId, password) {
    const user = DB.users().find(u => u.id === nameId.toLowerCase() || u.name.toLowerCase() === nameId.toLowerCase());
    if (!user) return { ok: false, error: 'Name ID tidak dijumpai' };
    
    // Check if account is inactive (deactivated by admin)
    if (user.inactive) {
      return { ok: false, error: 'Akaun ini telah dinyahaktifkan. Sila hubungi Manager atau Boss.' };
    }
    
    // Check if account is locked
    const attempts = DB.loginAttempts(user.id);
    if (attempts.lockedAt) {
      const manager = DB.users().find(u => ['admin', 'manager', 'hq'].includes(u.role) && u.branch_id === user.branch_id);
      return { ok: false, locked: true, error: `Akaun dikunci selepas 3 cubaan gagal. Sila hubungi ${manager ? manager.name : 'Manager'} untuk buka semula.` };
    }
    
    // Password verification: support both legacy plaintext + new hashed
    let passwordMatches = false;
    const stored = user.password;
    
    if (Hash.isHashed(stored)) {
      // New format: SHA-256 hash. Compare hashes.
      const inputHash = await Hash.sha256(password);
      passwordMatches = (inputHash === stored);
    } else {
      // Legacy plaintext: compare directly, then auto-upgrade if matched
      passwordMatches = (stored === password);
      if (passwordMatches) {
        // Migrate to hashed format silently
        const newHash = await Hash.sha256(password);
        DB.updateUser(user.id, { password: newHash });
        console.log(`🔒 Password auto-migrated to hashed for user: ${user.name}`);
      }
    }
    
    if (!passwordMatches) {
      const rec = DB.recordLoginFail(user.id);
      const remaining = 3 - rec.count;
      if (rec.count >= 3) {
        const manager = DB.users().find(u => ['admin', 'manager', 'hq'].includes(u.role) && u.branch_id === user.branch_id);
        return { ok: false, locked: true, error: `Akaun dikunci selepas 3 cubaan gagal. Sila hubungi ${manager ? manager.name : 'Manager'} untuk buka semula.` };
      }
      return { ok: false, error: `Password salah · ${remaining} cubaan lagi sebelum akaun dikunci` };
    }
    
    // Success - reset attempts
    DB.resetLoginAttempts(user.id);
    DB.setSession(user.id);
    return { ok: true, user };
  },
  logout() { DB.clearSession(); },
  current() {
    const s = DB.session();
    return s ? DB.user(s.userId) : null;
  }
};

// ==================== BUSINESS LOGIC ====================
const Logic = {
  PIPELINE_STATUSES: ['new'],
  KPI_STATUSES: ['submitted', 'approved', 'disbursed'],
  
  isLeaderRole(user) {
    return user && (user.role === 'leader' || user.role === 'solo');
  },
  
  isSolo(user) {
    return user && user.role === 'solo';
  },
  
  // ============ COMPANY PROFIT CALCULATION ============
  // Calculate profit earned by company from a single case.
  // profit = disbursed_amount × commission_pct / 100
  // Only disbursed cases generate profit. Commission % comes from koperasi config.
  caseProfit(caseObj) {
    if (!caseObj || caseObj.status !== 'disbursed') return 0;
    const disbursedAmt = caseObj.disbursed_amount || caseObj.disburse_amount || 0;
    if (disbursedAmt <= 0) return 0;
    const pkg = LOAN_PACKAGES.find(p => p.id === caseObj.package_id);
    const pct = pkg?.commission_pct || 0;
    return disbursedAmt * pct / 100;
  },
  
  // Total profit across an array of cases
  totalProfit(cases) {
    return cases.reduce((sum, c) => sum + this.caseProfit(c), 0);
  },
  
  // Total profit for a month (e.g. '2026-05'), optionally filtered by branch
  monthlyProfit(ym, branchId = null) {
    let cases = DB.cases().filter(c => 
      c.status === 'disbursed' && 
      (c.date_disbursed || '').startsWith(ym)
    );
    if (branchId) cases = cases.filter(c => c.branch_id === branchId);
    return this.totalProfit(cases);
  },
  
  // Find the primary Manager user (for resign re-assignment) - first active manager
  // If no manager exists, returns null (caller must handle)
  findManager() {
    return DB.users().find(u => u.role === 'manager' && !u.inactive);
  },
  
  // Transfer all cases owned by a user (CS or Leader) to the Manager
  // Used when a staff resigns - returns count of cases transferred
  transferCasesFromUserToManager(userId) {
    const manager = this.findManager();
    if (!manager) return { ok: false, count: 0, error: 'No active Manager found' };
    
    const allCases = DB.cases();
    const now = Date.now();
    let transferred = 0;
    const updatedCases = [];
    
    allCases.forEach(c => {
      let changed = false;
      const newCase = { ...c };
      
      // CS resigning - transfer their cases (where they collected the payslip)
      if (c.source_cs_id === userId) {
        newCase.source_cs_id = manager.id;
        newCase.transferred_from_cs = userId;
        newCase.transferred_at = now;
        changed = true;
      }
      
      // Leader/Solo resigning - transfer their team's cases
      if (c.leader_id === userId) {
        newCase.leader_id = manager.id;
        newCase.transferred_from_leader = userId;
        newCase.transferred_at = now;
        changed = true;
      }
      
      if (changed) {
        transferred++;
        updatedCases.push(newCase);
      }
    });
    
    // Update local + cloud (batch)
    if (transferred > 0) {
      const cases = DB.cases();
      updatedCases.forEach(uc => {
        const idx = cases.findIndex(x => x.id === uc.id);
        if (idx !== -1) cases[idx] = uc;
      });
      DB.set(DB.K.cases, cases);
      
      // Sync to Firestore
      if (window.Cloud?.connected) {
        updatedCases.forEach(uc => {
          window.Cloud.setDoc('cases', uc.id, uc).catch(e => 
            console.error('Failed to sync transferred case:', uc.id, e)
          );
        });
      }
    }
    
    return { ok: true, count: transferred, manager: manager.name };
  },
  
  // When CS promotes to Solo/Leader, their old cases (as source_cs_id) 
  // become their OWN cases - leader_id changes from old leader to themselves
  promoteCSCases(userId, newRole) {
    if (newRole !== 'solo' && newRole !== 'leader') return { count: 0 };
    
    const allCases = DB.cases();
    const now = Date.now();
    let promoted = 0;
    const updatedCases = [];
    
    allCases.forEach(c => {
      // Only modify cases where THIS user was the CS who collected the payslip
      // AND they currently belong to a different leader (old setup)
      if (c.source_cs_id === userId && c.leader_id !== userId) {
        const newCase = {
          ...c,
          leader_id: userId,             // they now own as leader
          promoted_from_leader: c.leader_id,
          promoted_at: now
        };
        updatedCases.push(newCase);
        promoted++;
      }
    });
    
    if (promoted > 0) {
      const cases = DB.cases();
      updatedCases.forEach(uc => {
        const idx = cases.findIndex(x => x.id === uc.id);
        if (idx !== -1) cases[idx] = uc;
      });
      DB.set(DB.K.cases, cases);
      
      if (window.Cloud?.connected) {
        updatedCases.forEach(uc => {
          window.Cloud.setDoc('cases', uc.id, uc).catch(e => 
            console.error('Failed to sync promoted case:', uc.id, e)
          );
        });
      }
    }
    
    return { count: promoted };
  },
  
  // When Solo/Leader demotes to CS - reverse of promotion
  // Cases they personally collected (source=themselves, leader=themselves): leader_id → new TL
  // Cases from their team CS (source!=themselves, leader=themselves): transfer to Manager
  // (because team structure dissolves when leader becomes CS)
  demoteCases(userId, newRole, newLeaderId) {
    if (newRole !== 'cs') return { ownCount: 0, teamCount: 0 };
    if (!newLeaderId) return { ownCount: 0, teamCount: 0, error: 'New leader required' };
    
    const manager = this.findManager();
    const allCases = DB.cases();
    const now = Date.now();
    let ownCount = 0;        // their own collected cases
    let teamCount = 0;       // team cases (from their team's other CS)
    const updatedCases = [];
    
    allCases.forEach(c => {
      // Case 1: They were both source CS AND leader (Solo's own work, or TL's own collected)
      // → leader_id changes to new TL, source stays
      if (c.source_cs_id === userId && c.leader_id === userId) {
        const newCase = {
          ...c,
          leader_id: newLeaderId,
          demoted_from_role: userId,
          demoted_at: now
        };
        updatedCases.push(newCase);
        ownCount++;
      }
      // Case 2: Team Leader's team-cases (other CS collected, but TL was leader)
      // → transfer to Manager (team structure dissolves)
      else if (c.leader_id === userId && c.source_cs_id !== userId) {
        if (manager) {
          const newCase = {
            ...c,
            leader_id: manager.id,
            transferred_from_demoted_leader: userId,
            transferred_at: now
          };
          updatedCases.push(newCase);
          teamCount++;
        }
        // If no manager, leave it (will show warning to admin)
      }
    });
    
    if (updatedCases.length > 0) {
      const cases = DB.cases();
      updatedCases.forEach(uc => {
        const idx = cases.findIndex(x => x.id === uc.id);
        if (idx !== -1) cases[idx] = uc;
      });
      DB.set(DB.K.cases, cases);
      
      if (window.Cloud?.connected) {
        updatedCases.forEach(uc => {
          window.Cloud.setDoc('cases', uc.id, uc).catch(e => 
            console.error('Failed to sync demoted case:', uc.id, e)
          );
        });
      }
    }
    
    return { ownCount, teamCount, hasManager: !!manager };
  },

  // ============ NOTIFICATION RECIPIENT RESOLVER ============
  // Returns list of user IDs to notify when an action happens on a customer/case.
  // Centralizes the per-role notification rules so they stay consistent.
  //
  // Rules (per user requirements):
  //   - Boss修改   → notify HQ + branch(manager, kerani, case's TL/Solo)
  //   - HQ修改     → notify Boss + branch(manager, kerani, case's TL/Solo)
  //   - Manager修改 → notify Boss + HQ + branch(kerani, case's TL/Solo)
  //   - Kerani修改 → notify Boss + HQ + branch(manager, case's TL/Solo)
  //   - TL/Solo修改 → notify Boss + HQ + branch(manager, kerani)
  //   - CS修改     → notify branch(case's TL/Solo, manager)
  //
  // Always excludes:
  //   - The actor themselves
  //   - Inactive users
  getNotifyRecipientsForCase(actorId, caseObj, opts = {}) {
    const actor = DB.user(actorId);
    if (!actor) return [];
    
    const actorRole = actor.role;
    const caseBranchId = caseObj.branch_id || DB.user(caseObj.leader_id || caseObj.source_cs_id)?.branch_id;
    const caseLeaderId = caseObj.leader_id;
    const allUsers = DB.users().filter(u => !u.inactive);
    
    const recipientIds = new Set();
    
    const addByRole = (role, sameBranchOnly = false) => {
      allUsers
        .filter(u => u.role === role && (!sameBranchOnly || u.branch_id === caseBranchId))
        .forEach(u => recipientIds.add(u.id));
    };
    
    const addCaseLeader = () => {
      if (caseLeaderId) {
        const leader = DB.user(caseLeaderId);
        if (leader && !leader.inactive && (leader.role === 'leader' || leader.role === 'solo')) {
          recipientIds.add(caseLeaderId);
        }
      }
    };
    
    if (actorRole === 'admin') {
      // Boss修改 → HQ + same-branch manager, kerani, case TL/Solo
      addByRole('hq');
      addByRole('manager', true);
      addByRole('kerani', true);
      addCaseLeader();
    } else if (actorRole === 'hq') {
      // HQ修改 → Boss + same-branch manager, kerani, case TL/Solo
      addByRole('admin');
      addByRole('manager', true);
      addByRole('kerani', true);
      addCaseLeader();
    } else if (actorRole === 'manager') {
      // Manager修改 → Boss + HQ + same-branch kerani, case TL/Solo
      addByRole('admin');
      addByRole('hq');
      addByRole('kerani', true);
      addCaseLeader();
    } else if (actorRole === 'kerani') {
      // Kerani修改 → Boss + HQ + same-branch manager, case TL/Solo
      addByRole('admin');
      addByRole('hq');
      addByRole('manager', true);
      addCaseLeader();
    } else if (actorRole === 'leader' || actorRole === 'solo') {
      // TL/Solo修改 → Boss + HQ + same-branch manager, kerani
      addByRole('hq');
      addByRole('manager', true);
      addByRole('kerani', true);
    } else if (actorRole === 'cs') {
      // CS修改 → same-branch case TL/Solo + manager
      addCaseLeader();
      addByRole('manager', true);
    }
    
    // Always exclude the actor themselves
    recipientIds.delete(actorId);
    
    // For new case notifications, only notify the case leader (avoid overload)
    if (opts.onlyLeader && caseLeaderId) {
      return [caseLeaderId];
    }
    
    return Array.from(recipientIds);
  },

    const duplicates = payslipCases.filter(c => c.is_duplicate);

    const totalDuplicates = duplicates.length;

    const submitted = submitCases.filter(c => !c.is_duplicate && c.status !== 'rejected').length;

    const rejected = rejectCases.filter(c => !c.is_duplicate).length;

    const inProgress = validPayslip.filter(c => ['contacted', 'proposed', 'submitted', 'approved'].includes(c.status)).length;
    // Pipeline = CS payslips yang Leader BELUM tekan "Contacted" lagi
    // Once leader presses contacted, case keluar dari pipeline
    // Tujuan: CS can see if leader is doing followup work or not
    const inPipeline = validPayslip.filter(c => c.status === 'new').length;

    return {

  // CS commission calculation (unchanged)
  csCommission(csId) {
    const stats = this.csStats(csId);
    let psRate = 0, psTier = null;
    for (const t of CS_PAYSLIP_TIERS) {
      if (stats.total >= t.min) { psRate = t.rate; psTier = t; break; }
    }
    const psCom = stats.total * psRate;
    
    let smRate = 0, smTier = null;
    for (const t of CS_SUBMIT_TIERS) {
      if (stats.submitted >= t.min) { smRate = t.rate; smTier = t; break; }
    }
    const smCom = stats.submitted * smRate;
    
    let psNext = null;
    if (!psTier) psNext = { rate: 1.00, min: 65, need: 65 - stats.total };
    else if (psTier.min < 100) {
      const upper = CS_PAYSLIP_TIERS.find(t => t.min > psTier.min);
      if (upper) psNext = { ...upper, need: upper.min - stats.total };
    }
    
    let smNext = null;
    if (stats.submitted < 7) smNext = { rate: 15, min: 7, need: 7 - stats.submitted };
    else if (stats.submitted < 40) {
      const upper = [15, 25, 40].find(m => m > stats.submitted);
      if (upper) {
        const upperTier = CS_SUBMIT_TIERS.find(t => t.min === upper);
        smNext = { ...upperTier, need: upper - stats.submitted };
      }
    }
    
    return { 
      psCom, smCom, total: psCom + smCom,
      psTier, psNext, psRate, smTier, smNext, smRate, stats 
    };
  },
  
  // Leader commission - based on DISBURSED amount in current month (cross-month correct)
  leaderCommission(leaderId) {
    const stats = this.leaderStats(leaderId);
    const tiers = stats.isSolo ? SOLO_KFI_TIERS : LEADER_KFI_TIERS;
    
    // KFI commission (% of disburse)
    let rate = 0, tier = null;
    for (const t of tiers) {
      if (stats.kfiAmount >= t.min) { rate = t.rate; tier = t; break; }
    }
    const kfiCom = stats.kfiAmount * (rate / 100);
    
    let nextTier = null;
    if (!tier) nextTier = { ...tiers[tiers.length - 1], need: tiers[tiers.length - 1].min - stats.kfiAmount };
    else {
      const upper = tiers.find(t => t.min > tier.min);
      if (upper) nextTier = { ...upper, need: upper.min - stats.kfiAmount };
    }
    
    // Submit lump-sum bonus (item 4) - SOLO ONLY (TL doesn't earn this)
    // Count cases submitted this month, excluding rejected (item 4: 当月reject的话就不算kpi)
    const submitCases = this.monthlySubmitCases({ leaderId });
    const validKpi = submitCases.filter(c => !c.is_duplicate && c.status !== 'rejected').length;
    let submitLump = 0, submitTier = null;
    const submitTiers = stats.isSolo ? SOLO_SUBMIT_TIERS : [];  // TL has no submit tiers
    if (stats.isSolo) {
      for (const t of submitTiers) {
        if (validKpi >= t.min) { submitLump = t.lump || 0; submitTier = t; break; }
      }
    }
    let nextSubmitTier = null;
    if (stats.isSolo && !submitTier && submitTiers.length) {
      nextSubmitTier = { ...submitTiers[submitTiers.length - 1], need: submitTiers[submitTiers.length - 1].min - validKpi };
    } else if (submitTier) {
      const upper = submitTiers.find(t => t.min > submitTier.min);
      if (upper) nextSubmitTier = { ...upper, need: upper.min - validKpi };
    }
    
    // Per-package bonus (item 9) - replaces fixed YTAA/KOMUJA
    // For each bonus_package, check disburse amount for that package this month
    let bonusCom = 0;
    const bonusBreakdown = [];
    const allDisburseCases = this.monthlyDisburseCases({ leaderId }).filter(c => !c.is_duplicate);
    
    if (BONUS_PACKAGES && BONUS_PACKAGES.length > 0) {
      for (const bp of BONUS_PACKAGES) {
        const pkgCases = allDisburseCases.filter(c => c.package_id === bp.package_id);
        const pkgAmount = pkgCases.reduce((s,c) => s + (c.disburse_amount || 0), 0);
        const threshold = stats.isSolo ? (bp.threshold_solo || 0) : (bp.threshold_team || 0);
        const rate = bp.rate_pct || 0;
        if (pkgAmount >= threshold && threshold > 0) {
          const earned = pkgAmount * (rate / 100);
          bonusCom += earned;
          bonusBreakdown.push({
            package_id: bp.package_id,
            amount: pkgAmount,
            threshold,
            rate,
            earned
          });
        } else if (pkgAmount > 0) {
          // Track packages with disburse but didn't hit threshold (for showing "almost there")
          bonusBreakdown.push({
            package_id: bp.package_id,
            amount: pkgAmount,
            threshold,
            rate,
            earned: 0,
            shortfall: threshold - pkgAmount
          });
        }
      }
    } else {
      // Fallback: legacy YTAA + KOMUJA fixed bonus (if no bonus_packages configured)
      const bonusThreshold = stats.isSolo ? YTAA_KOMUJA_BONUS_SOLO : YTAA_KOMUJA_BONUS_TEAM;
      bonusCom = stats.bonusKfi >= bonusThreshold ? stats.bonusKfi * (BONUS_RATE_PCT / 100) : 0;
    }
    
    return {
      kfiCom, bonusCom, submitLump,
      total: kfiCom + bonusCom + submitLump,
      rate, tier, nextTier, tiers,
      submitTier, nextSubmitTier, submitTiers, validKpi,
      bonusBreakdown,
      bonusKfi: stats.bonusKfi,
      bonusThreshold: stats.isSolo ? YTAA_KOMUJA_BONUS_SOLO : YTAA_KOMUJA_BONUS_TEAM,
      bonusEarned: bonusCom > 0,
      stats
    };
  },

  // Stale cases: cases stuck in same status > N days (for Leader nudges)
  staleCases(leaderId, daysThreshold = 3) {
    const now = Date.now();
    const cutoff = daysThreshold * 24 * 60 * 60 * 1000;
    const cases = this.allCases({ leaderId });
    return cases.filter(c => {
      if (['disbursed', 'rejected'].includes(c.status)) return false;
      // Find when status was last set
      const audit = c.audit_log || [];
      const lastStatusChange = audit.slice().reverse().find(a => a.changes && a.changes.status);
      const referenceDate = lastStatusChange 
        ? new Date(lastStatusChange.date).getTime() 
        : new Date(c.date_payslip).getTime();
      return (now - referenceDate) > cutoff;
    }).map(c => {
      const audit = c.audit_log || [];
      const lastStatusChange = audit.slice().reverse().find(a => a.changes && a.changes.status);
      const referenceDate = lastStatusChange 
        ? new Date(lastStatusChange.date) 
        : new Date(c.date_payslip);
      const daysStale = Math.floor((now - referenceDate.getTime()) / (24 * 60 * 60 * 1000));
      return { ...c, daysStale };
    }).sort((a, b) => b.daysStale - a.daysStale);
  },
