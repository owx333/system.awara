          <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; font-size: 10px; padding-top: 6px; border-top: 1px solid var(--border-2);">
            <div style="text-align: center;">
              <div style="font-weight: 800; color: var(--primary); font-size: 13px;">${r.payslip}</div>
              <div style="color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; font-size: 9px; font-weight: 700;">Payslip</div>
            </div>
            <div style="text-align: center;">
              <div style="font-weight: 800; color: var(--primary); font-size: 13px;">${r.kpi}</div>
              <div style="color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; font-size: 9px; font-weight: 700;">KPI</div>
            </div>
            <div style="text-align: center;">
              <div style="font-weight: 800; color: var(--primary); font-size: 13px;">${fmtK(r.kfi)}</div>
              <div style="color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; font-size: 9px; font-weight: 700;">KFI (RM)</div>
            </div>
            <div style="text-align: center;">
              <div style="font-weight: 800; color: var(--accent-deep); font-size: 13px;">${fmtK(r.com)}</div>
              <div style="color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; font-size: 9px; font-weight: 700;">Com (RM)</div>
            </div>
            <div style="text-align: center;">
              <div style="font-weight: 800; color: ${r.specialCom > 0 ? '#C2620C' : 'var(--ink-3)'}; font-size: 13px;">${r.specialCom > 0 ? fmtK(r.specialCom) : '—'}</div>
              <div style="color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; font-size: 9px; font-weight: 700;">Special</div>
            </div>
          </div>
        </div>
      </div>
    `;
    
    return this.topBar(user, 'Rankings', new Date().toLocaleDateString('en-MY', {month: 'long', year: 'numeric'}) + ' · click row to verify customers') + `
      ${canPickBranch ? `
      <div style="padding: 12px 20px 0; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
        <span style="font-size: 11px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em;">Branch:</span>
        <button onclick="App.setRankingBranch('all')" style="padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; background: ${selectedBranch === 'all' ? 'var(--primary)' : 'var(--cream-2)'}; color: ${selectedBranch === 'all' ? 'var(--cream)' : 'var(--ink)'};">All</button>

          ? (csRows.length === 0 ? this.emptyState('No data this month.') : csRows.map((r,i) => formatRow(r, i, '')).join(''))

    if (!warn) return;
    
    if (ic.length < 6) { warn.style.display = 'none'; return; }

    if (existing.length === 0) {

    // Found duplicates - show warning + multiple options
    const customer = existing[0];
    const note = DB.customerNote(ic);
    const originalCS = DB.user(customer.source_cs_id);
    const originalLeader = DB.user(customer.leader_id);
    warn.style.display = 'block';

  renderDailyHistoryTable(user) {
    const ym = this.state.dailyMonth || new Date().toISOString().slice(0,7);
    const [year, month] = ym.split('-').map(Number);
    const daysInMonth = new Date(year, month, 0).getDate();
    const acts = DB.activities().filter(a => a.cs_id === user.id);
    const today = new Date().toISOString().slice(0,10);
    
    const days = [];
    let totals = { calls: 0, whatsapp: 0, payslip: 0, hits: { c: 0, w: 0, p: 0 } };
    for (let day = 1; day <= daysInMonth; day++) {
      const dStr = `${ym}-${String(day).padStart(2,'0')}`;
      if (dStr > today) break;  // future days
      const a = acts.find(x => x.date === dStr);
      const d = new Date(dStr);
      const c = a?.calls || 0, w = a?.whatsapp || 0, p = a?.payslip || 0;
      totals.calls += c; totals.whatsapp += w; totals.payslip += p;
      if (c >= DAILY_TARGETS.calls) totals.hits.c++;
      if (w >= DAILY_TARGETS.whatsapp) totals.hits.w++;
      if (p >= DAILY_TARGETS.payslip) totals.hits.p++;
      days.push({
        date: dStr,
        label: `${day} ${d.toLocaleDateString('en-MY', { weekday: 'short' })}`,
        calls: c, whatsapp: w, payslip: p,
        isToday: dStr === today,
        isWeekend: d.getDay() === 0 || d.getDay() === 6
      });
    }
    
    return `
      <div style="display: grid; grid-template-columns: 80px 1fr 1fr 1fr; gap: 6px; font-size: 10px; color: var(--ink-3); font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; padding-bottom: 8px; border-bottom: 1px solid var(--border-2);">

        <div style="text-align: right;">WA</div>
        <div style="text-align: right;">PS</div>
      </div>
      ${days.length === 0 ? '<div style="padding: 20px; text-align: center; color: var(--ink-3); font-size: 12px;">No data for this month yet.</div>' :

          <div style="display: grid; grid-template-columns: 80px 1fr 1fr 1fr; gap: 6px; font-size: 12px; padding: 7px 0; border-bottom: 1px solid var(--border-2); ${d.isToday ? 'background: rgba(245,197,24,0.08);' : ''} ${d.isWeekend ? 'opacity: 0.6;' : ''}">
            <div style="font-weight: 700; color: ${d.isToday ? 'var(--accent-deep)' : 'var(--primary)'}; font-size: 11px;">${d.label}${d.isToday ? ' ★' : ''}</div>
            <div style="text-align: right; color: ${d.calls >= DAILY_TARGETS.calls ? 'var(--success)' : 'var(--ink-2)'}; font-weight: 600;">${d.calls}</div>
            <div style="text-align: right; color: ${d.whatsapp >= DAILY_TARGETS.whatsapp ? 'var(--success)' : 'var(--ink-2)'}; font-weight: 600;">${d.whatsapp}</div>
            <div style="text-align: right; color: ${d.payslip >= DAILY_TARGETS.payslip ? 'var(--success)' : 'var(--ink-2)'}; font-weight: 600;">${d.payslip}</div>
          </div>
        `).join('')
      }
      ${days.length > 0 ? `
        <div style="display: grid; grid-template-columns: 80px 1fr 1fr 1fr; gap: 6px; font-size: 12px; padding: 12px 0 4px; border-top: 2px solid var(--primary); margin-top: 4px;">
          <div style="font-weight: 800; color: var(--primary); font-size: 11px;">TOTAL</div>
          <div style="text-align: right; color: var(--primary); font-weight: 800;">${totals.calls}</div>
          <div style="text-align: right; color: var(--primary); font-weight: 800;">${totals.whatsapp}</div>
          <div style="text-align: right; color: var(--primary); font-weight: 800;">${totals.payslip}</div>
        </div>
        <div style="display: grid; grid-template-columns: 80px 1fr 1fr 1fr; gap: 6px; font-size: 10px; padding: 4px 0; color: var(--ink-3);">
          <div style="font-weight: 700;">Targets Hit</div>
          <div style="text-align: right; font-weight: 700; color: ${totals.hits.c > 0 ? 'var(--success)' : 'var(--ink-3)'};">${totals.hits.c}/${days.length}</div>
          <div style="text-align: right; font-weight: 700; color: ${totals.hits.w > 0 ? 'var(--success)' : 'var(--ink-3)'};">${totals.hits.w}/${days.length}</div>

  exportDailyHistory(userId) {
    const ym = this.state.dailyMonth || new Date().toISOString().slice(0,7);
    const [year, month] = ym.split('-').map(Number);
    const daysInMonth = new Date(year, month, 0).getDate();
    const acts = DB.activities().filter(a => a.cs_id === userId);
    const user = DB.user(userId);
    
    const rows = [['Date','Day','Calls','WhatsApp','Payslip','Calls Target Hit','WA Target Hit','PS Target Hit']];
    for (let day = 1; day <= daysInMonth; day++) {
      const dStr = `${ym}-${String(day).padStart(2,'0')}`;
      const a = acts.find(x => x.date === dStr);
      const d = new Date(dStr);
      const c = a?.calls || 0, w = a?.whatsapp || 0, p = a?.payslip || 0;
      rows.push([
        dStr,
        d.toLocaleDateString('en-MY', { weekday: 'long' }),
        c, w, p,
        c >= DAILY_TARGETS.calls ? 'YES' : 'NO',
        w >= DAILY_TARGETS.whatsapp ? 'YES' : 'NO',
        p >= DAILY_TARGETS.payslip ? 'YES' : 'NO'
      ]);
    }
    
    const csv = '\uFEFF' + rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${user.name}_DailyReport_${ym}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Daily report exported');
  },

  // ============ ADMIN: CUSTOMER DATABASE (Whole Company) ============
  renderAdminCustomers(user) {
    const filterStatus = this.state.filterState.adminCust || 'all';
    const filterTeam = this.state.filterState.adminCustTeam || 'all';
    const filterTime = this.state.filterState.adminCustTime || 'month';
    const filterBranch = this.state.filterState.adminCustBranch || 'all';
    const filterStaff = this.state.staffFilter || '';
    const dateFrom = this.state.dateFrom || '';
    const dateTo = this.state.dateTo || '';
    const searchText = (this.state.searchText || '').toLowerCase();
    
    let cases = DB.cases();
    
    // Branch filter: HQ sees all branches, everyone else only sees their own branch
    // Note: cases without branch_id are treated as belonging to the first non-HQ branch
    if (!Permissions.canViewAllBranches(user)) {
      cases = cases.filter(c => c.branch_id === user.branch_id || (!c.branch_id && user.branch_id === DB.branches().find(b => b.id !== 'hq')?.id));
    } else if (filterBranch !== 'all') {
      // HQ: apply optional branch filter pill
      cases = cases.filter(c => c.branch_id === filterBranch);
    }
    
    // Staff filter (from clicking ranking row)
    if (filterStaff) {
      const staff = DB.user(filterStaff);
      if (staff) {
        if (Logic.isLeaderRole(staff)) {
          cases = cases.filter(c => c.leader_id === staff.id || c.source_cs_id === staff.id);
        } else {
          cases = cases.filter(c => c.source_cs_id === staff.id);
        }
      }
    }
    
    // Date range filter (if both provided, takes precedence over Time chip)
    if (dateFrom && dateTo) {
      cases = cases.filter(c => c.date_payslip >= dateFrom && c.date_payslip <= dateTo);
    } else if (dateFrom) {
      cases = cases.filter(c => c.date_payslip >= dateFrom);
    } else if (dateTo) {
      cases = cases.filter(c => c.date_payslip <= dateTo);
    } else {
      // Time filter chip (only if no date range)
      if (filterTime === 'month') {
        const ym = new Date().toISOString().slice(0,7);
        cases = cases.filter(c => c.date_payslip && c.date_payslip.startsWith(ym));
      } else if (filterTime === '3months') {
        const cutoff = new Date();
        cutoff.setMonth(cutoff.getMonth() - 3);
        cases = cases.filter(c => c.date_payslip && new Date(c.date_payslip) >= cutoff);
      }
      // 'all' = no filter
    }
    
    // Status filter
    if (filterStatus !== 'all') cases = cases.filter(c => c.status === filterStatus);
    
    // Team filter

  recalcEditGaji() {
    const pend = parseFloat(document.getElementById('ec-pend').value) || 0;
    const pot = parseFloat(document.getElementById('ec-pot').value) || 0;
    const { bersih, pct } = calcGajiBersih(pend, pot);
    document.getElementById('ec-bersih').textContent = 'RM ' + bersih.toFixed(2);
    document.getElementById('ec-pct').textContent = pct.toFixed(2) + '%';
  },
  
  saveEditCustomer(caseId) {
    const name = document.getElementById('ec-name').value.trim();
    if (!name) { toast('Name required'); return; }
    const ic = document.getElementById('ec-ic').value.trim();
    const phone = document.getElementById('ec-phone').value.trim();
    const pend = parseFloat(document.getElementById('ec-pend').value) || 0;
    const pot = parseFloat(document.getElementById('ec-pot').value) || 0;
    const date = document.getElementById('ec-date').value;
    const { bersih, pct } = calcGajiBersih(pend, pot);
    
    DB.updateCase(caseId, {
      customer_name: name,
      ic, phone,
      jumlah_pendapatan: pend,
      jumlah_potongan: pot,
      gaji_bersih: bersih,
      gaji_bersih_pct: pct,
      date_payslip: date,
    });
    
    toast('Customer info updated');
    hideModal();
    this.render();
  },

      return `

      <div style="padding: 0 20px;">${leaders.map(userCard).join('')}</div>

          ${u2?.inactive ? `<button class="btn-secondary" style="color: #059669; border-color: rgba(5,150,105,0.3); margin-top: 8px; width: 100%;" onclick="App.reactivateStaff('${userId}')">✅ Aktifkan Semula</button>` : (userId !== Auth.current().id ? `<button class="btn-secondary" style="color: #B45309; border-color: rgba(180,83,9,0.3); margin-top: 8px; width: 100%;" onclick="App.deactivateStaff('${userId}')">⏸ Deactivate (Inactive)</button>` : '')}
          ${userId !== Auth.current().id ? `<button class="btn-secondary" style="color: var(--danger); border-color: rgba(184, 66, 58, 0.3); margin-top: 8px;" onclick="App.deleteUser('${userId}')">Delete Staff</button>` : ''}

  saveUser(userId) {
    const name = document.getElementById('eu-name').value.trim();
    const role = document.querySelector('#eu-role .case-type-pill.active').dataset.val;
    const leaderId = document.getElementById('eu-leader').value;
    const pass = document.getElementById('eu-pass').value;
    let branchId = role === 'hq' ? 'hq' : document.getElementById('eu-branch')?.value;
    
    if (!name) { toast('Name required'); return; }
    if (role === 'cs' && !leaderId) { toast('Pilih Team Leader untuk CS'); return; }
    
    const updates = { name, role };
    if (branchId) updates.branch_id = branchId;
    updates.leader_id = role === 'cs' ? leaderId : null;
    if (pass) updates.password = pass;
    
    DB.updateUser(userId, updates);  // updateUser already syncs to Cloud
    hideModal();
    toast('Staff updated' + (window.Cloud?.connected ? ' · synced ☁' : ''));
    this.render();
  },
  
  deleteUser(userId) {
    if (!confirm('Delete this staff? (Cases linked to them will keep their name)')) return;
    DB.deleteUserById(userId);
    hideModal();
    toast('Staff deleted' + (window.Cloud?.connected ? ' · synced ☁' : ''));
    this.render();
  },

  deactivateStaff(userId) {

  pickRolePill(el, prefix) {
    try {
      const parent = el.parentElement;
      parent.querySelectorAll('.case-type-pill').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      const lg = document.getElementById(`${prefix}-leader-group`);

  createUser() {
    try {
      const nameEl = document.getElementById('nu-name');
      const idEl = document.getElementById('nu-id');
      const roleEl = document.querySelector('#nu-role .case-type-pill.active');
      const leaderEl = document.getElementById('nu-leader');
      const passEl = document.getElementById('nu-pass');
      const branchEl = document.getElementById('nu-branch');
      
      if (!nameEl || !roleEl) { 
        toast('Form error · pls refresh & try again'); 
        return; 
      }
      
      const name = nameEl.value.trim();
      let id = (idEl?.value || '').trim().toLowerCase();
      const role = roleEl.dataset.val;
      const leaderId = leaderEl?.value || '';
      const pass = (passEl?.value || '1234');
      let branchId = branchEl?.value || '';
      
      // HQ role doesn't need a branch selection - auto-assign to 'hq'
      if (role === 'hq') branchId = 'hq';
      
      if (!name) { toast('Name diperlukan'); nameEl.focus(); return; }
      if (!branchId) { toast('Pilih Branch untuk staff ini'); branchEl?.focus(); return; }
      
      // Auto-generate ID from name if blank
      if (!id) {
        id = name.toLowerCase().replace(/[^a-z0-9]/g, '');
      }
      
      // Check duplicate
      if (DB.user(id)) { 
        toast('Login ID "' + id.toUpperCase() + '" sudah wujud · sila guna ID lain'); 
        if (idEl) { idEl.value = id.toUpperCase(); idEl.focus(); }
        return; 
      }
      
      // Validate CS needs a leader (admin / solo / leader don't)
      if (role === 'cs' && !leaderId) { 
        toast('Pilih Team Leader untuk CS'); 
        leaderEl?.focus();
        return; 
      }
      
      // Save new user via centralized method (writes localStorage + Firestore atomically)
      const newUser = { 
        id, name, role,
        branch_id: branchId,
        leader_id: role === 'cs' ? leaderId : null, 
        password: pass,
        created_at: Date.now()
      };
      const saved = DB.addUser(newUser);
      
      if (!saved) {
        toast('Storage error · cuba lagi');
        return;
      }
      
      hideModal();
      toast('Staff "' + name + '" created · Login ID: ' + id.toUpperCase() + (window.Cloud?.connected ? ' · synced ☁' : ' · local only'));
      this.render();
    } catch (e) {
      console.error('createUser error:', e);
      toast('Error: ' + (e.message || 'Unknown'));
    }
  },

  exportWeeklyCSV() {
    const offset = this.state.weekOffset || 0;
    const now = new Date();
    const day = now.getDay();
    const diffToMonday = day === 0 ? -6 : 1 - day;
    const weekStart = new Date(now);
    weekStart.setDate(weekStart.getDate() + diffToMonday + offset * 7);
    const user = Auth.current();
    const branchFilter = this.state.weeklyBranch && this.state.weeklyBranch !== 'all' 
      ? this.state.weeklyBranch 
      : (!Permissions.canViewAllBranches(user) && user.role !== 'admin' ? user.branch_id : null);
    const report = Logic.weeklyReport(weekStart, branchFilter);
    
    const rows = [['Week', `${report.weekStart} to ${report.weekEnd}`]];
    rows.push([]);
    rows.push(['Team Leader', 'Type', 'KFI (RM)', 'KFI Count', 'Calling', 'WhatsApp', 'Payslip', 'Submit', 'Closing', 'Potential (RM)', 'Rejected', 'Members']);
    report.teamData.forEach(t => {
      rows.push([
        t.leader.name,
        t.leader.role === 'solo' ? 'Solo' : 'Team',
        t.kfi.toFixed(0), t.kfiCount,
        t.calling, t.whatsapp, t.payslip, t.submitting, t.closing,
        t.potential.toFixed(0), t.rejected,
        t.teamUsers.map(u => u.name).join('; ')
      ]);
    });
    
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `awara_weekly_${report.weekStart}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Weekly CSV downloaded');
  },

  renderTrendChart() {
    // Last 30 days payslip count
    const days = [];
    const today = new Date();
    for (let i = 29; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const dStr = d.toISOString().slice(0,10);
      const count = DB.cases().filter(c => c.date_payslip === dStr).length;
      const disbursed = DB.cases().filter(c => c.date_disbursed === dStr && c.status === 'disbursed').length;
      days.push({ date: dStr, count, disbursed, label: d.getDate(), isFirstOfWeek: d.getDay() === 1 });
    }
    
    const maxCount = Math.max(...days.map(d => d.count), 1);
    const width = 400;
    const height = 100;
    const barWidth = width / days.length;
    
    return `
      <div class="section-header"><div class="section-title">30-Day Trend · Payslip Collection</div></div>
      <div style="padding: 0 20px;">
        <div style="background: var(--cream-2); border-radius: 14px; padding: 16px; border: 1px solid var(--border-2);">

            ${days.map((d, i) => {
              const h = (d.count / maxCount) * height;
              const x = i * barWidth + 2;
              const y = height - h;

              const isToday = i === days.length - 1;
              return `
                <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="2" fill="${isToday ? 'var(--accent)' : 'var(--primary)'}" opacity="${isToday ? 1 : 0.8}"/>

  renderPackageDistribution() {
    const ym = new Date().toISOString().slice(0,7);
    const cases = DB.cases().filter(c => 
      c.date_payslip && c.date_payslip.startsWith(ym) && c.package_id
    );
    
    if (cases.length === 0) return '';
    
    const pkgCounts = {};
    cases.forEach(c => {
      pkgCounts[c.package_id] = (pkgCounts[c.package_id] || 0) + 1;
    });
    
    const sorted = Object.entries(pkgCounts)
      .map(([id, count]) => {
        const pkg = LOAN_PACKAGES.find(p => p.id === id);
        return { id, name: pkg?.name || id, count, payout: pkg?.payout };
      })
      .sort((a, b) => b.count - a.count)
      .slice(0, 8);
    
    const total = sorted.reduce((s, p) => s + p.count, 0);
    const colors = ['var(--primary)', 'var(--accent-deep)', 'var(--info)', 'var(--success)', '#A86F1A', '#6B3FB8', 'var(--danger)', 'var(--ink-2)'];
    
    return `
      <div class="section-header"><div class="section-title">Package Mix · This Month</div></div>
      <div style="padding: 0 20px;">
        <div style="background: var(--cream-2); border-radius: 14px; padding: 16px; border: 1px solid var(--border-2);">
          ${sorted.map((p, i) => {
            const pct = (p.count / total) * 100;
            return `

  saveKoperasi(existingId) {
    try {
      const name = document.getElementById('kp-name').value.trim().toUpperCase();
      const rate = parseFloat(document.getElementById('kp-rate').value);
      const payout = parseInt(document.getElementById('kp-payout').value);
      const typeEl = document.querySelector('#kp-type .case-type-pill.active');
      const type = typeEl?.dataset.val || 'normal';
      const isBonus = document.getElementById('kp-bonus').checked;
      const remarks = document.getElementById('kp-remarks').value.trim();
      
      if (!name) { toast('Name diperlukan'); return; }
      if (!rate || rate <= 0 || rate > 50) { toast('Interest rate kena valid (0-50%)'); return; }
      if (!payout || payout <= 0 || payout > 100) { toast('Payout kena valid (0-100%)'); return; }
      
      const data = { name, rate, payout, type, isBonus, remarks };
      
      if (existingId) {
        DB.updateKoperasi(existingId, data);
        toast('Koperasi updated');
      } else {
        const pkg = DB.addKoperasi(data);
        if (!pkg) { toast('Error · ID may exist'); return; }
        toast('Koperasi "' + name + '" added');
      }
      hideModal();
      this.render();
    } catch (e) {
      console.error('saveKoperasi:', e);
      toast('Error: ' + e.message);
    }
  },
  
  confirmDeleteKoperasi(id) {
    const p = DB.koperasiById(id);
    if (!p) return;
    if (!confirm(`Delete "${p.name}" permanently?\n\nExisting cases using this koperasi will keep their data but can't be edited.`)) return;
    DB.deleteKoperasi(id);
    toast('Koperasi "' + p.name + '" deleted');
    this.render();
  },

  exportReport(type) {
    const ym = this.state.exportMonth || new Date().toISOString().slice(0,7);
    const staff = this.state.exportStaff || 'all';
    const pkg = this.state.exportPkg || 'all';
    const exportFrom = this.state.exportFrom || null;
    const exportTo = this.state.exportTo || null;
    const exportBranch = this.state.exportBranch || 'all';
    const user = Auth.current();
    const branchFilter = !Permissions.canViewAllBranches(user) && user.role !== 'admin' 
      ? user.branch_id 
      : (exportBranch !== 'all' ? exportBranch : null);
    
let rows = [];
    const dateLabel = exportFrom && exportTo ? `${exportFrom}_to_${exportTo}` : exportFrom ? `from_${exportFrom}` : exportTo ? `to_${exportTo}` : ym;
    let filename = `awara_${type}_${dateLabel}${branchFilter ? '_' + branchFilter : ''}.csv`;

    const filterByDate = (cases, dateField) => {
      if (exportFrom && exportTo) return cases.filter(c => c[dateField] && c[dateField] >= exportFrom && c[dateField] <= exportTo);
      if (exportFrom) return cases.filter(c => c[dateField] && c[dateField] >= exportFrom);
      if (exportTo) return cases.filter(c => c[dateField] && c[dateField] <= exportTo);
      return cases.filter(c => c[dateField] && c[dateField].startsWith(ym));
    };
    
    if (type === 'performance') {
      rows.push(['MONTHLY PERFORMANCE REPORT', ym]);
      rows.push(['Generated:', new Date().toLocaleString('en-MY')]);
      rows.push([]);
      rows.push(['Name', 'Role', 'Branch', 'Team', 'Payslip', 'Duplicates', 'Submit (KPI)', 'Disburse', 'Reject', 'KFI (RM)', 'PS Comm (RM)', 'Submit Comm (RM)', 'KFI Comm (RM)', 'Total Comm (RM)']);
      
      let targets = staff === 'all' 
        ? DB.users().filter(u => u.role !== 'admin')
        : DB.users().filter(u => u.id === staff);
      if (branchFilter) targets = targets.filter(u => u.branch_id === branchFilter);
      
      targets.forEach(u => {
        const isLeader = u.role === 'leader' || u.role === 'solo';
        const stats = isLeader ? Logic.leaderStatsForMonth(u.id, ym) : Logic.csStatsForMonth(u.id, ym);
        const team = isLeader ? u.name : (DB.user(u.leader_id)?.name || '—');
        const branchName = DB.branch(u.branch_id)?.name || '';
        let csCom = null, leaderCom = null;
        const isCurrent = ym === new Date().toISOString().slice(0,7);
        if (isCurrent && !isLeader) csCom = Logic.csCommission(u.id);
        if (isCurrent && isLeader) leaderCom = Logic.leaderCommission(u.id);
        rows.push([
          u.name,
          ROLE_LABELS[u.role],
          branchName,
          team,
          stats.total || 0,
          stats.totalDuplicates || 0,
          stats.submitted || 0,
          stats.disbursed || 0,
          stats.rejected || 0,
          (stats.kfiAmount || stats.disburseAmount || 0).toFixed(0),
          csCom ? csCom.psCom.toFixed(2) : '—',
          csCom ? csCom.smCom.toFixed(2) : '—',
          leaderCom ? leaderCom.kfiCom.toFixed(2) : '—',
          (csCom?.total || leaderCom?.total || 0).toFixed(2)
        ]);
      });
    }
    
if (type === 'submitted') {
      rows.push(['SUBMITTED CASES REPORT', ym]);
      rows.push(['Generated:', new Date().toLocaleString('en-MY')]);
      rows.push([]);

      let cases = filterByDate(DB.cases(), 'date_submitted');
      if (staff !== 'all') cases = cases.filter(c => c.source_cs_id === staff || c.leader_id === staff);
      if (pkg !== 'all') cases = cases.filter(c => c.package_id === pkg);
      if (branchFilter) cases = cases.filter(c => c.branch_id === branchFilter);
      cases.sort((a,b) => (a.leader_id||'').localeCompare(b.leader_id||'') || (a.source_cs_id||'').localeCompare(b.source_cs_id||'') || a.date_submitted.localeCompare(b.date_submitted));

      const staffGroups = {};
      cases.forEach(c => {
        const key = c.source_cs_id;
        if (!staffGroups[key]) staffGroups[key] = [];
        staffGroups[key].push(c);
      });

      Object.keys(staffGroups).forEach(csId => {
        const staffCases = staffGroups[csId];
        const csUser = DB.user(csId);
        const managerUser = DB.user(csUser?.leader_id);
        rows.push(['', 'MANAGER NAME', 'STAFF NAME', 'CUST NAME', 'NO IC', 'PACKAGE', 'AMOUNT LOAN']);
        let totalLoan = 0;
        let no = 1;
        staffCases.forEach(c => {
          const p = LOAN_PACKAGES.find(x => x.id === c.package_id);
          const loanAmt = c.loan_amount || 0;
          totalLoan += loanAmt;
          rows.push([no++, managerUser?.name || 'WILSON', csUser?.name || csId, c.customer_name, c.ic || '', p?.name || '', loanAmt.toFixed(2)]);
        });
        rows.push(['', '', '', 'TOTAL SUBMISSION', '', '', totalLoan.toFixed(2)]);
        rows.push([]);
      });
    }
    
if (type === 'disbursed') {
      rows.push(['DISBURSEMENT LIST', ym]);
      rows.push(['Generated:', new Date().toLocaleString('en-MY')]);
      rows.push([]);

      let cases = filterByDate(DB.cases(), 'date_disbursed').filter(c => c.status === 'disbursed');
      if (staff !== 'all') cases = cases.filter(c => c.source_cs_id === staff || c.leader_id === staff);
      if (pkg !== 'all') cases = cases.filter(c => c.package_id === pkg);
      if (branchFilter) cases = cases.filter(c => c.branch_id === branchFilter);
      cases.sort((a,b) => (a.leader_id||'').localeCompare(b.leader_id||'') || (a.source_cs_id||'').localeCompare(b.source_cs_id||'') || a.date_disbursed.localeCompare(b.date_disbursed));

      const staffGroups = {};
      cases.forEach(c => {
        const key = c.source_cs_id;
        if (!staffGroups[key]) staffGroups[key] = [];
        staffGroups[key].push(c);
      });

      Object.keys(staffGroups).forEach(csId => {
        const staffCases = staffGroups[csId];
        const csUser = DB.user(csId);
        const managerUser = DB.user(csUser?.leader_id);
        rows.push(['', 'MANAGER NAME', 'STAFF NAME', 'CUST NAME', 'NO IC', 'PACKAGE', 'AMOUNT LOAN', 'STAFF KFI', 'DISBURSED DATE']);
        let totalLoan = 0;
        let totalKfi = 0;
        let no = 1;
        staffCases.forEach(c => {
          const p = LOAN_PACKAGES.find(x => x.id === c.package_id);
          const loanAmt = c.loan_amount || 0;
          const kfi = c.payout || c.disburse_amount || c.approved_amount || loanAmt;
          totalLoan += loanAmt;
          totalKfi += kfi;
          rows.push([no++, managerUser?.name || 'WILSON', csUser?.name || csId, c.customer_name, c.ic || '', p?.name || '', loanAmt.toFixed(2), kfi.toFixed(2), c.date_disbursed || '']);
        });
        rows.push(['', '', '', 'TOTAL SUBMISSION', '', '', totalLoan.toFixed(2), totalKfi.toFixed(2)]);
        rows.push([]);
      });
    }
    
    if (rows.length <= 4) { toast('No data for this filter'); return; }
    
    const csv = rows.map(r => r.map(v => `"${String(v == null ? '' : v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    toast(`Report downloaded: ${filename}`);
  },

    let obj = d;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!obj[parts[i]]) obj[parts[i]] = {};
      obj = obj[parts[i]];
    }
    obj[parts[parts.length - 1]] = value;
    // Update dirty indicator in save bar without re-rendering whole page
    const bar = document.getElementById('settings-save-bar');
    if (bar) {
      const status = bar.querySelector('div > div:nth-child(2)');
      if (status) {

      const draft = this.state.settingsDraft;

      const allTiers = [
        ...draft.commission.cs_payslip, 
        ...draft.commission.cs_submit,
        ...draft.commission.leader_kfi,
        ...draft.commission.solo_kfi
      ];
      const invalid = allTiers.find(t => isNaN(t.min) || t.min < 0 || isNaN(t.rate) || t.rate < 0);

      // Clean empty list items
      ['pending_reasons', 'reject_reasons'].forEach(k => {
        draft[k] = (draft[k] || []).filter(x => x && x.trim());
      });
      draft.loan_amounts = (draft.loan_amounts || []).filter(x => x > 0).sort((a,b) => a - b);
      draft.tenors = (draft.tenors || []).filter(t => t.m > 0 && t.l).sort((a,b) => a.m - b.m);
      
      DB.updateSettings(draft);
      this.state.settingsDraft = null;
      this.state.settingsDirty = false;
      toast('✓ Settings saved · synced to ' + (window.Cloud?.connected ? 'cloud ☁ · all staff get update' : 'local only'));

// ==================== INIT ====================
const SCHEMA_VERSION = '10.0';

async function bootstrap() {
  // Schema migration
  const ver = localStorage.getItem('awara_schema_version');
  if (ver !== SCHEMA_VERSION) {
    localStorage.removeItem(DB.K.users);
    localStorage.removeItem(DB.K.cases);
    localStorage.removeItem(DB.K.activities);
    localStorage.removeItem(DB.K.session);
    localStorage.removeItem(DB.K.customer_notes);
    localStorage.removeItem(DB.K.seen);
    localStorage.removeItem(DB.K.koperasi);
    localStorage.removeItem(DB.K.announcements);
    localStorage.removeItem(DB.K.settings);
    localStorage.setItem('awara_schema_version', SCHEMA_VERSION);
  }
  
  // Try to load from Firestore first (if Cloud connected)
  if (window.Cloud?.connected) {
    try {
      // ⚠ Sign in to shared service account FIRST so Firestore rules let us read
      if (window.Cloud.ensureAuth) {
        const authed = await window.Cloud.ensureAuth();
        if (!authed) {
          console.warn('⚠ Shared auth not ready · Firestore reads may fail · falling back to local cache');
          toastIfReady('⚠ Cloud auth failed · using local cache only');
        }
      }
      
      const cloudUsers = await window.Cloud.getAll('users');
      
      if (cloudUsers.length > 0) {
        // Firestore has data → use it
        console.log("Loading from Firestore...", cloudUsers.length, "users");
        DB.set(DB.K.users, cloudUsers);
        
        const [cloudCases, cloudActs, cloudNotes, cloudKoperasi, cloudAnns, cloudSettings, cloudBranches] = await Promise.all([
          window.Cloud.getAll('cases'),
          window.Cloud.getAll('activities'),
          window.Cloud.getAll('customer_notes'),
          window.Cloud.getAll('koperasi'),
          window.Cloud.getAll('announcements'),
          window.Cloud.getDoc('settings', 'main'),
          window.Cloud.getAll('branches')
        ]);
        
        DB.set(DB.K.cases, cloudCases);
        DB.set(DB.K.activities, cloudActs);
        
        const notesObj = {};
        cloudNotes.forEach(n => { if (n.ic) notesObj[n.ic] = n.note; });
        DB.set(DB.K.customer_notes, notesObj);
        
        DB.set(DB.K.koperasi, cloudKoperasi.length > 0 ? cloudKoperasi : DEFAULT_PACKAGES);
        DB.set(DB.K.announcements, cloudAnns);
        
        // Settings: use cloud or default
        if (cloudSettings) {
          DB.set(DB.K.settings, cloudSettings);
        } else {
          DB.set(DB.K.settings, DEFAULT_SETTINGS);
          // Upload default settings to cloud
          window.Cloud.setDoc('settings', 'main', { id: 'main', ...DEFAULT_SETTINGS });
        }
        
        // If cloud koperasi was empty, upload defaults
        if (cloudKoperasi.length === 0) {
          DEFAULT_PACKAGES.forEach(p => window.Cloud.setDoc('koperasi', p.id, p));
        }

        // Branches
        if (cloudBranches.length > 0) {
          DB.set(DB.K.branches, cloudBranches);
        } else {
          // Upload seed branches to cloud
          SEED_BRANCHES.forEach(b => window.Cloud.setDoc('branches', b.id, b));
        }
        
        // Silent sync - no toast (cloud is just a background detail to users)
        console.log("✓ Synced from cloud · " + cloudCases.length + " cases · " + cloudUsers.length + " users");
      } else {
        // Empty Firestore → seed locally + upload
        console.log("Firestore empty. Seeding...");
        DB.seed();
        await syncAllToCloud();
        console.log("✓ Initial data uploaded to cloud");
      }
      
      // Subscribe to real-time updates - all subscribers now trigger UI refresh
      window.Cloud.subscribe('cases', items => {
        DB.set(DB.K.cases, items);
        if (App.state.currentScreen !== 'login') App.render();
      });
      window.Cloud.subscribe('users', items => {
        DB.set(DB.K.users, items);
        if (App.state.currentScreen !== 'login') App.render();
      });
      window.Cloud.subscribe('activities', items => {
        DB.set(DB.K.activities, items);
        if (App.state.currentScreen !== 'login') App.render();
      });
      window.Cloud.subscribe('customer_notes', items => {
        const obj = {};
        items.forEach(n => { if (n.ic) obj[n.ic] = n.note; });
        DB.set(DB.K.customer_notes, obj);
      });
      window.Cloud.subscribe('koperasi', items => {
        DB.set(DB.K.koperasi, items);
        refreshPackages();
        if (App.state.currentScreen !== 'login') App.render();
      });
      window.Cloud.subscribe('announcements', items => {
        DB.set(DB.K.announcements, items);
        if (App.state.currentScreen !== 'login') App.render();
      });
      window.Cloud.subscribe('branches', items => {
        if (items.length > 0) {
          DB.set(DB.K.branches, items);
          if (App.state.currentScreen !== 'login') App.render();
        }
      });
      // Subscribe to notifications for current user
      window.Cloud.subscribe('notifications', items => {
        const user = Auth.current();
        if (!user) return;
        const myNotif = items.find(n => n.userId === user.id);
        if (myNotif) {
          const all = DB.get(DB.K.notifications, {});
          all[user.id] = myNotif.items || [];
          DB.set(DB.K.notifications, all);
          if (App.state.currentScreen !== 'login') App.render();
        }
      });
      // Settings is a single doc 'main' - listen to update all clients
      window.Cloud.subscribe('settings', items => {
        const main = items.find(s => s.id === 'main');
        if (main) {
          // Don't overwrite local draft if user is editing
          if (!App.state.settingsDirty) {
            DB.set(DB.K.settings, main);
            refreshSettings();
            if (App.state.currentScreen !== 'login') App.render();
          } else {
            console.log('Settings cloud update received but user has unsaved local draft - ignored');
          }
        }
      });
      
    } catch (e) {
      console.error("Cloud sync failed, falling back to local:", e);
      DB.seed();
      toastIfReady("⚠ Cloud sync error · using local data");
    }
  } else {
    // No cloud - just seed local
    DB.seed();
  }
  
  // ── Migration: patch existing users missing branch_id, add HQ user if missing ──
  (() => {
    let users = DB.users();
    let changed = false;

    // Add HQ user if not exists
    if (!users.find(u => u.id === 'hq')) {
      users.push({ id: 'hq', name: 'HQ', role: 'hq', branch_id: 'hq', leader_id: null, password: '1234' });
      changed = true;
    }

    // Ensure branches exist in storage
    const storedBranches = DB.get(DB.K.branches);
    if (!storedBranches || storedBranches.length === 0) {
      DB.saveBranches(SEED_BRANCHES);
    } else {
      // Patch any missing branches from SEED_BRANCHES
      let branches = DB.branches();
      let branchChanged = false;
      SEED_BRANCHES.forEach(sb => {
        if (!branches.find(b => b.id === sb.id)) {
          branches.push(sb);
          branchChanged = true;
        }
      });
      if (branchChanged) DB.saveBranches(branches);
    }

    // Patch users missing branch_id (existing users before branch feature)
    const defaultBranch = DB.branches().find(b => b.id !== 'hq')?.id || 'branch_a';
    users = users.map(u => {
      if (!u.branch_id) { changed = true; return { ...u, branch_id: u.role === 'hq' ? 'hq' : defaultBranch }; }
      return u;
    });

    if (changed) {
      DB.set(DB.K.users, users);
      // Sync new/patched users back to cloud
      if (window.Cloud?.connected) {
        users.filter(u => u.id === 'hq' || !u.branch_id).forEach(u => 
          window.Cloud.setDoc('users', u.id, u).catch(() => {})
        );
      }
    }
  })();
  
  // Refresh dynamic LOAN_PACKAGES from DB.koperasi() + Settings from DB.settings()
  refreshPackages();
  refreshSettings();
  
  // No auto-login - show login screen first (PRODUCTION MODE)
  // (For dev/demo, append ?dev=1 to URL to use persona switcher)
  const isDev = location.search.includes('dev=1');
  if (isDev && !Auth.current()) {
    DB.setSession('wilson');  // dev mode: auto-login as admin
  }
  App.render();
}

// Upload all local data to Firestore (used for first-time seed)
async function syncAllToCloud() {
  if (!window.Cloud?.connected) return false;
  try {
    const users = DB.users();
    const cases = DB.cases();
    const acts = DB.activities();
    const notes = DB.customerNotes();
    const koperasi = DB.koperasi();
    const announcements = DB.announcements();
    
    await window.Cloud.batchSet('users', users, 'id');
    await window.Cloud.batchSet('cases', cases, 'id');
    
    const actsWithId = acts.map(a => ({...a, id: `${a.cs_id}_${a.date}`}));
    await window.Cloud.batchSet('activities', actsWithId, 'id');
    
    const noteArr = Object.entries(notes).map(([ic, note]) => ({ id: ic, ic, note }));
    if (noteArr.length > 0) await window.Cloud.batchSet('customer_notes', noteArr, 'id');
    
    if (koperasi.length > 0) await window.Cloud.batchSet('koperasi', koperasi, 'id');
    if (announcements.length > 0) await window.Cloud.batchSet('announcements', announcements, 'id');
    
    // Branches
    const branches = DB.branches();
    if (branches.length > 0) await window.Cloud.batchSet('branches', branches, 'id');
    
    // Settings is a single doc with id='main'
    const settings = DB.settings();
    await window.Cloud.setDoc('settings', 'main', { id: 'main', ...settings });
    
    console.log("✓ Synced all to cloud");
    return true;
  } catch (e) {
    console.error("syncAllToCloud error:", e);
    return false;
  }
}

function toastIfReady(msg) {
  if (typeof toast === 'function' && document.getElementById('toast-container')) {
    toast(msg);
  } else {
    console.log("[toast]", msg);
  }
}

// Wait for both DOM and Cloud to be ready before booting
let domReady = false;
let cloudReady = false;
let booted = false;

function tryBoot() {
  if (booted) return;
  // Cloud is "ready" if window.Cloud object exists (either connected or in error state)
  // OR if 8s timeout has passed
  const cloudObjectExists = typeof window.Cloud !== 'undefined';
  if (domReady && (cloudReady || cloudObjectExists)) {
    booted = true;
    bootstrap();
  }
}

window.addEventListener('DOMContentLoaded', () => { 
  domReady = true; 
  // Cloud script ran in <head> BEFORE this event, so window.Cloud should already exist
  // (Polling fallback below catches edge cases)
  tryBoot(); 
});

// Also poll for window.Cloud (head script may have completed before DOMContentLoaded listener registered)
let pollCount = 0;
const cloudPoll = setInterval(() => {
  pollCount++;
  if (typeof window.Cloud !== 'undefined' || pollCount > 80) {  // poll for 8s max
    cloudReady = true;
    clearInterval(cloudPoll);
    if (domReady) tryBoot();
  }
}, 100);

// Hard fallback: 10s
setTimeout(() => {
  if (!booted) {
    console.warn("Force-booting after 10s timeout");
    cloudReady = true;
    domReady = true;
    tryBoot();
  }
}, 10000);

// Show "Loading..." while waiting
setTimeout(() => {
  if (!domReady || !cloudReady) {
    const el = document.getElementById('app');
    if (el && !el.innerHTML.trim()) {
      const status = window.__firebaseStatus || { stage: 'unknown' };
      el.innerHTML = `
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 40px; text-align: center;">
          <div style="font-family: 'Archivo Black', sans-serif; color: var(--primary); font-size: 32px; margin-bottom: 8px;">AWARA</div>
          <div style="font-size: 12px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 30px;">Connecting to cloud...</div>
          <div style="width: 40px; height: 40px; border: 3px solid var(--cream-3); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
          <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
          <div style="font-size: 11px; color: var(--ink-3); margin-top: 24px; max-width: 280px; line-height: 1.6;">
            Stage: ${status.stage}<br>
            Loading Firebase SDK... If this stays >10s, network may be slow or Firebase domain blocked.
          </div>
        </div>
      `;
    }
  }
}, 2500);

// After boot, check cloud status + show diagnostic banner if failed
function showCloudDiagnostic() {
  if (window.Cloud?.connected) return;
  
  const fbStatus = window.__firebaseStatus || { stage: 'never-loaded', error: 'Module script never executed (likely blocked or file:// origin)' };
  const isFileProto = location.protocol === 'file:';
  
  // Show only once
  if (document.getElementById('cloud-diag-banner')) return;
  
  const banner = document.createElement('div');
  banner.id = 'cloud-diag-banner';
  banner.style.cssText = 'position: fixed; bottom: 20px; right: 20px; left: 20px; max-width: 480px; margin: 0 auto; background: #FCE8E6; border: 2px solid var(--danger); border-radius: 14px; padding: 14px 16px; z-index: 9999; font-family: "Plus Jakarta Sans", sans-serif; box-shadow: 0 8px 24px rgba(0,0,0,0.15);';
  
  let hint = '';
  if (isFileProto) {
    hint = 'You opened the file directly (<code>file://</code>). Firebase needs a hosted URL. Upload to wilsonooi.com OR use a local server (python -m http.server 8000).';
  } else if (fbStatus.stage === 'never-loaded' || fbStatus.stage === 'loading') {
    hint = 'Module script never executed. Likely: <strong>adblock/privacy extension blocking gstatic.com</strong>, OR slow network. Try: disable adblockers, try different browser.';
  } else if (fbStatus.stage.includes('failed')) {
    hint = `Failed at stage: <strong>${fbStatus.stage}</strong>. Error: <code>${fbStatus.error}</code>. Check Firestore Security Rules + Authorized Domains in Firebase Console.`;
  } else {
    hint = `Stuck at stage: <strong>${fbStatus.stage}</strong>. Check browser console (F12) for errors.`;
  }
  
  banner.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;">
      <strong style="color: var(--danger); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800;">⚠ Cloud Offline · Local Mode Active</strong>
      <button onclick="document.getElementById('cloud-diag-banner').remove()" style="background: transparent; border: none; color: var(--ink-3); font-size: 16px; cursor: pointer; padding: 0 4px;">×</button>
    </div>
    <div style="font-size: 12px; color: var(--ink-2); line-height: 1.5; margin-bottom: 8px;">${hint}</div>
    <div style="display: flex; gap: 6px;">
      <button onclick="location.reload()" style="flex: 1; background: var(--primary); color: var(--accent); border: none; padding: 8px; border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer;">↻ Reload</button>
      <button onclick="document.getElementById('cloud-diag-banner').remove()" style="flex: 1; background: var(--cream); color: var(--ink-2); border: 1px solid var(--border); padding: 8px; border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer;">Dismiss · Use Local</button>
    </div>
  `;
  document.body.appendChild(banner);
}

// Check after boot completes - only show diagnostic if truly disconnected
setTimeout(() => {
  if (window.Cloud && window.Cloud.connected) return;  // all good
  if (window.Cloud && window.Cloud.error) showCloudDiagnostic();  // error captured
  else if (typeof window.Cloud === 'undefined') showCloudDiagnostic();  // SDK didn't load at all
}, 11000);

// Cloud status indicator polling
setInterval(() => {
  const statusEl = document.getElementById('cloud-status');
  if (!statusEl) return;
  const ok = window.Cloud?.connected;
  statusEl.textContent = ok ? '☁ ✓' : '☁ offline';
  statusEl.style.background = ok ? 'rgba(46, 125, 50, 0.2)' : 'rgba(184, 66, 58, 0.2)';
  statusEl.style.color = ok ? '#A5D6A7' : '#FFB4A8';
}, 2000);
</script>
