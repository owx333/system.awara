    let leaders = DB.users().filter(u => u.role === 'leader' || u.role === 'solo');
    if (branchFilter) leaders = leaders.filter(u => u.branch_id === branchFilter);
    const inRange = (date) => date && date >= startStr && date <= endStr;
    
    const teamData = leaders.map(l => {
      const teamUsers = [l, ...DB.users().filter(u => u.leader_id === l.id)];
      
      // Aggregate weekly stats per team
      const allCases = DB.cases().filter(c => c.leader_id === l.id);
      const payslipsThisWeek = allCases.filter(c => inRange(c.date_payslip));
      const submitsThisWeek = allCases.filter(c => inRange(c.date_submitted));
      const disbursesThisWeek = allCases.filter(c => inRange(c.date_disbursed) && c.status === 'disbursed');
      const rejectsThisWeek = allCases.filter(c => inRange(c.date_rejected));
      
      // Calling - aggregate daily activities for team members this week
      let totalCalls = 0, totalWA = 0;
      teamUsers.forEach(u => {
        DB.activities().forEach(a => {
          if (a.cs_id === u.id && inRange(a.date)) {
            totalCalls += a.calls || 0;
            totalWA += a.whatsapp || 0;
          }
        });
      });
      
      // Potential - submitted/approved (not yet disbursed) RM
      const potentialCases = allCases.filter(c => ['submitted', 'approved'].includes(c.status));
      const potentialAmt = potentialCases.reduce((s,c) => s + (c.loan_amount || 0), 0);
      
      return {
        leader: l,
        teamUsers,
        kfi: disbursesThisWeek.reduce((s,c) => s + (c.disburse_amount || 0), 0),
        kfiCount: disbursesThisWeek.length,
        calling: totalCalls,
        whatsapp: totalWA,
        payslip: payslipsThisWeek.length,
        closing: disbursesThisWeek.length,
        submitting: submitsThisWeek.length,
        potential: potentialAmt,
        potentialCount: potentialCases.length,
        rejected: rejectsThisWeek.length
      };
    }).sort((a, b) => b.kfi - a.kfi);
    
    return { weekStart: startStr, weekEnd: endStr, teamData };
  },
  
  // Notification counts (computed live, no persistent state)
  notificationCount(user) {
    let count = 0;
    if (Permissions.isAdminLevel(user) && !['hq', 'admin'].includes(user.role)) {
      // Admin/Manager: count of new payslip in last 24h, pending cases needing review
      const recentCutoff = Date.now() - 24 * 60 * 60 * 1000;
      let allCases = DB.cases();
      if (!Permissions.canViewAllBranches(user)) {
        allCases = allCases.filter(c => !c.branch_id || c.branch_id === user.branch_id);
      }
      const newCases = allCases.filter(c => 
        c.status === 'new' && new Date(c.date_payslip).getTime() > recentCutoff
      ).length;
      count = newCases;
} else if (this.isLeaderRole(user)) {
  // Leader: count of "new" payslips only
  count = this.allCases({ leaderId: user.id }).filter(c => c.status === 'new').length;
    } else if (user.role === 'cs') {
      // CS: count of disbursed cases this month not yet "seen"
      const cases = this.allCases({ csId: user.id });
      const lastSeen = DB.lastSeen(user.id, 'disbursed');
      const recentDisbursed = cases.filter(c => 
        c.status === 'disbursed' && c.date_disbursed && 
        new Date(c.date_disbursed).getTime() > lastSeen
      ).length;
      count = recentDisbursed;
    }
    return count;
  }
};

// ==================== UI HELPERS ====================
// Escape HTML to prevent XSS from user-controlled data (customer names, IC, notes, etc).
// Although our app is internal (14 staff, controlled domain), defense-in-depth is good practice.
// Use this for any user-typed string that goes into innerHTML/template literal output.
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function fmt(n) { 
  if (n === null || n === undefined) return '0';
  return Number(n).toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtK(n) {
  if (!n || n === 0) return '0';
  if (n >= 1000) return (n / 1000).toFixed(2).replace(/\.00$/, '') + 'k';
  return Number(n).toLocaleString('en-MY', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}
function fmtRM(n) { return 'RM ' + fmt(n); }
function initials(name) { 
  return name.substring(0, 2).toUpperCase(); 
}

// ===== PHONE LINK HELPERS (mobile tap-to-call + WhatsApp) =====
// Cleans phone to digits-only (for tel: + wa.me URLs)
function cleanPhone(p) {
  if (!p) return '';
  return String(p).replace(/\D+/g, '');
}
// Format phone for display (e.g. 0123456789 → 012-345 6789)
function fmtPhone(p) {
  const c = cleanPhone(p);
  if (!c) return p || '—';
  if (c.length === 10) return c.slice(0, 3) + '-' + c.slice(3, 6) + ' ' + c.slice(6);
  if (c.length === 11) return c.slice(0, 3) + '-' + c.slice(3, 7) + ' ' + c.slice(7);
  return c;
}
// Returns HTML with clickable phone + WhatsApp icon
function phoneLink(phone, inline = false) {
  if (!phone) return '—';
  const c = cleanPhone(phone);
  if (!c) return phone;
  const display = fmtPhone(phone);
  const intlPhone = c.startsWith('60') ? c : (c.startsWith('0') ? '6' + c : c);
  if (inline) {
    return `<a href="tel:${c}" onclick="event.stopPropagation()" style="color:var(--primary);font-weight:700;text-decoration:none;">${display}</a> <a href="https://wa.me/${intlPhone}" target="_blank" onclick="event.stopPropagation()" style="color:#22C55E;text-decoration:none;font-size:12px;" title="WhatsApp">💬</a>`;
  }
  return `<a href="tel:${c}" onclick="event.stopPropagation()" style="color:var(--primary);font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px;">📞 ${display}</a> <a href="https://wa.me/${intlPhone}" target="_blank" onclick="event.stopPropagation()" style="background:#25D366;color:white;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:3px;" title="Open WhatsApp">💬 WA</a>`;
}

// ===== EXCEL EXPORT HELPERS (using SheetJS / xlsx) =====
// Supports multi-sheet workbooks. If SheetJS not loaded, falls back to CSV.
//
// Usage: downloadAsExcel('myreport.xlsx', [
//   { name: 'Summary', rows: [['col1','col2'],['data1','data2']] },
//   { name: 'Detail', rows: [...] }
// ]);
function downloadAsExcel(filename, sheets) {
  if (typeof XLSX === 'undefined') {
    console.warn('SheetJS not loaded, falling back to CSV');
    // Combine all sheets into one CSV (first sheet only)
    const firstSheet = sheets[0] || { rows: [] };
    const csv = firstSheet.rows.map(r => r.map(v => `"${String(v == null ? '' : v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename.replace(/\.xlsx$/, '.csv');
    a.click();
    URL.revokeObjectURL(url);
    return false;
  }
  
  const wb = XLSX.utils.book_new();
  sheets.forEach(sheet => {
    const ws = XLSX.utils.aoa_to_sheet(sheet.rows);
    
    // Auto-width columns (sample first 50 rows for performance)
    const colWidths = [];
    const sampleRows = sheet.rows.slice(0, 50);
    if (sampleRows.length > 0) {
      const maxCols = Math.max(...sampleRows.map(r => r.length));
      for (let i = 0; i < maxCols; i++) {
        let maxLen = 8;
        sampleRows.forEach(r => {
          const cellLen = String(r[i] || '').length;
          if (cellLen > maxLen) maxLen = cellLen;
        });
        colWidths.push({ wch: Math.min(maxLen + 2, 40) });
      }
      ws['!cols'] = colWidths;
    }
    
    // Sheet name: must be ≤31 chars, no special chars
    const sheetName = (sheet.name || 'Sheet').replace(/[\\\/\?\*\[\]]/g, '_').substring(0, 31);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });
  
  XLSX.writeFile(wb, filename);
  return true;
}
function pkgName(id) {
  const p = LOAN_PACKAGES.find(p => p.id === id);
  return p ? p.name : id;
}
function teamName(leaderId) {
  const l = DB.user(leaderId);
  return l ? l.name : '—';
}
function toast(msg) {
  const container = document.getElementById('toast-container');
  if (!container) { Logger.debug('[toast]', msg); return; }
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
function showModal(html) {
  const m = document.getElementById('modal');
  m.innerHTML = `<div class="modal-sheet"><div class="modal-handle"></div>${html}</div>`;
  m.classList.add('show');
  m.onclick = (e) => { if (e.target === m) hideModal(); };

}

  targetItem(field, current, target) {
    const pct = Math.min(100, (current / target) * 100);
    const done = current >= target;
    return `
      <div class="target-item">
        <div class="target-progress" onclick="App.editTarget('${field}')">${current}<span class="of">/</span><span class="total">${target}</span></div>
        <div class="target-label">${field === 'whatsapp' ? 'WhatsApp' : field}</div>
        <div class="target-bar"><div class="target-bar-fill ${done ? 'done' : ''}" style="width: ${pct}%;"></div></div>
      </div>
    `;
  },
  
  editTarget(field) {
    const user = Auth.current();
    if (Permissions.isAdminLevel(user)) return;
    const current = DB.todayActivity(user.id)[field];
    const label = field === 'whatsapp' ? 'WhatsApp messages' : field === 'calls' ? 'Phone calls' : 'Payslip collected';
    showModal(`
      <div class="modal-title">Update ${label}</div>
      <div class="modal-sub">Today: ${new Date().toLocaleDateString('en-MY')}</div>
      <div class="form-group">
        <label>Current Count</label>
        <input type="number" id="target-input" value="${current}" min="0">
      </div>
      <div class="target-quick-btns">
        <button class="target-quick-btn" onclick="App.bumpTarget('${field}', 1)">+1</button>
        <button class="target-quick-btn" onclick="App.bumpTarget('${field}', 5)">+5</button>
        <button class="target-quick-btn" onclick="App.bumpTarget('${field}', 10)">+10</button>
        <button class="target-quick-btn" onclick="App.bumpTarget('${field}', 50)">+50</button>
      </div>
      <button class="submit-btn" onclick="App.saveTarget('${field}')">Save</button>
      <button class="btn-secondary" onclick="hideModal()">Cancel</button>
    `);
  },
  
  bumpTarget(field, by) {
    const input = document.getElementById('target-input');
    input.value = (parseInt(input.value) || 0) + by;
  },
  
  saveTarget(field) {
    const val = parseInt(document.getElementById('target-input').value) || 0;
    const user = Auth.current();
    DB.updateActivity(user.id, { [field]: val });
    hideModal();
    toast(`${field} updated!`);
    this.render();
  },
  
  bindTargets(user) {
    // Targets are bound via inline onclick
  },
  
  // ============ CASE CARD ============
  caseCard(c) {
    const pkg = c.package_id ? LOAN_PACKAGES.find(p => p.id === c.package_id) : null;
    const dateStr = new Date(c.date_payslip).toLocaleDateString('en-MY', { day: 'numeric', month: 'short' });
    const closed = c.status === 'disbursed';
    const rejected = c.status === 'rejected';
    const isNew = c.status === 'new';
    
    let metaBadge = '';
    if (closed) metaBadge = `<span class="badge com">Disbursed · Commission</span>`;
    else if (rejected) metaBadge = `<span class="badge no-com">No commission</span>`;
    else if (c.status === 'contacted') metaBadge = `<span class="badge">Customer contacted</span>`;
    else if (c.status === 'proposed') metaBadge = `<span class="badge">Package proposed</span>`;
    else if (c.status === 'submitted') metaBadge = `<span class="badge">Pending approval</span>`;
    else if (c.status === 'approved') metaBadge = `<span class="badge">Awaiting disburse</span>`;
    else if (isNew) metaBadge = `<span class="badge" style="background: var(--accent); color: var(--primary-dark); font-weight: 800;">Awaiting Leader</span>`;
    
    const caseTypeBadge = c.case_type === 'special' ? `<span class="badge" style="background: rgba(245, 197, 24, 0.2); color: var(--accent-deep);">Special</span>` :
                          c.case_type === 'resubmit' ? `<span class="badge" style="background: var(--info-bg); color: var(--info);">Resubmit</span>` : '';
    
    // Subtitle: for new cases show salary info; for processed cases show package
    let subtitle = '';
    if (isNew || !pkg) {
      subtitle = `Pendapatan ${fmtRM(c.jumlah_pendapatan)} · Bersih ${fmtRM(c.gaji_bersih)} (${c.gaji_bersih_pct.toFixed(0)}%)`;
    } else {
      subtitle = `${pkg.name} · ${fmtRM(c.loan_amount)} · ${c.tenor}m`;
    }
    
    return `
      <div class="case-card ${closed ? 'closed' : ''} ${rejected ? 'rejected' : ''}" onclick="App.viewCase('${c.id}')">
        <div class="case-card-top">
          <div>
            <div class="case-customer">${c.customer_name}</div>
            <div class="case-package">${subtitle}</div>
          </div>
          <span class="case-status ${c.status}">${STATUS_LABELS[c.status]}</span>
        </div>
        <div class="case-meta">
          <span>${dateStr}</span>
          ${caseTypeBadge}
          ${metaBadge}
        </div>
      </div>
    `;
  },
  
  emptyState(text) {
    return `<div class="empty-state"><div class="icon">📋</div><div class="text">${text}</div></div>`;
  },
  
  // ============ CS CASES LIST ============
  renderCSCases(user) {
    const filterStatus = this.state.filterState.csCases || 'all';
    const filterTime = this.state.filterState.csCasesTime || 'month';
    const isLeader = Logic.isLeaderRole(user);
    const searchText = (this.state.searchTextCS || '').toLowerCase();
    const dateFrom = this.state.dateFromCS || '';
    const dateTo = this.state.dateToCS || '';
    
    // Get base cases (mine or team)
    let cases;
if (isLeader && (this.state.tabState.cases || 'mine') === 'team') {
  // Use ALL cases from team, not just monthly
  cases = DB.cases().filter(c => c.leader_id === user.id);
} else if (isLeader) {
  cases = DB.cases().filter(c => c.source_cs_id === user.id);
} else {
      cases = DB.cases().filter(c => c.source_cs_id === user.id);
    }
    
    // Date range filter (overrides time chip if either set)
    if (dateFrom && dateTo) {
      cases = cases.filter(c => c.date_payslip >= dateFrom && c.date_payslip <= dateTo);
    } else if (dateFrom) {
      cases = cases.filter(c => c.date_payslip >= dateFrom);
    } else if (dateTo) {
      cases = cases.filter(c => c.date_payslip <= dateTo);
    } else {
      // Time chip filter
      if (filterTime === 'month') {
        const ym = new Date().toISOString().slice(0,7);
        cases = cases.filter(c => c.date_payslip && c.date_payslip.startsWith(ym));
      } else if (filterTime === '3months') {
        const cutoff = new Date();
        cutoff.setMonth(cutoff.getMonth() - 3);
        cases = cases.filter(c => c.date_payslip && new Date(c.date_payslip) >= cutoff);
      }
      // 'all' = no time filter
    }
    
    // Status filter
    if (filterStatus !== 'all') cases = cases.filter(c => c.status === filterStatus);
    
    // Search
    if (searchText) {
      cases = cases.filter(c => 
        c.customer_name.toLowerCase().includes(searchText) ||
        (c.ic || '').toLowerCase().includes(searchText) ||
        (c.phone || '').toLowerCase().includes(searchText)
      );
    }
    
    cases = cases.sort((a,b) => b.date_payslip.localeCompare(a.date_payslip));
    
    const tabs = isLeader ? `
      <div class="tabs">
        <button class="tab ${(this.state.tabState.cases || 'mine') === 'mine' ? 'active' : ''}" onclick="App.setTab('cases','mine')">My Cases</button>
        <button class="tab ${this.state.tabState.cases === 'team' ? 'active' : ''}" onclick="App.setTab('cases','team')">Team Cases</button>
      </div>
    ` : '';
    
    return this.topBar(user, 'Cases') + tabs + `
      <div class="search-bar">
        <input class="search-input" type="text" placeholder="Search Name, IC, or Phone..." 
               value="${this.state.searchTextCS || ''}" 
               oninput="App.setSearchCS(this.value)">
      </div>
      
      <!-- Date Range Filter -->
      <div style="padding: 0 20px 12px; display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-end;">
        <div style="flex: 1; min-width: 130px;">
          <label style="display: block; font-size: 10px; color: var(--ink-3); font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">Date From</label>
          <input type="date" value="${dateFrom}" oninput="App.setDateFilterCS('from', this.value)" style="width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border-2); font-family: inherit; font-size: 12px;">
        </div>
        <div style="flex: 1; min-width: 130px;">
          <label style="display: block; font-size: 10px; color: var(--ink-3); font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">Date To</label>
          <input type="date" value="${dateTo}" oninput="App.setDateFilterCS('to', this.value)" style="width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border-2); font-family: inherit; font-size: 12px;">
        </div>
        ${(dateFrom || dateTo) ? `<button onclick="App.clearDateFilterCS()" style="padding: 8px 12px; background: var(--cream-2); color: var(--ink-2); border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 11px; cursor: pointer;">✕ Clear</button>` : ''}
      </div>
      
      <div class="filter-bar">
        <div class="filter-chip ${(filterTime === 'month' && !dateFrom && !dateTo) ? 'active' : ''}" onclick="App.setFilter('csCasesTime','month'); App.clearDateFilterCS(true)">This Month</div>
        <div class="filter-chip ${(filterTime === '3months' && !dateFrom && !dateTo) ? 'active' : ''}" onclick="App.setFilter('csCasesTime','3months'); App.clearDateFilterCS(true)">3 Months</div>
        <div class="filter-chip ${(filterTime === 'all' && !dateFrom && !dateTo) ? 'active' : ''}" onclick="App.setFilter('csCasesTime','all'); App.clearDateFilterCS(true)">All Time</div>
      </div>
      
      <div class="filter-bar">
        ${['all','new','contacted','proposed','submitted','approved','disbursed','pending','potential','on_hold','rejected'].map(s => 
          `<div class="filter-chip ${filterStatus === s ? 'active' : ''}" onclick="App.setFilter('csCases','${s}')">${s === 'all' ? 'All' : STATUS_LABELS[s]}</div>`
        ).join('')}
      </div>
      <div style="padding: 8px 20px; font-size: 11px; color: var(--ink-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;">${cases.length} cases</div>
      <div class="case-list">
        ${cases.length === 0 ? this.emptyState('No cases match.') :
          cases.map(c => this.caseCard(c)).join('')}
      </div>
    `;
  },
  
  setDateFilterCS(which, value) {
    if (which === 'from') this.state.dateFromCS = value;
    if (which === 'to') this.state.dateToCS = value;
    this.render();
  },
  clearDateFilterCS(silent) {
    this.state.dateFromCS = '';
    this.state.dateToCS = '';
    if (!silent) this.render();
  },
  
setSearchCS(val) {
  this.state.searchTextCS = val;
  clearTimeout(this._searchCSTimer);
  this._searchCSTimer = setTimeout(() => {
    const cursorPos = document.querySelector('.search-input')?.selectionStart;
    this.render();
    const input = document.querySelector('.search-input');
    if (input) {
      input.focus();
      if (cursorPos !== undefined) input.setSelectionRange(cursorPos, cursorPos);
    }
  }, 180);
},
  
  setFilter(key, value) {
    this.state.filterState[key] = value;
    this.render();
  },

    const c = DB.caseById(caseId);
    if (!c) return;
    const pkg = c.package_id ? LOAN_PACKAGES.find(p => p.id === c.package_id) : null;
    const csUser = DB.user(c.source_cs_id);
    const leader = DB.user(c.leader_id);
    const user = Auth.current();
    // Edit permissions:
    // - Boss/Manager: any case
    // - Leader/Solo: their team's cases (their CS, themselves)
    // - CS: only their own cases
    const isAdminLike = Permissions.isAdminLevel(user);
    const isMyTeamCase = user.id === c.leader_id || c.source_cs_id === user.id;
    const isMyCs = Logic.isLeaderRole(user) && (user.id === c.leader_id || user.id === c.source_cs_id || DB.user(c.source_cs_id)?.leader_id === user.id);

    const isAdmin = user.role === 'admin';

    const canDelete = Permissions.canDelete(user);  // Boss only

  // Boss-only: delete a case permanently from local + Firestore
  async deleteCase(caseId) {
    const c = DB.caseById(caseId);
    if (!c) return;
    const user = Auth.current();
    if (!Permissions.canDelete(user)) { toast('No permission to delete'); return; }
    
   const confirmText = `DELETE customer "${c.customer_name}" permanently?\n\nThis cannot be undone.\n\n⚠ Notification akan dihantar kepada HQ, Manager, Admin dan Leader berkaitan.`;
    if (!confirm(confirmText)) return;
    
    // Capture customer details for notification BEFORE deletion (we lose access after)
    const sourceCs = DB.user(c.source_cs_id);
    const leader = DB.user(c.leader_id);
    
    const notifData = {
      type: 'customer_deleted',
      severity: 'high',
      icon: '🗑️',
      title: 'Customer Deleted',
      message: `${user.name} (${ROLE_LABELS[user.role] || user.role}) deleted customer "${c.customer_name}"`,
      actor_id: user.id,
      actor_name: user.name,
      actor_role: user.role,
      case_id: caseId,
      customer_name: c.customer_name,
      customer_ic: c.ic || '',
      customer_phone: c.phone || '',
      case_status: c.status || 'unknown',
      package_id: c.package_id || '',
      loan_amount: c.loan_amount || 0,
      source_cs_id: c.source_cs_id || '',
      source_cs_name: sourceCs?.name || c.source_cs_id || 'Unknown',
      leader_id: c.leader_id || '',
      leader_name: leader?.name || c.leader_id || 'Unknown',
      branch_id: c.branch_id || '',
      deleted_at: Date.now()
    };
    
    // Remove from cases array
    const cases = DB.cases().filter(x => x.id !== caseId);
    DB.set(DB.K.cases, cases);
    
    // Delete from Firestore
    if (window.Cloud?.connected) {
      window.Cloud.deleteDoc('cases', caseId).then(ok => {
        console.log(ok ? '✓ Case deleted from Firestore' : '✗ Failed to delete from Firestore');
      });
    }
    
    hideModal();
    toast('Customer deleted · sending notifications...');
    this.render();
    
    // Broadcast notification (async) - uses unified recipient helper
    try {
      const recipientIds = Logic.getNotifyRecipientsForCase(user.id, c);
      const recipients = recipientIds.map(id => DB.user(id)).filter(Boolean);
      
      const results = await Promise.all(
        recipients.map(async u => {
          const ok = await DB.addNotification(u.id, notifData);
          return { user: u, ok };
        })
      );
      const successful = results.filter(r => r.ok);
      const failed = results.filter(r => !r.ok);
      const result = {
        count: successful.length,
        recipientNames: successful.map(r => r.user.name),
        failed: failed.map(r => r.user.name)
      };
      
      console.log(`🔔 Notification result:`, result);
      
      if (result.count === 0) {
        toast('⚠ Customer deleted but NO recipients found · Add a Manager/Admin/Boss first!');
      } else if (result.failed.length > 0) {
        toast(`Customer deleted · 🔔 ${result.count} notified (${result.recipientNames.join(', ')}) · ⚠ ${result.failed.length} failed: ${result.failed.join(', ')}`);
      } else {
        toast(`✓ Customer deleted · 🔔 Notified: ${result.recipientNames.join(', ')}`);
      }
    } catch (e) {
      console.error('Broadcast notification failed:', e);
      toast('⚠ Customer deleted but notifications may have failed · check console');
    }
  },

  // Get cases with follow-ups due today or overdue (used in dashboard widgets)
  getFollowUpsDue(userId) {
    const today = new Date().toISOString().slice(0, 10);
    const user = DB.user(userId);
    if (!user) return [];
    
    let cases = DB.cases().filter(c => c.follow_up_date && c.follow_up_date <= today);
    
    // Filter by user's scope
    if (user.role === 'cs') {
      cases = cases.filter(c => c.source_cs_id === user.id);
    } else if (user.role === 'leader' || user.role === 'solo') {
      cases = cases.filter(c => 
        c.leader_id === user.id || 
        c.source_cs_id === user.id ||
        (DB.user(c.source_cs_id)?.leader_id === user.id)
      );
    } else if (['admin', 'manager', 'kerani'].includes(user.role)) {
      cases = cases.filter(c => c.branch_id === user.branch_id);
    }
    // hq sees all
    
    return cases.sort((a, b) => a.follow_up_date.localeCompare(b.follow_up_date));
  },

  recalcBulanan(forceAuto) {
    const pkgId = document.getElementById('pc-pkg')?.value;
    const amt = parseFloat(document.getElementById('pc-amt')?.value) || 0;
    const tenor = parseInt(document.getElementById('pc-tenor')?.value) || 0;
    const pkg = LOAN_PACKAGES.find(p => p.id === pkgId);
    const bulananInput = document.getElementById('pc-bulanan-input');
    if (!bulananInput) return;
    
    // Only auto-fill if user clicked the link OR field is empty
    if (forceAuto || !bulananInput.value || parseFloat(bulananInput.value) === 0) {
      if (pkg && amt > 0 && tenor > 0) {
        const auto = calcBulanan(amt, pkg.rate, tenor);
        bulananInput.value = Math.round(auto * 100) / 100;
      }
    }
  },
  
  saveProcessCase(caseId) {
    const pkgId = document.getElementById('pc-pkg').value;
    if (!pkgId) { toast('Pilih pakej dulu'); return; }
    const amt = parseFloat(document.getElementById('pc-amt').value) || 0;
    const tenor = parseInt(document.getElementById('pc-tenor').value) || 0;
    const bulananInput = document.getElementById('pc-bulanan-input');
    let bulanan = parseFloat(bulananInput.value) || 0;
    const type = document.querySelector('#pc-type .case-type-pill.active')?.dataset.val || 'normal';
    
    if (amt <= 0) { toast('Loan amount kena > 0'); return; }
    if (tenor <= 0) { toast('Tenor kena > 0'); return; }
    
    // Auto-fill bulanan if blank
    const pkg = LOAN_PACKAGES.find(p => p.id === pkgId);
    if (bulanan === 0 && pkg) {
      bulanan = calcBulanan(amt, pkg.rate, tenor);
    }
    
    const c = DB.caseById(caseId);
    const updates = {
      package_id: pkgId,
      loan_amount: amt,
      tenor: tenor,
      bulanan: bulanan,
      case_type: type
    };
    
    const today = new Date().toISOString().slice(0,10);
    if (c.status === 'new' || c.status === 'contacted') {
      updates.status = 'proposed';
      updates.date_proposed = today;
      if (!c.date_contacted) updates.date_contacted = today;
    }
    
    DB.updateCase(caseId, updates);
    toast('Package proposed · stage 3 saved');
    hideModal();
    this.render();
  },
  
  updateCaseStatus(caseId, newStatus) {
    const c = DB.caseById(caseId);
    if (!c) return;
    
    // Open status-specific form based on target status
    if (newStatus === 'proposed') {
      // PROPOSED requires filling in loan package (stage 3 form)
      // If already has package, just update status; otherwise open form
      if (c.package_id) {
        const today = new Date().toISOString().slice(0,10);
        DB.updateCase(caseId, { status: 'proposed', date_proposed: c.date_proposed || today });
        hideModal();
        toast('Status: Proposed');
        this.render();
      } else {
        return this.openProcessCase(caseId);
      }
      return;
    }
    if (newStatus === 'submitted') return this.openSubmitForm(caseId);
    if (newStatus === 'approved') return this.openApproveForm(caseId);
    if (newStatus === 'disbursed') return this.openDisburseForm(caseId);
    if (newStatus === 'pending') return this.openPendingForm(caseId);
    if (newStatus === 'potential') return this.openPotentialForm(caseId);
    if (newStatus === 'on_hold') return this.openOnHoldForm(caseId);
    if (newStatus === 'rejected') return this.openRejectForm(caseId);
    
    // Simple transitions (new → contacted, etc.)
    const today = new Date().toISOString().slice(0,10);
    const updates = { status: newStatus };
    if (newStatus === 'contacted' && !c.date_contacted) updates.date_contacted = today;
    if (newStatus === 'new') {
      // Re-open from rejected
      updates.date_rejected = null;
      updates.rejection_reason = null;
    }
    DB.updateCase(caseId, updates);
    hideModal();
    toast('Status: ' + STATUS_LABELS[newStatus]);
    this.render();
  },

  // ============ CS MONTHLY REPORT ============
  renderCSReport(user) {
    const selectedYM = this.state.selectedMonth || new Date().toISOString().slice(0,7);
    const isCurrentMonth = selectedYM === new Date().toISOString().slice(0,7);
    const stats = isCurrentMonth ? Logic.csStats(user.id) : Logic.csStatsForMonth(user.id, selectedYM);
    const com = isCurrentMonth ? Logic.csCommission(user.id) : null;
    const months = Logic.availableMonths();
    
    // Add inProgress / newCount for non-current months
    if (!isCurrentMonth) {
      stats.inProgress = stats.cases.filter(c => ['contacted', 'proposed'].includes(c.status)).length;
      stats.newCount = stats.cases.filter(c => c.status === 'new').length;
    }
    
    // Funnel data
    const funnelData = [
      { label: 'Payslip Collected', count: stats.total, color: 'var(--primary)' },
      { label: 'Contacted/Proposed', count: stats.inProgress || 0, color: '#A86F1A' },
      { label: 'Submitted', count: stats.submitted, color: 'var(--info)' },
      { label: 'Disbursed', count: stats.disbursed, color: 'var(--success)' }
    ];
    const maxCount = Math.max(...funnelData.map(f => f.count), 1);
    
    return this.topBar(user, 'Monthly Report') + `
      <div class="filter-bar">
        ${months.slice(0, 6).map(ym => {
          const d = new Date(ym + '-01');
          const label = d.toLocaleDateString('en-MY', { month: 'short', year: '2-digit' });
          return `<div class="filter-chip ${selectedYM === ym ? 'active' : ''}" onclick="App.setMonth('${ym}')">${label}${ym === new Date().toISOString().slice(0,7) ? ' (Now)' : ''}</div>`;
        }).join('')}
      </div>
      
      <div class="info-banner">
        <strong>${isCurrentMonth ? 'Current month performance.' : 'Historical view · commission locked.'}</strong> ${isCurrentMonth ? 'Commission auto-calculated.' : 'Past month data, read-only.'}
      </div>
      
      <div class="section-header"><div class="section-title">Funnel Visualization</div></div>
      <div style="padding: 0 20px;">
        <div style="background: var(--cream-2); border-radius: 14px; padding: 16px; border: 1px solid var(--border-2);">
          ${funnelData.map((f, i) => {
            const pct = (f.count / maxCount) * 100;
            const convRate = i > 0 && funnelData[0].count > 0 ? Math.round((f.count / funnelData[0].count) * 100) : 100;
            return `
              <div style="margin-bottom: ${i === funnelData.length - 1 ? 0 : 10}px;">
                <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;">
                  <span style="font-size: 12px; color: var(--ink-2); font-weight: 600;">${f.label}</span>
                  <span style="font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; color: var(--primary);">${f.count} <span style="font-size: 10px; color: var(--ink-3); font-family: 'Plus Jakarta Sans'; font-weight: 600;">(${convRate}%)</span></span>
                </div>
                <div style="background: var(--cream); border-radius: 6px; overflow: hidden; height: 24px; position: relative;">
                  <div style="background: ${f.color}; width: ${pct}%; height: 100%; transition: width 0.4s; border-radius: 6px;"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
      
      <div class="section-header"><div class="section-title">Payslip Breakdown</div></div>
      <div class="stats-list">
        <div class="stat-row highlight"><span class="stat-label">Total Payslip Collected</span><span class="stat-value">${stats.total}</span></div>
        <div class="stat-row"><span class="stat-label">New (awaiting Leader)</span><span class="stat-value">${stats.newCount || 0}</span></div>
        <div class="stat-row"><span class="stat-label">In Progress (Contacted/Proposed)</span><span class="stat-value">${stats.inProgress || 0}</span></div>
        <div class="stat-row"><span class="stat-label">Submitted to Koperasi</span><span class="stat-value">${stats.submitted}</span></div>
        <div class="stat-row success"><span class="stat-label">Disbursed (Komisen earned)</span><span class="stat-value">${stats.disbursed}</span></div>
        <div class="stat-row danger"><span class="stat-label">Rejected</span><span class="stat-value">${stats.rejected}</span></div>
      </div>
      
      ${isCurrentMonth && com ? `
        <div class="section-header"><div class="section-title">Komisen Breakdown</div></div>
        
        <div class="commission-card ${com.psCom > 0 ? 'earned' : ''}">
          <div class="com-header">
            <div class="com-title">Payslip Komisen</div>
            <div class="com-amount"><span class="unit">RM</span>${fmt(com.psCom)}</div>
          </div>
          <div class="com-sub">${stats.total} payslip ${com.psTier ? '× RM ' + com.psRate.toFixed(2) + '/PS' : '· belum capai tier minimum (65)'}</div>
          ${com.psNext ? `<div class="com-progress"><strong>${com.psNext.need} lagi payslip</strong> untuk capai tier RM ${com.psNext.rate.toFixed(2)}/PS</div>` : ''}

          </div>
        </div>
        
        <div class="commission-card ${com.smCom > 0 ? 'earned' : ''}">

          <div class="stat-row highlight"><span class="stat-label">Total Komisen Bulan Ini</span><span class="stat-value"><span class="unit">RM</span>${fmt(com.total)}</span></div>

      ` : `
        <div class="info-banner info">
          <strong>Historical view.</strong> Komisen calculation only shown for current month.

      <div class="section-header"><div class="section-title">Rejected / Lost</div></div>

    `;

  exportCSV() {
    const user = Auth.current();
    let cases = DB.cases();
    // Branch filter
    if (!Permissions.canViewAllBranches(user)) {
      cases = cases.filter(c => c.branch_id === user.branch_id || (!c.branch_id && user.branch_id === DB.branches().find(b => b.id !== 'hq')?.id));
    }
    const rows = [['Date Payslip', 'Branch', 'CS', 'Team Leader', 'Customer', 'IC', 'Phone', 'Pendapatan', 'Potongan', 'Gaji Bersih', 'Peratus', 'Package', 'Loan Amount', 'Tenor', 'Bulanan', 'Case Type', 'Status', 'Disburse Amount', 'Rejection Reason']];
    cases.forEach(c => {
      const cs = DB.user(c.source_cs_id);
      const leader = DB.user(c.leader_id);
      const branch = DB.branch(c.branch_id);
      rows.push([
        c.date_payslip, branch?.name || '', cs?.name || c.source_cs_id, leader?.name || c.leader_id,
        c.customer_name, c.ic, c.phone || '',
        c.jumlah_pendapatan, c.jumlah_potongan, c.gaji_bersih, c.gaji_bersih_pct?.toFixed(2) + '%',
        pkgName(c.package_id) || '', c.loan_amount || '', c.tenor || '', c.bulanan?.toFixed(2) || '',
        c.case_type || '', STATUS_LABELS[c.status] || c.status,
        c.disburse_amount?.toFixed(2) || '', c.rejection_reason || ''
      ]);
    });
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `awara_cases_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('CSV downloaded');
  },

  // ============ OUTBOX STATUS / RETRY ============
  // Shows pending Firestore operations (queued due to quota/network errors)
  // Allows manual flush retry
  openOutboxStatus() {
    const queue = window.__outbox?.get() || [];
    
    const renderItem = (item, i) => {
      const age = Math.floor((Date.now() - item.queued_at) / 1000);
      const ageStr = age < 60 ? `${age}s ago` : 
                     age < 3600 ? `${Math.floor(age/60)}m ago` : 
                     `${Math.floor(age/3600)}h ago`;
      return `
        <div style="background:var(--cream-2);border:1px solid var(--border-2);border-radius:8px;padding:10px;margin-bottom:6px;font-size:11px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
            <strong style="color:var(--ink);">${item.op.toUpperCase()} ${item.collection}/${item.docId}</strong>
            <span style="color:var(--ink-3);font-size:10px;">${ageStr}</span>
          </div>
          ${item.last_error ? `<div style="color:#C53030;font-size:10px;">⚠ ${item.last_error}</div>` : ''}
          <div style="color:var(--ink-3);font-size:10px;">Retries: ${item.retries || 0}</div>
        </div>
      `;
    };
    
    showModal(`
      <div class="modal-title">⏳ Pending Cloud Sync</div>
      <div style="background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;color:#92400E;">
        <strong>${queue.length} operation${queue.length !== 1 ? 's' : ''} pending sync.</strong><br>
        Data 已 saved locally. Will auto-retry every 60s + when network/quota recovers.
      </div>
      
      <div style="max-height:50vh;overflow-y:auto;">
        ${queue.length === 0 ? 
          '<div style="text-align:center;padding:30px 0;color:var(--ink-3);">✅ All synced!</div>' :
          queue.map(renderItem).join('')
        }
      </div>
      
      ${queue.length > 0 ? `
        <button class="submit-btn" onclick="App.flushOutboxNow()" style="margin-top:10px;">
          🔄 Try Sync Now
        </button>
      ` : ''}
      <button class="btn-secondary" onclick="hideModal()" style="margin-top:6px;">Close</button>
    `);
  },
  
  async flushOutboxNow() {
    toast('🔄 Trying to sync...');

  // ============ NOTIFICATION SOUND ============
  // Plays a subtle "ding" sound when a new important notification arrives.
  // Uses Web Audio API (no external file needed).
  // User can toggle on/off via 🔊/🔇 button in notification modal.
  isNotifSoundOn() {
    return localStorage.getItem('awara_notif_sound') !== '0';  // default ON
  },
  
  toggleNotifSound() {
    const on = this.isNotifSoundOn();
    localStorage.setItem('awara_notif_sound', on ? '0' : '1');
    toast(on ? '🔇 Notification sound OFF' : '🔊 Notification sound ON');
    // Test play sound if toggled on

    }

  playNotifSound(severity) {
    if (!this.isNotifSoundOn()) return;
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      const ctx = this._audioCtx || (this._audioCtx = new AudioCtx());
      
      // Different tone per severity
      const config = {
        high:   { freq: 880, duration: 0.25 },   // High urgent ding
        medium: { freq: 660, duration: 0.18 },   // Medium ding
        low:    { freq: 440, duration: 0.12 }    // Low subtle
      }[severity] || { freq: 550, duration: 0.15 };
      
      // Two-tone ding: main note + harmonic
      const playTone = (freq, when, dur, vol = 0.15) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, when);
        gain.gain.linearRampToValueAtTime(vol, when + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, when + dur);
        osc.connect(gain).connect(ctx.destination);
        osc.start(when);
        osc.stop(when + dur);
      };
      
      const t = ctx.currentTime;
      playTone(config.freq, t, config.duration);
      playTone(config.freq * 1.5, t + 0.05, config.duration * 0.7, 0.08);
    } catch (e) {
      // Audio might fail on first user interaction or in some browsers - silent fail
      Logger.debug('playNotifSound failed:', e.message);
    }
  },

  renderDailyHistoryTable(user) {
    const ym = this.state.dailyMonth || new Date().toISOString().slice(0,7);
    const [year, month] = ym.split('-').map(Number);
    const daysInMonth = new Date(year, month, 0).getDate();
    const acts = DB.activities().filter(a => a.cs_id === user.id);
    const today = new Date().toISOString().slice(0,10);
    
    const days = [];
    let totals = { calls: 0, whatsapp: 0, payslip: 0, hits: { c: 0, w: 0, p: 0 } };
    for (let day = 1; day <= daysInMonth; day++) {
      const dStr = `${ym}-${String(day).padStart(2,'0')}`;
      if (dStr > today) break;  // future days
      const a = acts.find(x => x.date === dStr);
      const d = new Date(dStr);
      const c = a?.calls || 0, w = a?.whatsapp || 0, p = a?.payslip || 0;
      totals.calls += c; totals.whatsapp += w; totals.payslip += p;
      if (c >= DAILY_TARGETS.calls) totals.hits.c++;
      if (w >= DAILY_TARGETS.whatsapp) totals.hits.w++;
      if (p >= DAILY_TARGETS.payslip) totals.hits.p++;
      days.push({
        date: dStr,
        label: `${day} ${d.toLocaleDateString('en-MY', { weekday: 'short' })}`,
        calls: c, whatsapp: w, payslip: p,
        isToday: dStr === today,
        isWeekend: d.getDay() === 0 || d.getDay() === 6
      });
    }
    
    return `

            <div style="text-align: right; color: ${d.whatsapp >= DAILY_TARGETS.whatsapp ? 'var(--success)' : 'var(--ink-2)'}; font-weight: 600;">${d.whatsapp}</div>
            <div style="text-align: right; color: ${d.payslip >= DAILY_TARGETS.payslip ? 'var(--success)' : 'var(--ink-2)'}; font-weight: 600;">${d.payslip}</div>
          </div>
        `).join('')
      }
      ${days.length > 0 ? `
        <div style="display: grid; grid-template-columns: 80px 1fr 1fr 1fr; gap: 6px; font-size: 12px; padding: 12px 0 4px; border-top: 2px solid var(--primary); margin-top: 4px;">
          <div style="font-weight: 800; color: var(--primary); font-size: 11px;">TOTAL</div>
          <div style="text-align: right; color: var(--primary); font-weight: 800;">${totals.calls}</div>
          <div style="text-align: right; color: var(--primary); font-weight: 800;">${totals.whatsapp}</div>
          <div style="text-align: right; color: var(--primary); font-weight: 800;">${totals.payslip}</div>

        <div style="display: grid; grid-template-columns: 80px 1fr 1fr 1fr; gap: 6px; font-size: 10px; padding: 4px 0; color: var(--ink-3);">
          <div style="font-weight: 700;">Targets Hit</div>

          <div style="text-align: right; font-weight: 700; color: ${totals.hits.w > 0 ? 'var(--success)' : 'var(--ink-3)'};">${totals.hits.w}/${days.length}</div>

  exportDailyHistory(userId) {
    const ym = this.state.dailyMonth || new Date().toISOString().slice(0,7);
    const [year, month] = ym.split('-').map(Number);
    const daysInMonth = new Date(year, month, 0).getDate();
    const acts = DB.activities().filter(a => a.cs_id === userId);
    const user = DB.user(userId);
    
    const rows = [['Date','Day','Calls','WhatsApp','Payslip','Calls Target Hit','WA Target Hit','PS Target Hit']];
    for (let day = 1; day <= daysInMonth; day++) {
      const dStr = `${ym}-${String(day).padStart(2,'0')}`;
      const a = acts.find(x => x.date === dStr);
      const d = new Date(dStr);
      const c = a?.calls || 0, w = a?.whatsapp || 0, p = a?.payslip || 0;
      rows.push([
        dStr,
        d.toLocaleDateString('en-MY', { weekday: 'long' }),
        c, w, p,
        c >= DAILY_TARGETS.calls ? 'YES' : 'NO',
        w >= DAILY_TARGETS.whatsapp ? 'YES' : 'NO',
        p >= DAILY_TARGETS.payslip ? 'YES' : 'NO'
      ]);
    }
    
    const csv = '\uFEFF' + rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${user.name}_DailyReport_${ym}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Daily report exported');
  },

  // ============ ADMIN: CUSTOMER DATABASE (Whole Company) ============
  renderAdminCustomers(user) {
    const filterStatus = this.state.filterState.adminCust || 'all';
    const filterTeam = this.state.filterState.adminCustTeam || 'all';
    const filterTime = this.state.filterState.adminCustTime || 'month';
    const filterBranch = this.state.filterState.adminCustBranch || 'all';
    const filterStaff = this.state.staffFilter || '';
    const dateFrom = this.state.dateFrom || '';
    const dateTo = this.state.dateTo || '';
    const searchText = (this.state.searchText || '').toLowerCase();
    
    let cases = DB.cases();
    
    // Branch filter: HQ sees all branches, everyone else only sees their own branch
    // Note: cases without branch_id are treated as belonging to the first non-HQ branch
if (!Permissions.canViewAllBranches(user)) {
  cases = cases.filter(c => c.branch_id === user.branch_id);
    } else if (filterBranch !== 'all') {
      // HQ: apply optional branch filter pill
      cases = cases.filter(c => c.branch_id === filterBranch || (!c.branch_id && filterBranch === DB.branches().filter(b => b.id !== 'hq')[0]?.id));
    }
    
    // Staff filter (from clicking ranking row)
    if (filterStaff) {
      const staff = DB.user(filterStaff);
      if (staff) {
        if (Logic.isLeaderRole(staff)) {
          cases = cases.filter(c => c.leader_id === staff.id || c.source_cs_id === staff.id);
        } else {
          cases = cases.filter(c => c.source_cs_id === staff.id);
        }
      }
    }
    
    // Date range filter (if both provided, takes precedence over Time chip)
    if (dateFrom && dateTo) {
      cases = cases.filter(c => c.date_payslip >= dateFrom && c.date_payslip <= dateTo);
    } else if (dateFrom) {
      cases = cases.filter(c => c.date_payslip >= dateFrom);
    } else if (dateTo) {
      cases = cases.filter(c => c.date_payslip <= dateTo);
    } else {
      // Time filter chip (only if no date range)
      if (filterTime === 'month') {
        const ym = new Date().toISOString().slice(0,7);
        cases = cases.filter(c => c.date_payslip && c.date_payslip.startsWith(ym));
      } else if (filterTime === '3months') {
        const cutoff = new Date();
        cutoff.setMonth(cutoff.getMonth() - 3);
        cases = cases.filter(c => c.date_payslip && new Date(c.date_payslip) >= cutoff);
      }
      // 'all' = no filter
    }
    
    // Status filter
    if (filterStatus !== 'all') cases = cases.filter(c => c.status === filterStatus);
    
    // Team filter
    if (filterTeam !== 'all') cases = cases.filter(c => c.leader_id === filterTeam);
    
    // Search
    if (searchText) {
      cases = cases.filter(c => 
        c.customer_name.toLowerCase().includes(searchText) ||
        (c.ic || '').toLowerCase().includes(searchText) ||
        (c.phone || '').toLowerCase().includes(searchText)
      );
    }
    
    // Sort newest first
    cases = cases.sort((a,b) => b.date_payslip.localeCompare(a.date_payslip));
    
    let leaders = DB.users().filter(u => u.role === 'leader' || u.role === 'solo');
    if (!Permissions.canViewAllBranches(user)) {
      leaders = leaders.filter(u => u.branch_id === user.branch_id);
    } else if (filterBranch !== 'all') {
      leaders = leaders.filter(u => u.branch_id === filterBranch);
    }

  setSearch(val) {

  recalcEditGaji() {
    const pend = parseFloat(document.getElementById('ec-pend').value) || 0;
    const pot = parseFloat(document.getElementById('ec-pot').value) || 0;
    const { bersih, pct } = calcGajiBersih(pend, pot);
    document.getElementById('ec-bersih').textContent = 'RM ' + bersih.toFixed(2);
    document.getElementById('ec-pct').textContent = pct.toFixed(2) + '%';

saveEditCustomer(caseId) {
    const name = document.getElementById('ec-name').value.trim();
    if (!name) { toast('Name required'); return; }
    const ic = document.getElementById('ec-ic').value.replace(/[^0-9]/g, '');
    const phone = document.getElementById('ec-phone').value.trim();
    const pend = parseFloat(document.getElementById('ec-pend').value) || 0;
    const pot = parseFloat(document.getElementById('ec-pot').value) || 0;
    const date = document.getElementById('ec-date').value;
    const payoutEl = document.getElementById('ec-payout');
    const payout = payoutEl ? (parseFloat(payoutEl.value) || null) : null;
    const { bersih, pct } = calcGajiBersih(pend, pot);
    
    DB.updateCase(caseId, {
      customer_name: name,
      ic, phone,
      jumlah_pendapatan: pend,
      jumlah_potongan: pot,
      gaji_bersih: bersih,
      gaji_bersih_pct: pct,
      date_payslip: date,
      payout_amount: payout,
    });
    
    toast('Customer info updated');
    hideModal();
    this.render();
  },

  async saveUser(userId) {
    const name = document.getElementById('eu-name').value.trim();
    const role = document.querySelector('#eu-role .case-type-pill.active').dataset.val;
    const leaderId = document.getElementById('eu-leader').value;
    const pass = document.getElementById('eu-pass').value;
    let branchId = (role === 'hq' || role === 'admin') ? 'hq' : document.getElementById('eu-branch')?.value;
    
    if (!name) { toast('Name required'); return; }
    if (role === 'cs' && !leaderId) { toast('Pilih Team Leader untuk CS'); return; }
    const currentUser = Auth.current();
const targetUser = DB.user(userId);
if (currentUser.role === 'hq' && targetUser?.role === 'admin') {
  toast('⛔ HQ tidak boleh ubah akaun Boss');
  hideModal();
  return;
}
    
    // Detect role changes
    const existingUser = DB.user(userId);
    const wasRole = existingUser?.role;
    const isPromotion = wasRole === 'cs' && (role === 'solo' || role === 'leader');
    const isDemotion = (wasRole === 'solo' || wasRole === 'leader') && role === 'cs';
    
    // For Team Leader demotion, warn user about team members
    if (isDemotion && wasRole === 'leader') {
      const teamCS = Logic.csUnderLeader(userId);
      if (teamCS.length > 0) {
        const teamNames = teamCS.map(c => c.name).join(', ');
        const warning = `⚠ ${name} adalah Team Leader untuk ${teamCS.length} CS:\n\n${teamNames}\n\nLepas demote ke CS:\n• ${name} sendiri jadi CS bawah leader baru\n• Cases dia sendiri kumpul → pindah ke leader baru\n• Cases dari team CS (${teamNames}) → pindah ke Manager\n• ${teamCS.length} CS team members masih point ke ${name} sebagai leader → kena re-assign manually di Edit Staff\n\nContinue?`;
        if (!confirm(warning)) return;
      }
    }
    
    const updates = { name, role };
    if (branchId) updates.branch_id = branchId;
    updates.leader_id = role === 'cs' ? leaderId : null;
    if (pass) updates.password = await Hash.sha256(pass);
    
    DB.updateUser(userId, updates);  // updateUser already syncs to Cloud
    
    // Handle case ownership changes based on role transition
    let extraMsg = '';
    if (isPromotion) {
      const result = Logic.promoteCSCases(userId, role);
      if (result.count > 0) {
        extraMsg = ` · ${result.count} cases promoted to own ownership 🎯`;
        console.log(`Promotion: ${result.count} cases now owned by ${name} as new ${role}`);
      }
    } else if (isDemotion) {
      const result = Logic.demoteCases(userId, role, leaderId);
      if (result.ownCount > 0 || result.teamCount > 0) {
        const parts = [];
        if (result.ownCount > 0) parts.push(`${result.ownCount} own cases → leader baru`);
        if (result.teamCount > 0) parts.push(`${result.teamCount} team cases → Manager`);
        extraMsg = ' · ' + parts.join(' · ') + ' 📤';
        console.log(`Demotion: ${name} → CS · own=${result.ownCount}, team→manager=${result.teamCount}`);
      }
      if (!result.hasManager && wasRole === 'leader') {
        const teamCS = Logic.csUnderLeader(userId);
        if (teamCS.length > 0) {
          alert('⚠ Tiada Manager active — team cases tidak dipindah. Sila create Manager dan re-process.');
        }
      }
    }
    
    hideModal();
    toast('Staff updated' + (window.Cloud?.connected ? ' · synced ☁' : '') + extraMsg);
    this.render();
  },

  // ============ RESIGN STAFF ============
  // When a staff resigns: transfer all their cases to Manager, then deactivate them.
  // Manager can later reassign to other CS via Edit Customer.
  resignStaff(userId) {
    if (!Permissions.canManageStaff(Auth.current())) { toast('No permission to manage staff'); return; }
    const u = DB.user(userId);
    if (!u) return;
    if (userId === Auth.current()?.id) { toast('Tidak boleh resign diri sendiri'); return; }
    
    // Check Manager exists
    const manager = Logic.findManager();
    if (!manager) {
      alert('⚠ Tiada Manager active sekarang. Sila create satu Manager dulu sebelum resign staff ini.');
      return;
    }
    
    // Count cases that will be transferred (preview)
    const allCases = DB.cases();
    const csCases = allCases.filter(c => c.source_cs_id === userId).length;
    const leaderCases = allCases.filter(c => c.leader_id === userId).length;
    const totalCases = new Set([
      ...allCases.filter(c => c.source_cs_id === userId).map(c => c.id),
      ...allCases.filter(c => c.leader_id === userId).map(c => c.id)
    ]).size;
    
    // Confirm
    const msg = `Resign ${u.name}?\n\n` +
      `• ${totalCases} case(s) akan dipindah ke Manager ${manager.name}\n` +
      `   (${csCases} sebagai source CS, ${leaderCases} sebagai leader)\n` +
      `• Staff akan jadi inactive (tak boleh login)\n` +
      `• Manager kemudian boleh reassign cases ini\n\n` +
      `Continue?`;
    
    if (!confirm(msg)) return;
    
    // Step 1: Transfer cases
    const result = Logic.transferCasesFromUserToManager(userId);
    if (!result.ok) {
      alert('Error: ' + result.error);
      return;
    }
    
    // Step 2: Deactivate staff (mark inactive + record resign date)
    DB.updateUser(userId, { 
      inactive: true, 
      resigned: true,
      resigned_at: Date.now() 
    });
    
    hideModal();
    toast(`✅ ${u.name} resigned · ${result.count} cases dipindah ke ${manager.name}`);
    this.render();
  },

    DB.unlockUser(userId);
    hideModal();

    this.render();
  },

  async createUser() {
    if (!Permissions.canManageStaff(Auth.current())) { toast('No permission to manage staff'); return; }
    try {
      const nameEl = document.getElementById('nu-name');
      const idEl = document.getElementById('nu-id');
      const roleEl = document.querySelector('#nu-role .case-type-pill.active');
      const leaderEl = document.getElementById('nu-leader');
      const passEl = document.getElementById('nu-pass');
      const branchEl = document.getElementById('nu-branch');
      
      if (!nameEl || !roleEl) { 
        toast('Form error · pls refresh & try again'); 
        return; 
      }
      
      const name = nameEl.value.trim();
      let id = (idEl?.value || '').trim().toLowerCase();
      const role = roleEl.dataset.val;
      const leaderId = leaderEl?.value || '';
      const pass = (passEl?.value || '1234');
      let branchId = branchEl?.value || '';
      
      // HQ role doesn't need a branch selection - auto-assign to 'hq'
      if (role === 'hq' || role === 'admin') branchId = 'hq';
      
      if (!name) { toast('Name diperlukan'); nameEl.focus(); return; }
      if (!branchId) { toast('Pilih Branch untuk staff ini'); branchEl?.focus(); return; }
      
      // Auto-generate ID from name if blank
      if (!id) {
        id = name.toLowerCase().replace(/[^a-z0-9]/g, '');
      }
      
      // Check duplicate
      if (DB.user(id)) { 
        toast('Login ID "' + id.toUpperCase() + '" sudah wujud · sila guna ID lain'); 
        if (idEl) { idEl.value = id.toUpperCase(); idEl.focus(); }
        return; 
      }
      
      // Validate CS needs a leader (admin / solo / leader don't)
      if (role === 'cs' && !leaderId) { 
        toast('Pilih Team Leader untuk CS'); 
        leaderEl?.focus();
        return; 
      }
      
      // Save new user via centralized method (writes localStorage + Firestore atomically)
      const hashedPass = await Hash.sha256(pass);
      const newUser = { 
        id, name, role,
        branch_id: branchId,
        leader_id: role === 'cs' ? leaderId : null, 
        password: hashedPass,
        created_at: Date.now()
      };
      const saved = DB.addUser(newUser);
      
      if (!saved) {
        toast('Storage error · cuba lagi');
        return;
      }
      
      hideModal();
      toast('Staff "' + name + '" created · Login ID: ' + id.toUpperCase() + (window.Cloud?.connected ? ' · synced ☁' : ' · local only'));
      this.render();
    } catch (e) {
      console.error('createUser error:', e);
      toast('Error: ' + (e.message || 'Unknown'));
    }
  },
  
  // ============ ADMIN: WEEKLY REPORT ============
  // ============ BRANCH COMPARISON (HQ/Boss only) ============
  // Side-by-side comparison of all branches' performance this month
  renderBranchComparison(user) {
    const ym = this.state.bcMonth || new Date().toISOString().slice(0, 7);
    const branches = DB.branches().filter(b => b.id !== 'hq');
    const allUsers = DB.users().filter(u => !u.inactive);
    const allCases = DB.cases();
    
    // Calculate stats per branch
    const stats = branches.map(b => {
      const branchCases = allCases.filter(c => c.branch_id === b.id);
      const monthCases = branchCases.filter(c => 
        (c.date_payslip && c.date_payslip.startsWith(ym)) ||
        (c.date_submitted && c.date_submitted.startsWith(ym)) ||
        (c.date_disbursed && c.date_disbursed.startsWith(ym))
      );
      
      // Submitted (KPI) - excludes rejected per business rule
      const submitted = branchCases.filter(c => 
        c.date_submitted?.startsWith(ym) && c.status !== 'rejected'
      ).length;
      
      // Approved
      const approved = branchCases.filter(c => 
        c.date_approved?.startsWith(ym)
      ).length;
      
      // Disbursed
      const disbursed = branchCases.filter(c => c.date_disbursed?.startsWith(ym));
      const disbursedAmount = disbursed.reduce((s, c) => s + (c.disbursed_amount || c.disburse_amount || 0), 0);
      
      // Staff counts
      const branchStaff = allUsers.filter(u => u.branch_id === b.id);
      const csCount = branchStaff.filter(u => u.role === 'cs').length;
      const tlCount = branchStaff.filter(u => u.role === 'leader' || u.role === 'solo').length;
      const mgrCount = branchStaff.filter(u => u.role === 'manager').length;
      
      // New customers (payslip this month)
      const newCustomers = branchCases.filter(c => 
        c.date_payslip?.startsWith(ym)
      ).length;
      
      // Conversion: disbursed / new customers
      const conversion = newCustomers > 0 ? (disbursed.length / newCustomers * 100) : 0;
      
      // Top performer (highest disbursed amount)
      const performerStats = {};
      branchStaff.forEach(s => {
        const userDisb = disbursed.filter(c => 
          c.leader_id === s.id || c.source_cs_id === s.id
        ).reduce((sum, c) => sum + (c.disbursed_amount || c.disburse_amount || 0), 0);
        if (userDisb > 0) performerStats[s.id] = { name: s.name, amount: userDisb };
      });
      const topPerformer = Object.values(performerStats).sort((a, b) => b.amount - a.amount)[0];
      
      // Company profit from this branch (commission from disbursed cases)
      const profit = Logic.totalProfit(disbursed);
      
      return {
        branch: b,
        newCustomers, submitted, approved,
        disbursedCount: disbursed.length, disbursedAmount,
        conversion, profit,
        csCount, tlCount, mgrCount,
        topPerformer
      };
    });
    
    // Sort by disbursed amount (best branch first)
    stats.sort((a, b) => b.disbursedAmount - a.disbursedAmount);
    
    // Calculate totals for "company-wide"
    const totals = stats.reduce((t, s) => ({
      newCustomers: t.newCustomers + s.newCustomers,
      submitted: t.submitted + s.submitted,
      disbursedCount: t.disbursedCount + s.disbursedCount,
      disbursedAmount: t.disbursedAmount + s.disbursedAmount,
      profit: t.profit + s.profit,
    }), { newCustomers: 0, submitted: 0, disbursedCount: 0, disbursedAmount: 0, profit: 0 });
    
    // Max disbursed amount for relative bars
    const maxDisb = Math.max(...stats.map(s => s.disbursedAmount), 1);
    const showProfit = user.role === 'admin';
    
    // Month picker (last 6 months)
    const monthOptions = [];
    for (let i = 0; i < 6; i++) {
      const d = new Date();
      d.setDate(1);
      d.setMonth(d.getMonth() - i);
      const v = d.toISOString().slice(0, 7);
      const label = d.toLocaleDateString('en-MY', { month: 'short', year: 'numeric' });
      monthOptions.push({ v, label });
    }
    
    return this.topBar(user, 'Branch Comparison', `${ym}`) + `
      <section class="screen">
        <!-- Quick action: Manage Branches -->
        ${Permissions.canEditSettings(user) ? `
          <div style="padding: 14px 20px 0;">
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
              <button onclick="App.addBranch()" style="background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 10px; font-family: inherit; font-weight: 800; font-size: 12px; cursor: pointer; flex: 1; min-width: 140px;">
                ➕ Tambah Branch Baru
              </button>
              <button onclick="App.goto('admin-settings')" style="background: var(--cream-2); color: var(--ink); border: 1px solid var(--border); padding: 10px 16px; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; flex: 1; min-width: 140px;">
                ⚙️ Manage Branches
              </button>
            </div>
          </div>
        ` : ''}
        
        <!-- Month selector -->
        <div style="padding: 14px 20px;">
          <label style="display: block; font-size: 10px; color: var(--ink-3); font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px;">Comparing Month</label>

            ${monthOptions.map(o => `<option value="${o.v}" ${o.v === ym ? 'selected' : ''}>${o.label}</option>`).join('')}

  exportWeeklyCSV() {
    const offset = this.state.weekOffset || 0;
    const now = new Date();
    const day = now.getDay();
    const diffToMonday = day === 0 ? -6 : 1 - day;
    const weekStart = new Date(now);
    weekStart.setDate(weekStart.getDate() + diffToMonday + offset * 7);
    const user = Auth.current();
    const branchFilter = this.state.weeklyBranch && this.state.weeklyBranch !== 'all' 
      ? this.state.weeklyBranch 
      : (!Permissions.canViewAllBranches(user) && user.role !== 'admin' ? user.branch_id : null);
    const report = Logic.weeklyReport(weekStart, branchFilter);
    
    const rows = [['Week', `${report.weekStart} to ${report.weekEnd}`]];
    rows.push([]);
    rows.push(['Team Leader', 'Type', 'KFI (RM)', 'KFI Count', 'Calling', 'WhatsApp', 'Payslip', 'Submit', 'Closing', 'Potential (RM)', 'Rejected', 'Members']);
    report.teamData.forEach(t => {
      rows.push([
        t.leader.name,
        t.leader.role === 'solo' ? 'Solo' : 'Team',
        t.kfi.toFixed(0), t.kfiCount,
        t.calling, t.whatsapp, t.payslip, t.submitting, t.closing,
        t.potential.toFixed(0), t.rejected,
        t.teamUsers.map(u => u.name).join('; ')
      ]);
    });
    
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `awara_weekly_${report.weekStart}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Weekly CSV downloaded');
  },

    // Last 30 days payslip count
    const days = [];

      d.setDate(d.getDate() - i);

      days.push({ date: dStr, count, disbursed, label: d.getDate(), isFirstOfWeek: d.getDay() === 1 });

    const width = 400;

    const cases = DB.cases().filter(c => 
      c.date_payslip && c.date_payslip.startsWith(ym) && c.package_id
    );
    
    if (cases.length === 0) return '';
    
    const pkgCounts = {};
    cases.forEach(c => {
      pkgCounts[c.package_id] = (pkgCounts[c.package_id] || 0) + 1;
    });
    
    const sorted = Object.entries(pkgCounts)
      .map(([id, count]) => {
        const pkg = LOAN_PACKAGES.find(p => p.id === id);
        return { id, name: pkg?.name || id, count, payout: pkg?.payout };
      })
      .sort((a, b) => b.count - a.count)
      .slice(0, 8);
    
    const total = sorted.reduce((s, p) => s + p.count, 0);
    const colors = ['var(--primary)', 'var(--accent-deep)', 'var(--info)', 'var(--success)', '#A86F1A', '#6B3FB8', 'var(--danger)', 'var(--ink-2)'];
    
    return `

  // ============ PERFORMANCE BANNER (low warning / high encouragement) ============
  renderPerformanceBanner(user) {
    const level = Logic.performanceLevel(user.id, user.role);
    if (level === 'normal') return '';
    
    const isLeader = user.role === 'leader' || user.role === 'solo';
    const isSolo = user.role === 'solo';
    
    let banner = '';
    
    if (level === 'low') {
      if (isLeader) {
        const stats = Logic.leaderStats(user.id);
        const t = isSolo ? PERFORMANCE.solo : PERFORMANCE.leader;
        const gap = t.low - stats.kfiAmount;
        banner = `
          <div style="margin: 14px 20px 0; background: #FCE8E6; border-left: 4px solid var(--danger); border-radius: 12px; padding: 14px 16px;">
            <strong style="font-size: 10px; color: var(--danger); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 800;">⚠ Low Performance Warning</strong>
            <div style="font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--ink); margin: 4px 0;">Anda kurang aktif bulan ini</div>
            <div style="font-size: 12px; color: var(--ink-2); line-height: 1.5;">KFI sekarang: <strong>RM ${fmt(stats.kfiAmount)}</strong> · Bawah min baseline RM ${fmt(t.low)}. Perlu push <strong>RM ${fmt(gap)}</strong> lagi untuk tier minimum.</div>
          </div>`;
      } else {
        const stats = Logic.csStats(user.id);
        const gap = PERFORMANCE.cs.low - stats.total;
        banner = `
          <div style="margin: 14px 20px 0; background: #FCE8E6; border-left: 4px solid var(--danger); border-radius: 12px; padding: 14px 16px;">
            <strong style="font-size: 10px; color: var(--danger); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 800;">⚠ Low Performance Warning</strong>
            <div style="font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--ink); margin: 4px 0;">Payslip count kurang bulan ini</div>
            <div style="font-size: 12px; color: var(--ink-2); line-height: 1.5;">Payslip: <strong>${stats.total}</strong> · Min baseline ${PERFORMANCE.cs.low}. Perlu <strong>${gap} payslip</strong> lagi untuk min target.</div>
          </div>`;
      }
    } else if (level === 'high') {
      if (isLeader) {
        const stats = Logic.leaderStats(user.id);
        const t = isSolo ? PERFORMANCE.solo : PERFORMANCE.leader;
        banner = `
          <div style="margin: 14px 20px 0; background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%); border-left: 4px solid var(--success); border-radius: 12px; padding: 14px 16px;">
            <strong style="font-size: 10px; color: var(--success); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 800;">🔥 Great Performance!</strong>
            <div style="font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--ink); margin: 4px 0;">Anda sangat aktif bulan ini!</div>
            <div style="font-size: 12px; color: var(--ink-2); line-height: 1.5;">KFI: <strong>RM ${fmt(stats.kfiAmount)}</strong>. Push <strong>RM ${fmt(t.excellent - stats.kfiAmount)}</strong> lagi untuk reach excellence tier!</div>
          </div>`;
      } else {
        const stats = Logic.csStats(user.id);
        banner = `
          <div style="margin: 14px 20px 0; background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%); border-left: 4px solid var(--success); border-radius: 12px; padding: 14px 16px;">
            <strong style="font-size: 10px; color: var(--success); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 800;">🔥 Great Performance!</strong>
            <div style="font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--ink); margin: 4px 0;">Payslip count tinggi!</div>
            <div style="font-size: 12px; color: var(--ink-2); line-height: 1.5;">${stats.total} payslips this month. Push <strong>${PERFORMANCE.cs.excellent - stats.total}</strong> lagi untuk reach 100 tier!</div>
          </div>`;
      }
    } else if (level === 'excellent') {
      banner = `
        <div style="margin: 14px 20px 0; background: linear-gradient(135deg, var(--accent) 0%, #F5C518 100%); border-radius: 14px; padding: 18px 20px;">
          <strong style="font-size: 10px; color: var(--primary-dark); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 800;">🏆 Excellence Tier Achieved</strong>
          <div style="font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--primary-dark); margin: 4px 0;">Outstanding Performance!</div>
          <div style="font-size: 13px; color: var(--primary-dark); line-height: 1.5; opacity: 0.85;">Anda dah capai top tier bulan ini. Keep it up!</div>
        </div>`;
    }
    
    return banner;
  },

  saveKoperasi(existingId) {
    if (!Permissions.canManageKoperasi(Auth.current())) { toast('No permission untuk manage koperasi'); return; }
    try {
      const name = document.getElementById('kp-name').value.trim().toUpperCase();
      const rate = parseFloat(document.getElementById('kp-rate').value);
      const payout = parseInt(document.getElementById('kp-payout').value);
      const commission_pct = parseFloat(document.getElementById('kp-commission').value) || 0;
      const typeEl = document.querySelector('#kp-type .case-type-pill.active');
      const type = typeEl?.dataset.val || 'normal';
      const isBonus = document.getElementById('kp-bonus').checked;
      const remarks = document.getElementById('kp-remarks').value.trim();
      
      if (!name) { toast('Name diperlukan'); return; }
      if (!rate || rate <= 0 || rate > 50) { toast('Interest rate kena valid (0-50%)'); return; }
      if (!payout || payout <= 0 || payout > 100) { toast('Payout kena valid (0-100%)'); return; }
      if (commission_pct < 0 || commission_pct > 100) { toast('Commission % kena 0-100'); return; }
      
      const data = { name, rate, payout, commission_pct, type, isBonus, remarks };
      
      if (existingId) {
        DB.updateKoperasi(existingId, data);
        toast('Koperasi updated' + (commission_pct > 0 ? ` · Profit: ${commission_pct}%` : ''));
      } else {
        const pkg = DB.addKoperasi(data);
        if (!pkg) { toast('Error · ID may exist'); return; }
        toast('Koperasi "' + name + '" added');
      }
      hideModal();
      this.render();
    } catch (e) {
      console.error('saveKoperasi:', e);
      toast('Error: ' + e.message);
    }
  },
  
  confirmDeleteKoperasi(id) {
    if (!Permissions.canManageKoperasi(Auth.current())) { toast('No permission'); return; }
    const p = DB.koperasiById(id);
    if (!p) return;
    if (!confirm(`Delete "${p.name}" permanently?\n\nExisting cases using this koperasi will keep their data but can't be edited.`)) return;
    DB.deleteKoperasi(id);
    toast('Koperasi "' + p.name + '" deleted');
    this.render();
  },

  exportReport(type) {
    const ym = this.state.exportMonth || new Date().toISOString().slice(0,7);
    const staff = this.state.exportStaff || 'all';
    const pkg = this.state.exportPkg || 'all';
    const statusFilter = this.state.exportStatus || 'all';
    const exportFrom = this.state.exportFrom || null;
    const exportTo = this.state.exportTo || null;
    const exportBranch = this.state.exportBranch || 'all';
    const user = Auth.current();
    const branchFilter = !Permissions.canViewAllBranches(user) && user.role !== 'admin' 
      ? user.branch_id 
      : (exportBranch !== 'all' ? exportBranch : null);
    
let rows = [];
    const dateLabel = exportFrom && exportTo ? `${exportFrom}_to_${exportTo}` : exportFrom ? `from_${exportFrom}` : exportTo ? `to_${exportTo}` : ym;
    const statusLabel = statusFilter !== 'all' ? `_${statusFilter}` : '';
    let filename = `awara_${type}_${dateLabel}${statusLabel}${branchFilter ? '_' + branchFilter : ''}.csv`;

    const filterByDate = (cases, dateField) => {
      if (exportFrom && exportTo) return cases.filter(c => c[dateField] && c[dateField] >= exportFrom && c[dateField] <= exportTo);
      if (exportFrom) return cases.filter(c => c[dateField] && c[dateField] >= exportFrom);
      if (exportTo) return cases.filter(c => c[dateField] && c[dateField] <= exportTo);
      return cases.filter(c => c[dateField] && c[dateField].startsWith(ym));
    };
    
    if (type === 'performance') {
      rows.push(['MONTHLY PERFORMANCE REPORT', ym]);
      rows.push(['Generated:', new Date().toLocaleString('en-MY')]);
      rows.push([]);
      rows.push(['Name', 'Role', 'Branch', 'Team', 'Payslip', 'Duplicates', 'Submit (KPI)', 'Disburse', 'Reject', 'KFI (RM)', 'PS Comm (RM)', 'Submit Comm (RM)', 'KFI Comm (RM)', 'Total Comm (RM)']);
      
      let targets = staff === 'all' 
        ? DB.users().filter(u => u.role !== 'admin')
        : DB.users().filter(u => u.id === staff);
      if (branchFilter) targets = targets.filter(u => u.branch_id === branchFilter);
      
      targets.forEach(u => {
        const isLeader = u.role === 'leader' || u.role === 'solo';
        const stats = isLeader ? Logic.leaderStatsForMonth(u.id, ym) : Logic.csStatsForMonth(u.id, ym);
        const team = isLeader ? u.name : (DB.user(u.leader_id)?.name || '—');
        const branchName = DB.branch(u.branch_id)?.name || '';
        let csCom = null, leaderCom = null;
        const isCurrent = ym === new Date().toISOString().slice(0,7);
        if (isCurrent && !isLeader) csCom = Logic.csCommission(u.id);
        if (isCurrent && isLeader) leaderCom = Logic.leaderCommission(u.id);
        rows.push([
          u.name,
          ROLE_LABELS[u.role],
          branchName,
          team,
          stats.total || 0,
          stats.totalDuplicates || 0,
          stats.submitted || 0,
          stats.disbursed || 0,
          stats.rejected || 0,
          (stats.kfiAmount || stats.disburseAmount || 0).toFixed(0),
          csCom ? csCom.psCom.toFixed(2) : '—',
          csCom ? csCom.smCom.toFixed(2) : '—',
          leaderCom ? leaderCom.kfiCom.toFixed(2) : '—',
          (csCom?.total || leaderCom?.total || 0).toFixed(2)
        ]);
      });
    }
    
if (type === 'submitted') {
      rows.push(['SUBMITTED CASES REPORT', ym, statusFilter !== 'all' ? `Status: ${STATUS_LABELS[statusFilter] || statusFilter}` : '']);
      rows.push(['Generated:', new Date().toLocaleString('en-MY')]);
      rows.push([]);

      let cases = DB.cases().filter(c =>
        filterByDate([c], 'date_submitted').length > 0 ||
        filterByDate([c], 'date_payslip').length > 0
      );
      if (staff !== 'all') cases = cases.filter(c => c.source_cs_id === staff || c.leader_id === staff);
      if (pkg !== 'all') cases = cases.filter(c => c.package_id === pkg);
      if (statusFilter !== 'all') cases = cases.filter(c => c.status === statusFilter);
      if (branchFilter) cases = cases.filter(c => c.branch_id === branchFilter);
      cases.sort((a,b) => (a.leader_id||'').localeCompare(b.leader_id||'') || (a.source_cs_id||'').localeCompare(b.source_cs_id||'') || (a.date_submitted || a.date_payslip || '').localeCompare(b.date_submitted || b.date_payslip || ''));

      const staffGroups = {};
      cases.forEach(c => {
        const key = c.source_cs_id;
        if (!staffGroups[key]) staffGroups[key] = [];
        staffGroups[key].push(c);
      });

      Object.keys(staffGroups).forEach(csId => {
        const staffCases = staffGroups[csId];
        const csUser = DB.user(csId);
        const managerUser = DB.user(csUser?.leader_id);
        rows.push(['', 'MANAGER NAME', 'STAFF NAME', 'CUST NAME', 'NO IC', 'PACKAGE', 'AMOUNT LOAN']);
        let totalLoan = 0;
        let no = 1;
        staffCases.forEach(c => {
          const p = LOAN_PACKAGES.find(x => x.id === c.package_id);
          const loanAmt = c.loan_amount || 0;
          totalLoan += loanAmt;
          rows.push([no++, managerUser?.name || 'WILSON', csUser?.name || csId, c.customer_name, c.ic || '', p?.name || '', loanAmt.toFixed(2)]);
        });
        rows.push(['', '', '', 'TOTAL SUBMISSION', '', '', totalLoan.toFixed(2)]);
        rows.push([]);
      });
    }
    
if (type === 'disbursed') {
      rows.push(['DISBURSEMENT LIST', ym]);
      rows.push(['Generated:', new Date().toLocaleString('en-MY')]);
      rows.push([]);

      let cases = DB.cases().filter(c => c.status === 'disbursed').filter(c =>
        filterByDate([c], 'date_disbursed').length > 0 ||
        filterByDate([c], 'date_payslip').length > 0
      );
      if (staff !== 'all') cases = cases.filter(c => c.source_cs_id === staff || c.leader_id === staff);
      if (pkg !== 'all') cases = cases.filter(c => c.package_id === pkg);
      if (branchFilter) cases = cases.filter(c => c.branch_id === branchFilter);
      cases.sort((a,b) => (a.leader_id||'').localeCompare(b.leader_id||'') || (a.source_cs_id||'').localeCompare(b.source_cs_id||'') || (a.date_disbursed || a.date_payslip || '').localeCompare(b.date_disbursed || b.date_payslip || ''));

      const staffGroups = {};
      cases.forEach(c => {
        const key = c.source_cs_id;
